  foldAllBtn.addEventListener("click", () => {
    foldAll = !foldAll;
    foldAllBtn.classList.toggle("active", foldAll);
    foldAllBtn.textContent = foldAll ? "📂 unfold" : "📦 fold";
    document.querySelectorAll(".msg").forEach(el => {
      el.classList.toggle("collapsed", foldAll);
    });
  });

  // ---- Session picker --------------------------------------------------
  function formatRelative(ms) {
    if (ms == null || isNaN(ms)) return "";
    const sec = Math.round(ms / 1000);
    if (sec < 5) return "just now";
    if (sec < 60) return `${sec}s ago`;
    const min = Math.round(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.round(min / 60);
    if (hr < 24) return `${hr}h ago`;
    const day = Math.round(hr / 24);
    if (day < 30) return `${day}d ago`;
    const mo = Math.round(day / 30);
    if (mo < 12) return `${mo}mo ago`;
    return `${Math.round(mo / 12)}y ago`;
  }

  function bucket(mtime, now) {
    const d = new Date(mtime);
    const today = new Date(now);
    today.setHours(0, 0, 0, 0);
    const dDay = new Date(d); dDay.setHours(0, 0, 0, 0);
    const diffDays = Math.round((today - dDay) / 86400000);
    if (diffDays <= 0) return "Today";
    if (diffDays === 1) return "Yesterday";
    if (diffDays < 7) return "This week";
    if (diffDays < 30) return "This month";
    return "Older";
  }

  let allSessions = [];
  let filterText = "";
  const PROJECT_FILTER_KEY = "viewer:projectFilter";
  let projectFilter = localStorage.getItem(PROJECT_FILTER_KEY) || ""; // "" = All

  function prettyProject(p) {
    // -Users-ishaangarg-work-prophecy-orchestrate → prophecy-orchestrate
    // -Users-ishaangarg--claude → .claude
    if (!p) return "(unknown)";
    if (p === "-Users-ishaangarg--claude") return ".claude";
    return p.replace(/^-Users-ishaangarg-?/, "").replace(/-/g, "/").replace(/^\//, "") || p;
  }

  async function loadSessions() {
    try {
      const r = await fetch("/sessions");
      const data = await r.json();
      allSessions = data.sessions || [];
      renderPicker();
      return allSessions;
    } catch { return []; }
  }

  function renderProjectChips() {
    const projects = new Map(); // project -> count
    for (const s of allSessions) {
      const p = s.project || "(unknown)";
      projects.set(p, (projects.get(p) || 0) + 1);
    }
    pickerProjects.innerHTML = "";
    const allChip = document.createElement("button");
    allChip.type = "button";
    allChip.className = "chip" + (projectFilter === "" ? " active" : "");
    allChip.textContent = `All · ${allSessions.length}`;
    allChip.addEventListener("click", (e) => {
      e.stopPropagation();
      projectFilter = "";
      localStorage.setItem(PROJECT_FILTER_KEY, "");
      renderPicker();
    });
    pickerProjects.appendChild(allChip);
    // Sort projects by session count desc
    const sorted = [...projects.entries()].sort((a, b) => b[1] - a[1]);
    for (const [proj, count] of sorted) {
      const c = document.createElement("button");
      c.type = "button";
      c.className = "chip" + (projectFilter === proj ? " active" : "");
      c.textContent = `${prettyProject(proj)} · ${count}`;
      c.title = proj;
      c.addEventListener("click", (e) => {
        e.stopPropagation();
        projectFilter = proj;
        localStorage.setItem(PROJECT_FILTER_KEY, proj);
        renderPicker();
      });
      pickerProjects.appendChild(c);
    }
  }

  function renderPicker() {
    const now = Date.now();
    const q = filterText.trim().toLowerCase();
    renderProjectChips();
    const byProject = projectFilter
      ? allSessions.filter(s => s.project === projectFilter)
      : allSessions;
    const filtered = q
      ? byProject.filter(s => (s.preview || "").toLowerCase().includes(q) || s.id.includes(q))
      : byProject;

    // Group by recency
    const groups = new Map();
    for (const s of filtered) {
      const b = bucket(s.mtime, now);
      if (!groups.has(b)) groups.set(b, []);
      groups.get(b).push(s);
    }

    pickerList.innerHTML = "";
    if (filtered.length === 0) {
      pickerList.innerHTML = `<div class="picker-empty">No sessions match "${escapeHtml(q)}"</div>`;
    } else {
      for (const [groupName, items] of groups) {
        const head = document.createElement("div");
        head.className = "picker-group-head";
        head.textContent = `${groupName} · ${items.length}`;
        pickerList.appendChild(head);
        for (const s of items) {
          pickerList.appendChild(renderSessionCard(s, now));
        }
      }
    }

    // Update the button label
    const active = allSessions.find(s => s.id === currentSessionId);
    if (active) {
      pickerLabel.textContent = active.preview
        ? active.preview.slice(0, 48)
        : `${active.id.slice(0, 8)}…`;
    } else if (currentSessionId) {
      pickerLabel.textContent = `${currentSessionId.slice(0, 8)}…`;
    } else {
      pickerLabel.textContent = "Pick a session";
    }
  }

  function renderSessionCard(s, now) {
    // Anchor so Cmd/Ctrl+click and right-click → "Open in new tab" work natively.
    const btn = document.createElement("a");
    btn.href = `/?session=${encodeURIComponent(s.id)}`;
    btn.className = "picker-item" + (s.id === currentSessionId ? " active" : "");
    btn.dataset.id = s.id;
    const preview = s.preview || `(no preview · ${s.id.slice(0, 8)}…)`;
    const updated = formatRelative(now - s.mtime);
    const age = s.firstMessageAt ? formatRelative(now - s.firstMessageAt) : null;
    const isLive = (now - s.mtime) < 60 * 1000;
    const projLabel = prettyProject(s.project);
    const pills = [
      `<span class="pill project" title="${escapeHtml(s.project || "")}">📁 ${escapeHtml(projLabel)}</span>`,
      `<span class="pill msgs">${s.messageCount} msgs</span>`,
      `<span class="pill ${isLive ? "live" : "updated"}" title="Last activity">${isLive ? "live" : updated}</span>`,
    ];
    if (age && age !== updated) pills.push(`<span class="pill age" title="Session age (first message)">${age.replace(" ago", " old")}</span>`);

    const cwdEsc = s.cwd ? s.cwd.replace(/"/g, '\\"') : null;
    const resumeCmd = cwdEsc
      ? `cd "${cwdEsc}" && claude --resume ${s.id}`
      : `claude --resume ${s.id}`;
    btn.innerHTML = `
      <div class="preview">${escapeHtml(preview)}</div>
      <div class="pills-row">
        <div class="pills">${pills.join("")}</div>
        <button class="resume-btn" type="button" data-cmd="${escapeHtml(resumeCmd)}" title="Copy 'claude --resume' command for terminal · paste in your shell to resume this session">📋</button>
      </div>
    `;
    btn.addEventListener("click", (e) => {
      // The resume button has its own handler — don't activate the session if
      // they click it.
      if (e.target.closest(".resume-btn")) return;
      // Let the browser handle modifier-clicks and middle-click — they should
      // open the link in a new tab/window/background tab natively.
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      e.preventDefault();
      closePicker();
      setActiveSession(s.id);
    });
    // Wire the copy-to-clipboard handler
    const resumeBtn = btn.querySelector(".resume-btn");
    resumeBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(resumeCmd);
        resumeBtn.classList.add("copied");
        resumeBtn.textContent = "✓";
        setTimeout(() => {
          resumeBtn.classList.remove("copied");
          resumeBtn.textContent = "📋";
        }, 1500);
      } catch (err) {
        resumeBtn.textContent = "✗";
        setTimeout(() => { resumeBtn.textContent = "📋"; }, 1500);
      }
    });
    // Middle-click also opens in new tab natively — no handler needed; the
    // anchor's `href` does the work.
    // Full tooltip on hover
    const startStr = s.firstMessageAt ? new Date(s.firstMessageAt).toLocaleString() : "unknown";
    const updStr = new Date(s.mtime).toLocaleString();
    btn.title = `${s.id}\nStarted: ${startStr}\nLast activity: ${updStr}\nProject: ${s.project}`;
    return btn;
  }

  function openPicker() {
    pickerMenu.classList.add("open");
    filterText = "";
    pickerFilter.value = "";
    renderPicker();
    setTimeout(() => pickerFilter.focus(), 0);
  }
  function closePicker() {
    pickerMenu.classList.remove("open");
  }

  pickerBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (pickerMenu.classList.contains("open")) closePicker();
    else openPicker();
  });
  pickerFilter.addEventListener("input", () => {
    filterText = pickerFilter.value;
    renderPicker();
  });

  pickerRefresh.addEventListener("click", async (e) => {
    e.stopPropagation();
    if (pickerRefresh.classList.contains("spinning")) return;
    pickerRefresh.classList.add("spinning");
    try {
      await loadSessions();
      pickerRefresh.classList.remove("spinning");
      pickerRefresh.classList.add("flash");
      setTimeout(() => pickerRefresh.classList.remove("flash"), 600);
    } catch (err) {
      pickerRefresh.classList.remove("spinning");
    }
  });
  pickerFilter.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closePicker();
    else if (e.key === "Enter") {
      // Pick the first visible item
      const first = pickerList.querySelector(".picker-item");
      if (first) first.click();
    }
  });
  document.addEventListener("click", (e) => {
    if (!pickerMenu.contains(e.target) && !pickerBtn.contains(e.target)) {
      closePicker();
    }
  });

  // ---- Cross-session search ---------------------------------------------
  const searchBtn = document.getElementById("search-btn");
  const searchOverlay = document.getElementById("search-overlay");
  const searchInput = document.getElementById("search-input");
  const searchResults = document.getElementById("search-results");
  let pendingJumpMsgIdx = null;
  let searchDebounce = null;

  function openSearch() {
    searchOverlay.classList.add("open");
    searchInput.value = "";
    searchResults.innerHTML = `<div class="search-status">Type at least 2 characters to search.</div>`;
    setTimeout(() => searchInput.focus(), 0);
  }
  function closeSearch() { searchOverlay.classList.remove("open"); }

  searchBtn.addEventListener("click", openSearch);
  searchOverlay.addEventListener("click", (e) => {
    if (e.target === searchOverlay) closeSearch();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && searchOverlay.classList.contains("open")) closeSearch();
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
      e.preventDefault();
      if (searchOverlay.classList.contains("open")) closeSearch(); else openSearch();
    }
  });

  function highlightHit(text, query) {
    const lower = text.toLowerCase();
    const needle = query.toLowerCase();
    const idx = lower.indexOf(needle);
    if (idx === -1) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx))
      + `<span class="hit">${escapeHtml(text.slice(idx, idx + needle.length))}</span>`
      + escapeHtml(text.slice(idx + needle.length));
  }

  let searchAbortController = null;
  async function runSearch(q) {
    if (q.length < 2) {
      searchResults.innerHTML = `<div class="search-status">Type at least 2 characters to search.</div>`;
      return;
    }
    // Abort any in-flight search so old requests can't overwrite newer results
    if (searchAbortController) { try { searchAbortController.abort(); } catch {} }
    searchAbortController = new AbortController();
    const myController = searchAbortController;
    searchResults.innerHTML = `<div class="search-status">Searching across all sessions…</div>`;
    const startedAt = performance.now();
    // 15s hard timeout in case the server gets wedged
    const timer = setTimeout(() => { try { myController.abort(); } catch {} }, 15000);
    try {
      // Cache-bust so an intermediate cache can't return stale results
      const r = await fetch(`/search?q=${encodeURIComponent(q)}&limit=100&_=${Date.now()}`, {
        signal: myController.signal,
        cache: "no-store",
      });
      clearTimeout(timer);
      if (myController !== searchAbortController) return; // a newer search started
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const matches = data.matches || [];
      const elapsedMs = Math.round(performance.now() - startedAt);
      if (matches.length === 0) {
        searchResults.innerHTML = `<div class="search-status">No matches for "${escapeHtml(q)}" (${elapsedMs}ms).</div>`;
        return;
      }
      searchResults.innerHTML = "";
      for (const m of matches) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "search-result";
        const previewText = (m.preview || m.sessionId.slice(0, 8)).slice(0, 60);
        const when = m.timestamp ? formatRelative(Date.now() - Date.parse(m.timestamp)) : formatRelative(Date.now() - m.mtime);
        item.innerHTML = `
          <div class="meta">
            <span class="role-pill ${m.role}">${m.role}</span>
            <span>${escapeHtml(prettyProject(m.project))}</span>
            <span>·</span>
            <span>${escapeHtml(previewText)}…</span>
            <span>·</span>
            <span>msg #${m.msgIdx}</span>
            <span>·</span>
            <span>${when}</span>
          </div>
          <div class="snippet">${highlightHit(m.snippet, q)}</div>
        `;
        item.addEventListener("click", () => {
          closeSearch();
          pendingJumpMsgIdx = m.msgIdx;
          if (m.sessionId !== currentSessionId) {
            setActiveSession(m.sessionId);
          } else {
            jumpToMessage(m.msgIdx);
          }
        });
        searchResults.appendChild(item);
      }
      const more = matches.length >= 100 ? ` (showing first 100)` : "";
      const head = document.createElement("div");
      head.className = "search-status";
      head.textContent = `${matches.length} match${matches.length === 1 ? "" : "es"}${more} · ${elapsedMs}ms`;
      searchResults.insertBefore(head, searchResults.firstChild);
    } catch (err) {
      clearTimeout(timer);
      if (err.name === "AbortError") {
        // Either superseded by a newer search or hit our 15s timeout
        if (myController === searchAbortController) {
          searchResults.innerHTML = `<div class="search-status">Search timed out after 15s. Try a more specific query, or check that the server is responsive.</div>`;
        }
      } else {
        searchResults.innerHTML = `<div class="search-status">Search failed: ${escapeHtml(err.message)}</div>`;
      }
    }
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    const q = searchInput.value;
    searchDebounce = setTimeout(() => runSearch(q.trim()), 180);
  });
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const first = searchResults.querySelector(".search-result");
      if (first) first.click();
    }
  });

  function jumpToMessage(idx) {
    const el = messagesEl.querySelector(`.msg[data-idx="${idx}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    el.classList.remove("flash");
    void el.offsetWidth;
    el.classList.add("flash");
  }

  function pickInitialSession(sessions) {
    if (urlSession && sessions.some(s => s.id === urlSession)) return urlSession;
    const last = localStorage.getItem(LAST_SESSION_KEY);
    if (last && sessions.some(s => s.id === last)) return last;
    return sessions[0]?.id || null;
  }

  async function setActiveSession(sid) {
    if (sid === currentSessionId) return;
    currentSessionId = sid;
    if (sid) {
      localStorage.setItem(LAST_SESSION_KEY, sid);
      const u = new URL(location.href);
      u.searchParams.set("session", sid);
      history.replaceState(null, "", u.toString());
    }
    annotations = loadAnnotations(sid);
    displayCount = DISPLAY_DEFAULT; // reset pagination on each session switch
    stickyBottom = true;
    refreshDock();
    renderPicker();
    await loadTranscript();
    startSSE();
  }

  // ---- Transcript ------------------------------------------------------
  async function loadTranscript() {
    if (!currentSessionId) return;
    try {
      const r = await fetch(`/transcript?session=${encodeURIComponent(currentSessionId)}`);
      const data = await r.json();
      lastMessages = data.messages || [];
      lastUsage = data.usage || [];
      renderMessages();
    } catch (err) {
      messagesEl.innerHTML = `<div class="empty">Load failed: ${escapeHtml(err.message)}</div>`;
    }
  }

  let renderVersion = 0;
  const RENDER_BATCH = 25;
  async function renderMessages() {
    const myVersion = ++renderVersion;
    messagesEl.innerHTML = "";
    let rendered = 0;
    const total = lastMessages.length;

    // Pagination: only render the most recent `displayCount` messages.
    // Earlier messages are kept in memory but hidden behind a "Load earlier" button.
    const startIdx = Math.max(0, total - displayCount);
    const hiddenCount = startIdx;

    // "Load earlier" button at the top, if there are older messages off-screen.
    if (hiddenCount > 0) {
      const loadBtn = document.createElement("button");
      loadBtn.className = "load-earlier-btn";
      const loadN = Math.min(DISPLAY_INCREMENT, hiddenCount);
      loadBtn.textContent = `↑  Load ${loadN} earlier message${loadN === 1 ? "" : "s"}  (${hiddenCount} hidden of ${total} total)`;
      loadBtn.addEventListener("click", () => {
        displayCount += DISPLAY_INCREMENT;
        stickyBottom = false; // user wants context, don't auto-scroll to bottom
        renderMessages();
      });
      const loadAllBtn = document.createElement("button");
      loadAllBtn.className = "load-earlier-btn alt";
      loadAllBtn.textContent = `↑  Load all (${total})`;
      loadAllBtn.addEventListener("click", () => {
        displayCount = total;
        stickyBottom = false;
        renderMessages();
      });
      const bar = document.createElement("div");
      bar.className = "load-earlier-row";
      bar.appendChild(loadBtn);
      bar.appendChild(loadAllBtn);
      messagesEl.appendChild(bar);
    }

    // Status placeholder for long renders so the user knows it's working.
    let progressEl = null;
    const visibleCount = total - startIdx;
    if (visibleCount > RENDER_BATCH * 2) {
      progressEl = document.createElement("div");
      progressEl.className = "empty";
      progressEl.style.cssText = "margin:0 0 12px;padding:10px 14px;text-align:left;border-style:dashed;font-size:12px;";
      progressEl.textContent = `Rendering ${visibleCount} messages…`;
      messagesEl.appendChild(progressEl);
    }

    for (let i = startIdx; i < total; i += RENDER_BATCH) {
      if (myVersion !== renderVersion) return; // newer render started — bail
      const fragment = document.createDocumentFragment();
      const end = Math.min(i + RENDER_BATCH, total);
      for (let k = i; k < end; k++) {
        try {
          const el = renderMessage(lastMessages[k], k);
          if (el) { fragment.appendChild(el); rendered++; }
        } catch (err) {
          // Don't let a single bad message break the whole render.
          const errEl = document.createElement("article");
          errEl.className = "msg msg-assistant";
          errEl.dataset.idx = String(k);
          errEl.innerHTML = `<div class="msg-head" style="color:#cf222e">⚠ msg #${k} failed to render</div><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap">${escapeHtml(err.message || String(err))}</pre>`;
          fragment.appendChild(errEl);
          rendered++;
          console.error("renderMessage threw on msg", k, err);
        }
      }
      messagesEl.appendChild(fragment);
      if (progressEl) progressEl.textContent = `Rendering ${end - startIdx} / ${visibleCount}…`;
      // Yield so UI stays responsive
      if (end < total) {
        await new Promise(r => setTimeout(r, 0));
      }
    }

    if (myVersion !== renderVersion) return;
    if (progressEl) progressEl.remove();

    countEl.textContent = hiddenCount > 0 ? `${rendered}/${total}` : String(rendered);
    if (rendered === 0) {
      messagesEl.innerHTML = `<div class="empty">No visible messages in this session yet.</div>`;
    }
    // If the token popover is currently open, refresh its contents with the
    // latest usage data (matters on SSE transcript updates).
    if (tokenPopover.classList.contains("open")) refreshTokenPopover();
    addCopyButtons();
    reapplyHighlights();
    if (pendingJumpMsgIdx !== null) {
      const idx = pendingJumpMsgIdx;
      pendingJumpMsgIdx = null;
      requestAnimationFrame(() => jumpToMessage(idx));
    } else if (stickyBottom) {
      requestAnimationFrame(() => window.scrollTo(0, document.body.scrollHeight));
    }
  }

  // Customize these if you want different labels (e.g. "Ishaan" instead of "You")
  const USER_NAME = "You";
  const ASSISTANT_NAME = "Claude";
  const USER_INITIAL = USER_NAME.charAt(0).toUpperCase();
  const ASSISTANT_INITIAL = ASSISTANT_NAME.charAt(0).toUpperCase();

  function formatTimestamp(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    if (Number.isNaN(d.getTime())) return "";
    const now = new Date();
    const sameYear = d.getFullYear() === now.getFullYear();
    const datePart = d.toLocaleString("en-US", {
      month: "short",
      day: "numeric",
      ...(sameYear ? {} : { year: "numeric" }),
    });
    const timePart = d.toLocaleString("en-US", {
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
    });
    return `${datePart} · ${timePart}`;
  }

  function renderMessage(m, idx) {
    const wrap = document.createElement("article");
    wrap.className = `msg msg-${m.role}`;
    wrap.dataset.idx = String(idx);
    const head = document.createElement("div");
    head.className = "msg-head";
    const isUser = m.role === "user";
    const name = isUser ? USER_NAME : ASSISTANT_NAME;
    const initial = isUser ? USER_INITIAL : ASSISTANT_INITIAL;
    const tsStr = formatTimestamp(m.timestamp);
    head.innerHTML = `<span class="avatar ${isUser ? "user" : "assistant"}">${escapeHtml(initial)}</span><span>${escapeHtml(name)}</span><span class="head-right">${tsStr ? `<span class="timestamp">${escapeHtml(tsStr)}</span>` : ""}<button class="fold-toggle" title="Fold / unfold this message">▾</button></span>`;
    head.querySelector(".fold-toggle").addEventListener("click", (e) => {
      e.stopPropagation();
      wrap.classList.toggle("collapsed");
    });
    // Whole-header click also toggles (more discoverable). Ignore clicks on the
    // chevron itself (it handles its own click above).
    head.addEventListener("click", (e) => {
      if (e.target.closest(".fold-toggle")) return;
      wrap.classList.toggle("collapsed");
    });
    head.style.cursor = "pointer";
    wrap.appendChild(head);

    // Hint shown only when collapsed
    const hint = document.createElement("div");
    hint.className = "msg-collapsed-hint";
    hint.textContent = "(folded — click header to expand)";
    wrap.appendChild(hint);

    if (foldAll) wrap.classList.add("collapsed");

    let hasVisible = false;
    for (const part of (m.content || [])) {
      if (part.type === "text") {
        const text = part.text || "";
        if (!text.trim()) continue;
        const div = document.createElement("div");
        div.className = "md";
        div.innerHTML = marked.parse(text);
        wrap.appendChild(div);
        hasVisible = true;
      } else if (part.type === "thinking") {
        if (!showThinking) continue;
        const body = part.thinking || part.text || "";
        // Hide empty/redacted thinking blocks (signature-only stubs)
        if (!body.trim()) continue;
        const details = document.createElement("details");
        details.className = "thinking";
        details.open = true; // Expanded by default — fold individually if desired
        const summary = document.createElement("summary");
        summary.textContent = "💭 thinking";
        details.appendChild(summary);
        const bodyEl = document.createElement("div");
        bodyEl.className = "md thinking-body";
        bodyEl.innerHTML = marked.parse(body);
        details.appendChild(bodyEl);
        wrap.appendChild(details);
        hasVisible = true;
      } else if (part.type === "tool_use") {
        if (!showTools) continue;
        const diffEl = renderToolDiff(part);
        if (diffEl) {
          wrap.appendChild(diffEl);
        } else {
          wrap.appendChild(renderToolCollapsible(part));
        }
        hasVisible = true;
      }
    }
    return hasVisible ? wrap : null;
  }

  function fmtTokens(n) {
    if (n == null) return "—";
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 1_000) return (n / 1_000).toFixed(n >= 10_000 ? 0 : 1) + "k";
    return String(n);
  }

  // Approximate Anthropic Opus 4.x pricing per million tokens (USD).
  // Pricing changes; treat the cost number as a rough estimate, not a bill.
  const PRICE_PER_M = { input: 15, cacheCreation: 18.75, cacheRead: 1.50, output: 75 };

  function estimateCost(usage) {
    let usd = 0;
    for (const u of usage) {
      usd += (u.input * PRICE_PER_M.input) / 1_000_000;
      usd += (u.cacheCreation * PRICE_PER_M.cacheCreation) / 1_000_000;
      usd += (u.cacheRead * PRICE_PER_M.cacheRead) / 1_000_000;
      usd += (u.output * PRICE_PER_M.output) / 1_000_000;
    }
    return usd;
  }

  function fmtUsd(n) {
    if (n < 0.01) return "<$0.01";
    if (n < 1) return "$" + n.toFixed(2);
    if (n < 100) return "$" + n.toFixed(2);
    return "$" + n.toFixed(0);
  }

  function fmtDuration(ms) {
    if (!ms || ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m`;
    return `${s}s`;
  }

  function inferContextWindow(usage) {
    // Opus 4.7 has a 200k default; `opus[1m]` variant gets 1M.
    // Heuristic: if we've ever seen >250k in this session's prompts, must be 1M.
    const peak = Math.max(0, ...usage.map(u => u.contextSize));
    return peak > 250_000 ? 1_000_000 : 200_000;
  }

  function renderUsageCard() {
    if (!lastUsage || lastUsage.length === 0) return null;
    const last = lastUsage[lastUsage.length - 1];
    const totalOut = lastUsage.reduce((s, u) => s + u.output, 0);
    const totalIn = lastUsage.reduce((s, u) => s + u.input, 0);
    const totalCacheRead = lastUsage.reduce((s, u) => s + u.cacheRead, 0);
    const totalCacheCreation = lastUsage.reduce((s, u) => s + u.cacheCreation, 0);
    const totalCache = totalCacheRead + totalCacheCreation;
    const cacheHitRate = totalCache > 0 ? Math.round((totalCacheRead / totalCache) * 100) : 0;

    // Context window math
    const ctxWindow = inferContextWindow(lastUsage);
    const ctxUsed = last.contextSize;
    const ctxRemaining = Math.max(0, ctxWindow - ctxUsed);
    const ctxPct = ctxWindow > 0 ? Math.min(100, Math.round((ctxUsed / ctxWindow) * 100)) : 0;
    const ctxFillClass = ctxPct >= 80 ? "alert" : ctxPct >= 60 ? "warn" : "";

    // Cost estimate
    const usd = estimateCost(lastUsage);
    const costPerTurn = lastUsage.length > 0 ? usd / lastUsage.length : 0;

    // Session stats
    const firstTs = lastUsage[0]?.timestamp ? Date.parse(lastUsage[0].timestamp) : null;
    const lastTs = lastUsage[lastUsage.length - 1]?.timestamp ? Date.parse(lastUsage[lastUsage.length - 1].timestamp) : null;
    const durationMs = (firstTs && lastTs) ? lastTs - firstTs : null;
    const avgContext = lastUsage.reduce((s, u) => s + u.contextSize, 0) / lastUsage.length;
    const avgOutput = totalOut / lastUsage.length;

    // Sparkline
    const w = 460, h = 50, pad = 4;
    const contexts = lastUsage.map(u => u.contextSize);
    const max = Math.max(...contexts, 1);
    const n = contexts.length;
    const stepX = n > 1 ? (w - pad * 2) / (n - 1) : 0;
    const points = contexts.map((c, i) => {
      const x = pad + i * stepX;
      const y = h - pad - (c / max) * (h - pad * 2);
      return [x, y];
    });
    const linePath = points.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
    const areaPath = linePath + ` L${(pad + (n - 1) * stepX).toFixed(1)},${h - pad} L${pad},${h - pad} Z`;

    const card = document.createElement("div");
    card.className = "usage-card";
    card.innerHTML = `
      <div class="usage-title">Token usage</div>

      <div class="usage-window">
        <div class="row1">
          <span class="left"><strong>${ctxPct}%</strong> of context window used</span>
          <span class="right">${fmtTokens(ctxUsed)} / ${fmtTokens(ctxWindow)}</span>
        </div>
        <div class="bar"><div class="fill ${ctxFillClass}" style="width:${ctxPct}%"></div></div>
        <div class="meta">
          <span>${fmtTokens(ctxRemaining)} remaining</span>
          <span>${ctxPct >= 80 ? "⚠ near limit — compaction may kick in" : ctxPct >= 60 ? "watch — context filling" : "plenty of room"}</span>
        </div>
      </div>

      <div class="usage-cost-row">
        <div>
          <div class="cost-num">${fmtUsd(usd)}</div>
          <div class="cost-sub">estimated cost so far (Opus pricing, approximate)</div>
        </div>
        <div style="text-align:right">
          <div class="cost-num" style="font-size:14px">${fmtUsd(costPerTurn)}</div>
          <div class="cost-sub">avg per turn</div>
        </div>
      </div>

      <div class="usage-stats">
        <span class="icon">🔁</span>
        <span class="label">Assistant turns</span>
        <span class="value">${n}</span>

        <span class="icon">⏱️</span>
        <span class="label">Session duration</span>
        <span class="value">${fmtDuration(durationMs)}</span>

        <span class="icon">📏</span>
        <span class="label">Avg context per turn</span>
        <span class="value">${fmtTokens(Math.round(avgContext))}</span>

        <span class="icon">✍️</span>
        <span class="label">Avg output per turn</span>
        <span class="value">${fmtTokens(Math.round(avgOutput))}</span>

        <span class="icon">📈</span>
        <span class="label">Cache hit rate</span>
        <span class="value">${cacheHitRate}%</span>
      </div>

      <div class="latest">
        <span class="num">${fmtTokens(last.contextSize)}</span>
        in prompt this turn
        <div class="sub">= ${fmtTokens(last.input)} fresh + ${fmtTokens(last.cacheCreation)} cache-write + ${fmtTokens(last.cacheRead)} cache-read</div>
      </div>

      <div class="totals">
        <span class="icon">📝</span>
        <span class="label">Fresh input <span class="hint">— new user/system text</span></span>
        <span class="value">${fmtTokens(totalIn)}</span>

        <span class="icon">💾</span>
        <span class="label">Cache writes <span class="hint">— one-time prompt-cache fills</span></span>
        <span class="value">${fmtTokens(totalCacheCreation)}</span>

        <span class="icon">⚡</span>
        <span class="label">Cache reads <span class="hint">— cheap replays (≈10% cost)</span></span>
        <span class="value">${fmtTokens(totalCacheRead)}</span>

        <span class="icon">💬</span>
        <span class="label">Output <span class="hint">— Claude's generated tokens</span></span>
        <span class="value">${fmtTokens(totalOut)}</span>
      </div>

      <div class="spark-row" title="Prompt size per assistant turn; peak ${fmtTokens(max)}">
        <div class="spark-caption">Prompt size<br>per turn →</div>
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="flex:1">
          <path class="area" d="${areaPath}" />
          <path class="line" d="${linePath}" />
          <text class="axis-label" x="${pad}" y="${h - 1}" text-anchor="start">turn 1</text>
          <text class="axis-label" x="${w - pad}" y="${h - 1}" text-anchor="end">turn ${n} · peak ${fmtTokens(max)}</text>
        </svg>
      </div>
    `;
    return card;
  }

  function renderToolCollapsible(part) {
    const name = part.name || "tool";
    const input = part.input || {};

    // Build a sensible one-line preview for the summary
    let preview = "";
    if (name === "Bash" && typeof input.command === "string") {
      preview = input.command.replace(/\s+/g, " ").trim();
    } else if (input.file_path) {
      preview = String(input.file_path);
    } else if (input.path) {
      preview = String(input.path);
    } else if (input.url) {
      preview = String(input.url);
    } else if (typeof input.pattern === "string") {
      preview = input.pattern;
    } else if (typeof input.query === "string") {
      preview = input.query;
    } else {
      preview = JSON.stringify(input);
    }

    const details = document.createElement("details");
    details.className = "tool";
    const summary = document.createElement("summary");
    summary.innerHTML = `🔧 <span class="tool-name">${escapeHtml(name)}</span><span class="tool-args-preview">${escapeHtml(preview)}</span>`;
    details.appendChild(summary);

    // Body — full content, formatted per tool type
    const body = document.createElement("div");
    body.className = "tool-body";

    if (name === "Bash" && typeof input.command === "string") {
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.className = "language-bash";
      code.textContent = input.command;
      if (window.hljs) {
        try { code.innerHTML = hljs.highlight(input.command, { language: "bash", ignoreIllegals: true }).value; } catch {}
      }
      pre.appendChild(code);
      body.appendChild(pre);
      const meta = [];
      if (input.description) meta.push(`<strong>description:</strong> ${escapeHtml(input.description)}`);
      if (input.timeout) meta.push(`<strong>timeout:</strong> ${escapeHtml(String(input.timeout))}ms`);
      if (input.run_in_background) meta.push(`<strong>background:</strong> yes`);
      if (meta.length) {
        const m = document.createElement("div");
        m.className = "tool-meta";
        m.innerHTML = meta.join(" · ");
        body.appendChild(m);
      }
    } else {
      // Pretty-print full input as JSON
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.className = "language-json";
      const formatted = JSON.stringify(input, null, 2);
      code.textContent = formatted;
      if (window.hljs) {
        try { code.innerHTML = hljs.highlight(formatted, { language: "json", ignoreIllegals: true }).value; } catch {}
      }
      pre.appendChild(code);
      body.appendChild(pre);
    }

    details.appendChild(body);
    return details;
  }

  function renderToolDiff(part) {
    const name = part.name || "";
    const input = part.input || {};
    if (!window.Diff) return null;
    if (name === "Edit" && typeof input.old_string === "string" && typeof input.new_string === "string") {
      return buildDiffElement({
        label: input.replace_all ? "Edit (replace_all)" : "Edit",
        file: input.file_path || "",
        old: input.old_string,
        new: input.new_string,
      });
    }
    if (name === "MultiEdit" && Array.isArray(input.edits) && input.file_path) {
      const wrap = document.createElement("div");
      input.edits.forEach((e, i) => {
        const piece = buildDiffElement({
          label: `MultiEdit · edit ${i + 1}/${input.edits.length}`,
          file: input.file_path,
          old: e.old_string || "",
          new: e.new_string || "",
        });
        wrap.appendChild(piece);
      });
      return wrap;
    }
    if (name === "Write" && typeof input.content === "string") {
      return buildDiffElement({
        label: "Write",
        file: input.file_path || "",
        old: "",
        new: input.content,
      });
    }
    if (name === "NotebookEdit" && typeof input.new_source === "string") {
      return buildDiffElement({
        label: "NotebookEdit",
        file: input.notebook_path || "",
        old: input.old_source || "",
        new: input.new_source,
      });
    }
    return null;
  }

  function buildDiffElement({ label, file, old, new: ne }) {
    const wrap = document.createElement("div");
    wrap.className = "tool-diff";
    const head = document.createElement("div");
    head.className = "tool-diff-head";
    head.innerHTML = `🔧 <span class="name">${escapeHtml(label)}</span><span class="file">${escapeHtml(file)}</span>`;
    wrap.appendChild(head);

    const body = document.createElement("div");
    body.className = "tool-diff-body";

    if (old === "" && ne) {
      // Write or full content: show as all-add lines
      const lines = ne.split("\n");
      lines.forEach(l => {
        const ln = document.createElement("div");
        ln.className = "tool-diff-line add";
        ln.textContent = l;
        body.appendChild(ln);
      });
    } else if (!ne && old) {
      // pure deletion
      const lines = old.split("\n");
      lines.forEach(l => {
        const ln = document.createElement("div");
        ln.className = "tool-diff-line del";
        ln.textContent = l;
        body.appendChild(ln);
      });
    } else {
      const parts = window.Diff.diffLines(old, ne);
      // Render with limited context — collapse runs of equal lines longer than 6
      let hasAny = false;
      for (const p of parts) {
        const lines = p.value.split("\n");
        // diffLines often leaves a trailing empty entry; drop it
        if (lines.length > 0 && lines[lines.length - 1] === "") lines.pop();
        const cls = p.added ? "add" : p.removed ? "del" : "ctx";
        if (cls === "ctx" && lines.length > 6) {
          // Keep first 3 and last 3
          [...lines.slice(0, 3), null, ...lines.slice(-3)].forEach((l) => {
            const ln = document.createElement("div");
            if (l === null) {
              ln.className = "tool-diff-line ctx";
              ln.textContent = `…  (${lines.length - 6} unchanged lines)`;
              ln.style.fontStyle = "italic";
            } else {
              ln.className = `tool-diff-line ${cls}`;
              ln.textContent = l;
            }
            body.appendChild(ln);
          });
          hasAny = true;
        } else {
          for (const l of lines) {
            const ln = document.createElement("div");
            ln.className = `tool-diff-line ${cls}`;
            ln.textContent = l;
            body.appendChild(ln);
            hasAny = true;
          }
        }
      }
      if (!hasAny) {
        const ln = document.createElement("div");
        ln.className = "tool-diff-empty";
        ln.textContent = "(no changes)";
        body.appendChild(ln);
      }
    }

    wrap.appendChild(body);
    return wrap;
  }

  function addCopyButtons() {
    // Block code: copy button (visible on hover)
    document.querySelectorAll(".md pre").forEach(pre => {
      if (pre.querySelector(".copy-btn")) return;
      const code = pre.querySelector("code");
      if (!code) return;
      const lang = (code.className.match(/language-([\w-]+)/) || [])[1];
      if (lang) {
        const label = document.createElement("span");
        label.className = "lang-label";
        label.textContent = lang;
        pre.appendChild(label);
      }
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.classList.add("copied");
          btn.textContent = "Copied ✓";
          setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "Copy"; }, 1500);
        }).catch(() => { btn.textContent = "✗"; setTimeout(() => { btn.textContent = "Copy"; }, 1500); });
      });
      pre.appendChild(btn);
    });

    // Inline code: click-to-copy
    document.querySelectorAll(".md code").forEach(code => {
      if (code.parentElement && code.parentElement.tagName === "PRE") return; // block code already handled
      if (code.dataset.copyWired) return;
      code.dataset.copyWired = "1";
      code.title = "Click to copy";
      code.addEventListener("click", (e) => {
        e.preventDefault();
        const text = code.textContent;
        navigator.clipboard.writeText(text).then(() => {
          const original = code.textContent;
          code.classList.add("copied");
          code.textContent = "✓ copied";
          setTimeout(() => {
            code.classList.remove("copied");
            code.textContent = original;
          }, 900);
        }).catch(() => {
          showToast("Copy failed", true);
        });
      });
    });
  }

  // ---- Annotation: selection + popup -----------------------------------
  function getMessageWrapper(node) {
    let n = node;
    while (n && n !== document.body) {
      if (n.nodeType === 1 && n.classList && n.classList.contains("msg")) return n;
      n = n.parentNode;
    }
    return null;
  }

  function getContextWindow(text, idx, len, win = 40) {
    const start = Math.max(0, idx - win);
    const end = Math.min(text.length, idx + len + win);
    return { prefix: text.slice(start, idx), suffix: text.slice(idx + len, end) };
  }

  function buildAnnotationFromSelection(selection) {
    const range = selection.getRangeAt(0);
    const quote = selection.toString();
    if (!quote.trim()) return null;
    const msgEl = getMessageWrapper(range.startContainer);
    if (!msgEl) return null;
    const msgIdx = Number(msgEl.dataset.idx);
    const role = msgEl.classList.contains("msg-user") ? "user" : "assistant";
    const fullText = msgEl.innerText;
    const idx = fullText.indexOf(quote);
    let prefix = "", suffix = "";
    if (idx !== -1) {
      const c = getContextWindow(fullText, idx, quote.length);
      prefix = c.prefix; suffix = c.suffix;
    }
    const rect = range.getBoundingClientRect();
    return { quote, prefix, suffix, msgIdx, role, rect };
  }

  function showPopup(anno) {
    closePopup();
    popup = document.createElement("div");
    popup.className = "popup";
    const top = window.scrollY + anno.rect.bottom + 8;
    const left = Math.max(8, window.scrollX + anno.rect.left);
    popup.style.top = `${top}px`;
    popup.style.left = `${left}px`;
    const presetHtml = PRESETS.map(p =>
      `<button data-preset="${escapeHtml(p.label)}">${escapeHtml(p.label)}<span class="shortcut">⌘${p.key}</span></button>`
    ).join("");
    popup.innerHTML = `
      <div class="quote">${escapeHtml(anno.quote.slice(0, 240))}</div>
      <div class="preset-row">${presetHtml}</div>
      <textarea placeholder="…or type a custom comment (⌘+Enter to add)" autofocus></textarea>
      <div class="row">
        <button data-act="cancel">Cancel</button>
        <button class="primary" data-act="add">Add</button>
      </div>`;
    document.body.appendChild(popup);
    const ta = popup.querySelector("textarea");
    ta.focus();

    const commit = (comment) => {
      if (!comment || !comment.trim()) return;
      annotations.push({
        quote: anno.quote,
        prefix: anno.prefix,
        suffix: anno.suffix,
        msgIdx: anno.msgIdx,
        role: anno.role,
        comment: comment.trim(),
        savedAt: Date.now(),
      });
      saveAnnotations(currentSessionId, annotations);
      refreshDock();
      reapplyHighlights();
      window.getSelection().removeAllRanges();
      closePopup();
    };

    popup.querySelectorAll("[data-preset]").forEach(btn => {
      btn.addEventListener("click", () => commit(btn.dataset.preset));
    });
    popup.querySelector("[data-act='cancel']").addEventListener("click", closePopup);
    popup.querySelector("[data-act='add']").addEventListener("click", () => commit(ta.value));

    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault(); commit(ta.value);
      } else if ((e.metaKey || e.ctrlKey) && /^[1-4]$/.test(e.key)) {
        const preset = PRESETS.find(p => p.key === e.key);
        if (preset) { e.preventDefault(); commit(preset.label); }
      } else if (e.key === "Escape") {
        closePopup();
      }
    };
    ta.addEventListener("keydown", onKey);
    popup.addEventListener("keydown", onKey);
  }

  function closePopup() {
    if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
    popup = null;
  }

  document.addEventListener("mouseup", (e) => {
    if (popup && popup.contains(e.target)) return;
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) { closePopup(); return; }
      const anno = buildAnnotationFromSelection(sel);
      if (!anno) return;
      showPopup(anno);
    }, 0);
  });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closePopup(); });

  // ---- Annotation highlights -------------------------------------------
  function reapplyHighlights() {
    for (const a of annotations) {
      highlightOne(a);
    }
  }
  function highlightOne(a) {
    const msgEls = messagesEl.querySelectorAll(`.msg[data-idx="${a.msgIdx}"]`);
    if (!msgEls.length) return;
    const root = msgEls[0];

    // Collect all NON-already-highlighted text nodes and build a flat string
    // with offsets. This lets us find quotes that span across inline elements
    // like <code>, <strong>, etc. — markdown rendering splits text nodes at
    // every formatting boundary, so a single quote often crosses many nodes.
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        if (n.parentElement?.classList?.contains("anno")) return NodeFilter.FILTER_REJECT;
        // Skip script/style content (unlikely here but defensive)
        const tag = n.parentElement?.tagName;
        if (tag === "SCRIPT" || tag === "STYLE") return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      },
    });
    const nodes = [];
    const offsets = [];
    let full = "";
    let n;
    while ((n = walker.nextNode())) {
      offsets.push(full.length);
      nodes.push(n);
      full += n.nodeValue;
    }

    const idx = full.indexOf(a.quote);
    if (idx === -1) return;
    const endIdx = idx + a.quote.length;

    // Locate the start and end node + offset
    let startNode = null, startOffset = 0, endNode = null, endOffset = 0;
    for (let i = 0; i < nodes.length; i++) {
      const ns = offsets[i];
      const ne = ns + nodes[i].nodeValue.length;
      if (startNode === null && idx >= ns && idx < ne) {
        startNode = nodes[i]; startOffset = idx - ns;
      }
      if (endIdx > ns && endIdx <= ne) {
        endNode = nodes[i]; endOffset = endIdx - ns; break;
      }
    }
    if (!startNode || !endNode) return;

    const range = document.createRange();
    try {
      range.setStart(startNode, startOffset);
      range.setEnd(endNode, endOffset);
    } catch { return; }

    const mark = document.createElement("mark");
    mark.className = "anno";
    mark.title = a.comment;
    try {
      if (startNode === endNode) {
        // Single text node — simple wrap
        range.surroundContents(mark);
      } else {
        // Multi-node quote: surroundContents would throw "Range partially
        // selects a non-Text node"; extract + reinsert handles it cleanly.
        const contents = range.extractContents();
        mark.appendChild(contents);
        range.insertNode(mark);
      }
    } catch (err) {
      // If wrapping fails (e.g. quote crosses a block-level boundary),
      // silently skip — better no highlight than broken DOM.
      console.warn("highlight failed for quote:", a.quote.slice(0, 60), err);
    }
  }

  // ---- Dock (pending annotations panel) --------------------------------
  function refreshDock() {
    const n = annotations.length;
    dockCount.textContent = String(n);
    annoCount.textContent = String(n);
    sendBtn.disabled = n === 0;
    dock.style.display = n === 0 ? "none" : "flex";
    annoList.innerHTML = "";
    annotations.forEach((a, i) => {
      const card = document.createElement("div");
      card.className = "anno-card";
      card.innerHTML = `
        <div class="quote">${escapeHtml(a.quote.slice(0, 160))}</div>
        <div class="comment">${escapeHtml(a.comment)}</div>
        <div class="actions"><button data-i="${i}" data-act="del">Delete</button></div>`;
      annoList.appendChild(card);
    });
    annoList.querySelectorAll("[data-act='del']").forEach(btn => {
      btn.addEventListener("click", () => {
        const i = Number(btn.dataset.i);
        annotations.splice(i, 1);
        saveAnnotations(currentSessionId, annotations);
        refreshDock();
        renderMessages();
      });
    });
  }
  dockToggle.addEventListener("click", () => {
    dockPanel.classList.toggle("open");
    if (dockPanel.classList.contains("open") && currentDockTab === "sent") loadSentAnnotations();
  });
  dockClose.addEventListener("click", () => dockPanel.classList.remove("open"));

  // ---- Dock tabs (Pending / Sent) --------------------------------------
  let currentDockTab = "pending";
  function setDockTab(tab) {
    currentDockTab = tab;
    dockTabPending.classList.toggle("active", tab === "pending");
    dockTabSent.classList.toggle("active", tab === "sent");
    annoList.classList.toggle("hidden", tab !== "pending");
    sentList.classList.toggle("hidden", tab !== "sent");
    dockFoot.style.display = tab === "pending" ? "" : "none";
    if (tab === "sent") loadSentAnnotations();
  }
  dockTabPending.addEventListener("click", () => setDockTab("pending"));
  dockTabSent.addEventListener("click", () => setDockTab("sent"));

  async function loadSentAnnotations() {
    if (!currentSessionId) return;
    sentList.innerHTML = `<div class="sent-empty">Loading sent annotations…</div>`;
    try {
      const r = await fetch(`/annotations-for-session?session=${encodeURIComponent(currentSessionId)}&_=${Date.now()}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      renderSentAnnotations(data.annotations || []);
    } catch (err) {
      sentList.innerHTML = `<div class="sent-empty" style="color:#cf222e">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
  }

  function renderSentAnnotations(list) {
    sentCount.textContent = String(list.length);
    if (list.length === 0) {
      sentList.innerHTML = `<div class="sent-empty">No annotations sent yet for this session. Add some on the right, click "Send to Claude", then run <code>/review-annotations</code> in the CLI to see replies appear here.</div>`;
      return;
    }
    sentList.innerHTML = "";
    list.forEach((a) => {
      const card = document.createElement("div");
      card.className = "sent-card";
      const quote = a.element || a.selectedText || "(no quote)";
      const comment = a.comment || "";
      // The `thread` field may come back as a JSON string or already-parsed array
      let thread = a.thread;
      if (typeof thread === "string") {
        try { thread = JSON.parse(thread); } catch { thread = []; }
      }
      if (!Array.isArray(thread)) thread = [];
      // Reply messages from agentation: each has { id, role, content, timestamp }
      const replies = thread.filter(t => t && (t.content || t.message || t.text));

      const statusPills = [];
      const status = a.status || "pending";
      if (status === "resolved") {
        statusPills.push(`<span class="status-pill resolved">✓ resolved</span>`);
      } else if (status === "acknowledged") {
        statusPills.push(`<span class="status-pill acked">✓ acknowledged</span>`);
      } else {
        statusPills.push(`<span class="status-pill">${escapeHtml(status)}</span>`);
      }
      if (a.createdAt) {
        const when = formatRelative(Date.now() - new Date(a.createdAt).getTime());
        statusPills.push(`<span class="status-pill">${when}</span>`);
      }

      let repliesHtml = "";
      if (replies.length === 0) {
        repliesHtml = `<div class="sent-reply"><span class="who">Claude:</span><span class="sent-reply-text" style="color:var(--muted);font-style:italic">No reply yet — run <code>/review-annotations</code> in the CLI.</span></div>`;
      } else {
        repliesHtml = replies.map(r => {
          const role = r.role || "agent";
          const who = role === "agent" ? "Claude" : role === "user" ? "You" : role;
          const text = r.content || r.message || r.text || "";
          return `<div class="sent-reply"><span class="who">${escapeHtml(who)}:</span><span class="sent-reply-text">${escapeHtml(text)}</span></div>`;
        }).join("");
      }

      card.innerHTML = `
        <div class="sent-quote">${escapeHtml(String(quote).slice(0, 400))}</div>
        <div class="sent-comment"><span class="who">You:</span><span>${escapeHtml(comment)}</span></div>
        ${repliesHtml}
        <div class="status-row">${statusPills.join("")}</div>
      `;
      sentList.appendChild(card);
    });
  }

  // ---- Send to agentation ----------------------------------------------
  async function sendToAgentation() {
    if (annotations.length === 0) return;
    sendBtn.disabled = true;
    sendBtn.textContent = "Sending…";
    try {
      const sessUrl = `http://localhost:4850/?cc_session=${encodeURIComponent(currentSessionId)}`;
      // 1. Create agentation session tagged with cc_session
      const cr = await fetch("http://localhost:4747/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: sessUrl }),
      });
      if (!cr.ok) throw new Error(`create session: HTTP ${cr.status}`);
      const session = await cr.json();
      // 2. POST each annotation. agentation requires x/y (visual schema);
      // use 0/0 since we're annotating text not pixels. Stash text context in
      // selected_text + nearby_text for the slash-command to pick up.
      let posted = 0;
      for (const a of annotations) {
        const body = {
          x: 0,
          y: 0,
          timestamp: Date.now(),
          comment: a.comment,
          element: a.quote,
          elementPath: `msg:${a.msgIdx}:${a.role}`,
          selectedText: a.quote,
          nearbyText: `${a.prefix}…${a.suffix}`.trim(),
          url: `http://localhost:4850/?cc_session=${encodeURIComponent(currentSessionId)}&msg=${a.msgIdx}`,
        };
        const ar = await fetch(`http://localhost:4747/sessions/${session.id}/annotations`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (ar.ok) posted++;
      }
      // 3. Request action to fire the notification + webhook
      await fetch(`http://localhost:4747/sessions/${session.id}/action`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          output: `Review requested: ${posted} annotation(s) for cc_session ${currentSessionId}. Run /review-annotations in that session.`,
        }),
      });
      showToast(`Sent ${posted} annotation${posted === 1 ? "" : "s"} ✓  Run /review-annotations in your CLI`);
      annotations = [];
      clearAnnotationsStorage(currentSessionId);
      refreshDock();
      renderMessages();
      // Auto-switch to the Sent tab so the user immediately sees what they sent
      setDockTab("sent");
    } catch (err) {
      showToast("Send failed: " + err.message, true);
      sendBtn.disabled = false;
    } finally {
      sendBtn.textContent = "Send to Claude";
    }
  }
  sendBtn.addEventListener("click", sendToAgentation);
  clearBtn.addEventListener("click", () => {
    if (annotations.length === 0) return;
    if (!confirm(`Clear ${annotations.length} annotation(s)?`)) return;
    annotations = [];
    clearAnnotationsStorage(currentSessionId);
    refreshDock();
    renderMessages();
  });

  // ---- SSE -------------------------------------------------------------
  let reloadDebounce = null;
  function scheduleReload() {
    clearTimeout(reloadDebounce);
    reloadDebounce = setTimeout(loadTranscript, 500);
  }
  function startSSE() {
    if (es) { try { es.close(); } catch {} es = null; }
    if (!currentSessionId) return;
    es = new EventSource(`/events?session=${encodeURIComponent(currentSessionId)}`);
    es.addEventListener("update", scheduleReload);
    es.addEventListener("hello", () => {});
    // Session-list changes are now multiplexed onto the per-session stream so
    // each tab uses ONE SSE connection instead of two (Chrome only allows
    // 6 per origin — two streams × multiple tabs hit the cap fast).
    es.addEventListener("session-list-change", () => loadSessions());
    es.onopen = () => setLive(true);
    es.onerror = () => setLive(false);
  }

  // ---- Bootstrap -------------------------------------------------------
  (async () => {
    const sessions = await loadSessions();
    const sid = pickInitialSession(sessions);
    if (sid) {
      await setActiveSession(sid);
    } else {
      messagesEl.innerHTML = `<div class="empty">No sessions found yet.</div>`;
    }
    // session-list-change events are multiplexed onto the per-session SSE
    // (see startSSE) — one connection per tab, not two. Fallback poll only.
    setInterval(loadSessions, 30000);
  })();
</script>
</body>

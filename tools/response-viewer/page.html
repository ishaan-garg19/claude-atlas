        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fillRect(0, 0, w, h);
        // Tighter row spacing → more characters stacked per column.
        const ROW_H = 11;
        ctx.font = "11px ui-monospace, monospace";
        for (let i = 0; i < state.cols.length; i++) {
          const c = state.cols[i];
          c.y += c.speed;
          if (c.y - c.len * ROW_H > h) {
            c.y = -Math.random() * h;
            c.speed = 0.3 + Math.random() * 0.7;
            c.len = 20 + Math.floor(Math.random() * 28); // longer streamers
            c.buf = [];
          }
          for (let k = 0; k < c.len; k++) {
            const yy = c.y - k * ROW_H;
            if (yy < -20 || yy > h + 20) continue;
            if (!c.buf[k] || Math.random() < 0.025) {
              c.buf[k] = state.glyphs[(Math.random() * state.glyphs.length) | 0];
            }
            const ch = c.buf[k];
            const alpha = k === 0 ? 1.0 : Math.max(0, 0.92 - k * 0.045);
            ctx.fillStyle = k === 0
              ? `rgba(220, 255, 220, ${alpha.toFixed(2)})`
              : `rgba(60, 200, 100, ${alpha.toFixed(2)})`;
            ctx.fillText(ch, i * state.colW + 1, yy);
          }
        }
      },
    };

    // ----- Off / None (plain near-black canvas) -----
    // Pure #000 was too harsh — it pushed text contrast to a painful level
    // through the glass bubbles. Using a soft near-black instead so the
    // page reads as quiet rather than aggressive.
    const off = {
      init() {},
      tick(ctx) {
        ctx.fillStyle = palette.dark ? "#0a0f17" : "#e6ebf2";
        ctx.fillRect(0, 0, w, h);
      },
    };

    const themes = { constellation, galaxy, aurora, solarSystem, dna, ripples, flock, rain, audio, off };
    let currentName = localStorage.getItem("viewer:bgTheme");
    // `audio` was retired from the picker — silently migrate any old saved
    // value so users don't get an unexpected mic/share prompt on next load.
    if (currentName === "audio") currentName = "constellation";
    if (!themes[currentName]) currentName = "constellation";
    let state = {};

    function applyTheme(name) {
      if (!themes[name]) name = "constellation";
      // Release resources (mic, audio context) from the previous theme.
      try { themes[currentName]?.dispose?.(state); } catch {}
      currentName = name;
      localStorage.setItem("viewer:bgTheme", name);
      state = {};
      // Themes can be async (e.g. audio needs mic permission). Either form works.
      const r = themes[name].init(state, w, h);
      if (r && typeof r.then === "function") r.catch(() => {});
      document.querySelectorAll(".bg-popover button").forEach(b => {
        b.classList.toggle("active", b.dataset.theme === name);
      });
    }

    function resize() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state = {};
      themes[currentName].init(state, w, h);
    }
    resize();
    window.addEventListener("resize", () => {
      clearTimeout(resize._t);
      resize._t = setTimeout(resize, 120);
    });
    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
    }, { passive: true });
    window.addEventListener("mouseout", () => { mouse.active = false; });

    let running = !document.hidden;
    // Single-token RAF chain so multiple visibilitychange events (or other
    // restarts) can never run two animation loops in parallel — that was
    // causing the field to speed up every time the tab regained focus.
    let tickToken = 0;
    function startTickChain() {
      tickToken++;
      const myToken = tickToken;
      const loop = () => {
        if (myToken !== tickToken || !running) return;
        // rain + off paint their own opaque backdrop; everyone else wants a
        // clear-to-transparent each frame so the page bg shows through.
        if (currentName !== "rain" && currentName !== "off") ctx.clearRect(0, 0, w, h);
        themes[currentName].tick(ctx, state, mouse, w, h);
        drawThemeWatermark();
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }
    document.addEventListener("visibilitychange", () => {
      running = !document.hidden;
      if (running) startTickChain();
    });
    startTickChain();

    // Small clickable "theme name" watermark at the bottom-right of the
    // canvas — replaces the header bg button. Hit-testing handled via a
    // sibling DOM element so we don't need pointer-events on the canvas.
    function drawThemeWatermark() {
      const label = themeLabel(currentName);
      ctx.save();
      ctx.font = "600 11px ui-monospace, monospace";
      ctx.textBaseline = "alphabetic";
      const text = label;
      const padX = 14, padY = 14;
      const m = ctx.measureText(text);
      const tx = w - padX - m.width;
      const ty = h - padY;
      // Subtle pill
      const pillW = m.width + 18, pillH = 22;
      ctx.fillStyle = palette.dark ? "rgba(0, 0, 0, 0.35)" : "rgba(255, 255, 255, 0.45)";
      ctx.beginPath();
      const rx = w - padX - pillW + 9, ry = ty - 15;
      if (ctx.roundRect) ctx.roundRect(rx, ry, pillW, pillH, 10);
      else ctx.rect(rx, ry, pillW, pillH);
      ctx.fill();
      // Text
      ctx.fillStyle = palette.dark ? "rgba(220, 230, 255, 0.85)" : "rgba(40, 60, 100, 0.85)";
      ctx.fillText(text, tx, ty);
      ctx.restore();
      // Update the hit area to match
      if (themeHitEl) {
        themeHitEl.style.width = pillW + "px";
        themeHitEl.style.height = pillH + "px";
        themeHitEl.style.right = padX + "px";
        themeHitEl.style.bottom = (padY - 7) + "px";
      }
    }
    function themeLabel(name) {
      const labels = {
        constellation: "🕸️ Constellation",
        galaxy: "🌌 Milky Way",
        aurora: "🌈 Aurora",
        solarSystem: "🪐 Solar System",
        dna: "🧬 DNA helix",
        ripples: "💧 Wave interference",
        flock: "🐦 Flock",
        rain: "🌧️ Matrix rain",
        off: "⬛ None",
      };
      return labels[name] || name;
    }
    // DOM hit-area for the watermark — keeps the canvas pointer-events:none
    // but still lets a click open the picker.
    const themeHitEl = document.createElement("div");
    themeHitEl.id = "bg-theme-hit";
    themeHitEl.style.cssText = "position:fixed;z-index:1500;cursor:pointer;background:transparent;border-radius:10px;";
    document.body.appendChild(themeHitEl);
    themeHitEl.title = "Change background theme";

    // Wire the in-canvas watermark to open the picker. (Header button
    // exists as a fallback if present, but the watermark is primary.)
    const bgBtn = document.getElementById("toggle-bg");
    const bgPop = document.getElementById("bg-popover");
    if (bgPop) {
      // Re-anchor the popover to the watermark when opened via watermark.
      const openPicker = () => {
        bgPop.classList.add("open");
        // Position over the watermark (bottom-right of viewport) when opened
        // from there. Header-button path uses the original top-right anchor.
        bgPop.style.position = "fixed";
        bgPop.style.bottom = "44px";
        bgPop.style.right = "16px";
        bgPop.style.top = "auto";
      };
      themeHitEl.addEventListener("click", (e) => {
        e.stopPropagation();
        if (bgPop.classList.contains("open")) bgPop.classList.remove("open");
        else openPicker();
      });
      if (bgBtn) {
        bgBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          bgPop.style.position = ""; bgPop.style.bottom = "";
          bgPop.style.right = ""; bgPop.style.top = "";
          bgPop.classList.toggle("open");
        });
      }
      bgPop.querySelectorAll("button[data-theme]").forEach(b => {
        b.addEventListener("click", () => {
          applyTheme(b.dataset.theme);
          bgPop.classList.remove("open");
        });
      });
      document.addEventListener("click", (e) => {
        if (!bgPop.contains(e.target) && e.target !== bgBtn && e.target !== themeHitEl) {
          bgPop.classList.remove("open");
        }
      });
    }
    applyTheme(currentName);
  })();

  // ---- Bootstrap -------------------------------------------------------
  (async () => {
    const sessions = await loadSessions();
    const sid = pickInitialSession(sessions);
    if (sid) {
      await setActiveSession(sid);
    } else {
      messagesEl.innerHTML = `<div class="empty">No sessions found yet.</div>`;
    }
    // Now that every helper is defined, kick the rail's initial pane render.
    if (railActiveSection === "sent") loadSentAnnotations();
    if (railActiveSection === "pending") renderRailPending();
    // session-list-change events are multiplexed onto the per-session SSE
    // (see startSSE) — one connection per tab, not two. Fallback poll only.
    setInterval(loadSessions, 30000);
  })();
</script>
</body>
</html>

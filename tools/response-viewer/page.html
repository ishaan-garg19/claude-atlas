<script>
  marked.setOptions({
    breaks: true, gfm: true,
    highlight: function(code, lang) {
      if (lang && window.hljs && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value; } catch {}
      }
      if (window.hljs) { try { return hljs.highlightAuto(code).value; } catch {} }
      return code;
    },
  });

  const PRESETS = [
    { key: "1", label: "👎 Wrong" },
    { key: "2", label: "❓ Confusing" },
    { key: "3", label: "✨ Good" },
    { key: "4", label: "🤔 Question" },
  ];

  // ---- State -----------------------------------------------------------
  const messagesEl = document.getElementById("messages");

  // ---- Left rail (nav) -------------------------------------------------
  const rail = document.getElementById("rail");
  const railToggle = document.getElementById("rail-toggle");
  const railSessionsList = document.getElementById("rail-sessions-list");
  const railSessionsCount = document.getElementById("rail-sessions-count");
  const railProjects = document.getElementById("rail-projects");
  const railFilter = document.getElementById("rail-filter");
  const railRefresh = document.getElementById("rail-refresh");
  const railSearchInput = document.getElementById("rail-search-input");
  const railSearchResults = document.getElementById("rail-search-results");
  const railPendingList = document.getElementById("rail-pending-list");
  const railPendingCount = document.getElementById("rail-pending-count");
  const railSentList = document.getElementById("rail-sent-list");
  const railSentCount = document.getElementById("rail-sent-count");
  const railSendBtn = document.getElementById("rail-send-btn");
  const railClearBtn = document.getElementById("rail-clear-btn");
  const railSentRefresh = document.getElementById("rail-sent-refresh");
  const RAIL_COLLAPSED_KEY = "viewer:railCollapsed";
  const RAIL_SECTION_KEY = "viewer:railSection";
  let railActiveSection = localStorage.getItem(RAIL_SECTION_KEY) || "sessions";
  if (localStorage.getItem(RAIL_COLLAPSED_KEY) === "1") {
    document.body.classList.add("rail-collapsed");
  }
  function setRailSection(name) {
    railActiveSection = name;
    localStorage.setItem(RAIL_SECTION_KEY, name);
    document.querySelectorAll(".rail-section-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.section === name);
    });
    document.querySelectorAll(".rail-pane").forEach(p => {
      p.hidden = (p.dataset.pane !== name);
    });
    // If collapsed, expand the rail when a section is clicked.
    if (document.body.classList.contains("rail-collapsed")) {
      document.body.classList.remove("rail-collapsed");
      localStorage.setItem(RAIL_COLLAPSED_KEY, "0");
    }
    if (name === "sent") loadSentAnnotations();
    if (name === "pending") renderRailPending();
    if (name === "sessions") renderRailSessions();
  }
  document.querySelectorAll(".rail-section-btn").forEach(btn => {
    btn.addEventListener("click", () => setRailSection(btn.dataset.section));
  });
  railToggle.addEventListener("click", () => {
    const collapsed = document.body.classList.toggle("rail-collapsed");
    localStorage.setItem(RAIL_COLLAPSED_KEY, collapsed ? "1" : "0");
  });

  // ---- Rail resize: drag the right-edge handle to change rail width ----
  const RAIL_WIDTH_KEY = "viewer:railWidth";
  const RAIL_DEFAULT_W = 300;
  const RAIL_MIN_W = 200;
  const RAIL_MAX_W = 600;
  const railResizer = document.getElementById("rail-resizer");
  function applyRailWidth(w) {
    const clamped = Math.max(RAIL_MIN_W, Math.min(RAIL_MAX_W, w));
    document.body.style.setProperty("--rail-w", clamped + "px");
  }
  const savedRailWidth = parseInt(localStorage.getItem(RAIL_WIDTH_KEY) || "", 10);
  if (savedRailWidth) applyRailWidth(savedRailWidth);
  if (railResizer) {
    let startX = 0, startW = 0;
    const onMove = (e) => {
      const w = startW + (e.clientX - startX);
      applyRailWidth(w);
    };
    const onUp = () => {
      document.body.classList.remove("rail-resizing");
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      // Persist the final width.
      const cur = parseInt(getComputedStyle(document.body).getPropertyValue("--rail-w"), 10);
      if (cur) localStorage.setItem(RAIL_WIDTH_KEY, String(cur));
    };
    railResizer.addEventListener("mousedown", (e) => {
      if (document.body.classList.contains("rail-collapsed")) return;
      e.preventDefault();
      startX = e.clientX;
      startW = parseInt(getComputedStyle(document.body).getPropertyValue("--rail-w"), 10) || RAIL_DEFAULT_W;
      document.body.classList.add("rail-resizing");
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
    });
    railResizer.addEventListener("dblclick", () => {
      applyRailWidth(RAIL_DEFAULT_W);
      localStorage.setItem(RAIL_WIDTH_KEY, String(RAIL_DEFAULT_W));
    });
  }
  // Initial render is deferred to after the rest of the script (and the
  // helpers it depends on like renderPicker / renderRailPending) have all
  // been declared. We just paint the active pill state here.
  document.querySelectorAll(".rail-section-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.section === railActiveSection);
  });
  document.querySelectorAll(".rail-pane").forEach(p => {
    p.hidden = (p.dataset.pane !== railActiveSection);
  });

  const pickerBtn = document.getElementById("picker-btn");
  const pickerLabel = document.getElementById("picker-label");
  const pickerMenu = document.getElementById("picker-menu");
  const pickerList = document.getElementById("picker-list");
  const pickerFilter = document.getElementById("picker-filter");
  const pickerProjects = document.getElementById("picker-projects");
  const pickerRefresh = document.getElementById("picker-refresh");
  const countEl = document.getElementById("count");
  const liveEl = document.getElementById("live");
  const scrollBtn = document.getElementById("scroll-btn");
  const toggleThinkingBtn = document.getElementById("toggle-thinking");
  const toggleToolsBtn = document.getElementById("toggle-tools");
  const toggleTokensBtn = document.getElementById("toggle-tokens");
  const tokenPopover = document.getElementById("token-popover");
  const foldAllBtn = document.getElementById("fold-all-btn");
  const dock = document.getElementById("dock");
  const dockToggle = document.getElementById("dock-toggle");
  const dockPanel = document.getElementById("dock-panel");
  const dockClose = document.getElementById("dock-close");
  const dockCount = document.getElementById("dock-count");
  const annoCount = document.getElementById("anno-count");
  const annoList = document.getElementById("anno-list");
  const sendBtn = document.getElementById("send-btn");
  const clearBtn = document.getElementById("clear-btn");
  const toastEl = document.getElementById("toast");
  const dockTabPending = document.getElementById("dock-tab-pending");
  const dockTabSent = document.getElementById("dock-tab-sent");
  const sentList = document.getElementById("sent-list");
  const sentCount = document.getElementById("sent-count");
  const dockFoot = document.getElementById("dock-foot");

  let showThinking = true;
  let showTools = false;
  let showTokens = false;
  let foldAll = false;
  let stickyBottom = true;
  const DISPLAY_DEFAULT = 50;
  const DISPLAY_INCREMENT = 50;
  let displayCount = DISPLAY_DEFAULT;
  let currentSessionId = null;
  let lastMessages = [];
  let lastUsage = [];
  let annotations = [];
  let popup = null;
  let es = null;

  const params = new URLSearchParams(location.search);
  // Accept both ?session= and ?cc_session= so the /atlas slash command
  // (which uses the cc_session semantic for agentation parity) lands on the
  // right session instead of falling back to the last-viewed one.
  const urlSession = params.get("session") || params.get("cc_session");

  // ---- LocalStorage helpers --------------------------------------------
  const ANNO_KEY = (sid) => `viewer:annotations:${sid}`;
  const LAST_SESSION_KEY = "viewer:lastSession";

  function loadAnnotations(sid) {
    if (!sid) return [];
    try {
      const raw = JSON.parse(localStorage.getItem(ANNO_KEY(sid)) || "[]");
      // Dedup: same {msgIdx, quote, comment} only ever counts once.
      const seen = new Set();
      const deduped = [];
      for (const a of raw) {
        const key = `${a.msgIdx}|${a.quote}|${a.comment}`;
        if (seen.has(key)) continue;
        seen.add(key);
        deduped.push(a);
      }
      if (deduped.length !== raw.length) {
        // Persist the cleaned version so future loads are already deduped.
        try { localStorage.setItem(ANNO_KEY(sid), JSON.stringify(deduped)); } catch {}
      }
      return deduped;
    }
    catch { return []; }
  }
  function saveAnnotations(sid, list) {
    if (!sid) return;
    try { localStorage.setItem(ANNO_KEY(sid), JSON.stringify(list)); } catch {}
  }
  function clearAnnotationsStorage(sid) {
    if (!sid) return;
    try { localStorage.removeItem(ANNO_KEY(sid)); } catch {}
  }

  // ---- UI helpers ------------------------------------------------------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }
  function showToast(msg, isError = false) {
    toastEl.textContent = msg;
    toastEl.className = "toast show" + (isError ? " err" : "");
    setTimeout(() => { toastEl.className = "toast" + (isError ? " err" : ""); }, 2400);
  }
  function setLive(connected) {
    liveEl.classList.toggle("disconnected", !connected);
  }

  // ---- Sticky scroll ---------------------------------------------------
  window.addEventListener("scroll", () => {
    const nearBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200;
    stickyBottom = nearBottom;
    scrollBtn.classList.toggle("show", !nearBottom);
  });
  scrollBtn.addEventListener("click", () => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  });

  // ---- Toggles ---------------------------------------------------------
  toggleThinkingBtn.addEventListener("click", () => {
    showThinking = !showThinking;
    toggleThinkingBtn.classList.toggle("active", showThinking);
    renderMessages();
  });
  toggleToolsBtn.addEventListener("click", () => {
    showTools = !showTools;
    toggleToolsBtn.classList.toggle("active", showTools);
    renderMessages();
  });
  function refreshTokenPopover() {
    tokenPopover.innerHTML = "";
    const card = renderUsageCard();
    if (card) {
      tokenPopover.appendChild(card);
    } else {
      tokenPopover.innerHTML = `<div style="padding:18px;color:var(--muted);font-size:13px">No token usage logged for this session yet.</div>`;
    }
  }
  toggleTokensBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    showTokens = !showTokens;
    toggleTokensBtn.classList.toggle("active", showTokens);
    if (showTokens) {
      refreshTokenPopover();
      tokenPopover.classList.add("open");
    } else {
      tokenPopover.classList.remove("open");
    }
  });
  document.addEventListener("click", (e) => {
    if (!tokenPopover.contains(e.target) && !toggleTokensBtn.contains(e.target) && tokenPopover.classList.contains("open")) {
      tokenPopover.classList.remove("open");
      toggleTokensBtn.classList.remove("active");
      showTokens = false;
    }
  });
  foldAllBtn.addEventListener("click", () => {
    foldAll = !foldAll;
    foldAllBtn.classList.toggle("active", foldAll);
    foldAllBtn.textContent = foldAll ? "📂 unfold" : "📦 fold";
    document.querySelectorAll(".msg").forEach(el => {
      el.classList.toggle("collapsed", foldAll);
    });
  });

  // ---- Session picker --------------------------------------------------
  function formatRelative(ms) {
    if (ms == null || isNaN(ms)) return "";
    const sec = Math.round(ms / 1000);
    if (sec < 5) return "just now";
    if (sec < 60) return `${sec}s ago`;
    const min = Math.round(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.round(min / 60);
    if (hr < 24) return `${hr}h ago`;
    const day = Math.round(hr / 24);
    if (day < 30) return `${day}d ago`;
    const mo = Math.round(day / 30);
    if (mo < 12) return `${mo}mo ago`;
    return `${Math.round(mo / 12)}y ago`;
  }

  function bucket(mtime, now) {
    const d = new Date(mtime);
    const today = new Date(now);
    today.setHours(0, 0, 0, 0);
    const dDay = new Date(d); dDay.setHours(0, 0, 0, 0);
    const diffDays = Math.round((today - dDay) / 86400000);
    if (diffDays <= 0) return "Today";
    if (diffDays === 1) return "Yesterday";
    if (diffDays < 7) return "This week";
    if (diffDays < 30) return "This month";
    return "Older";
  }

  let allSessions = [];
  let filterText = "";
  const PROJECT_FILTER_KEY = "viewer:projectFilter";
  let projectFilter = localStorage.getItem(PROJECT_FILTER_KEY) || ""; // "" = All

  // Claude Code replaces BOTH `/` and `_` with `-` in project dir names,
  // so the disk name alone can't disambiguate `work_dupe` from `work-dupe`.
  // We rebuild a project → real cwd map from each session's JSONL `cwd`
  // and prefer that over the lossy dir name when rendering pretty labels.
  const projectCwdMap = new Map();
  function refreshProjectCwdMap() {
    projectCwdMap.clear();
    for (const s of allSessions) {
      if (s.cwd && s.project && !projectCwdMap.has(s.project)) {
        projectCwdMap.set(s.project, s.cwd);
      }
    }
  }
  function getHomePrefix() {
    for (const s of allSessions) {
      const c = s && s.cwd;
      if (!c) continue;
      const parts = c.split("/");
      if (parts[1] === "Users" && parts[2]) return "/Users/" + parts[2];
      if (parts[1] === "home"  && parts[2]) return "/home/"  + parts[2];
    }
    return null;
  }
  function prettyProject(p) {
    if (!p) return "(unknown)";
    const cwd = projectCwdMap.get(p);
    if (cwd) {
      const home = getHomePrefix() || "";
      if (cwd === home) return "~";
      if (cwd.startsWith(home + "/")) return cwd.slice(home.length + 1);
      return cwd;
    }
    const homeUser = (() => {
      for (const s of allSessions) {
        if (!s.cwd) continue;
        const m = s.cwd.match(/^\/(?:Users|home)\/([^\/]+)/);
        if (m) return m[1];
      }
      return null;
    })();
    if (homeUser) {
      const dirPrefix = "-Users-" + homeUser + "-";
      if (p === dirPrefix.slice(0, -1) + "--claude") return ".claude";
      if (p === dirPrefix.slice(0, -1)) return "~";
      return p.replace(new RegExp("^" + dirPrefix + "?"), "").replace(/-/g, "/").replace(/^\//, "") || p;
    }
    return p.replace(/^-(?:Users|home)-[^-]+-?/, "").replace(/-/g, "/").replace(/^\//, "") || p;
  }

  async function loadSessions() {
    try {
      const r = await fetch("/sessions");
      const data = await r.json();
      allSessions = data.sessions || [];
      refreshProjectCwdMap();
      renderPicker();
      syncTabTitle();
      return allSessions;
    } catch { return []; }
  }

  function renderProjectChips() {
    const projects = new Map(); // project -> count
    for (const s of allSessions) {
      const p = s.project || "(unknown)";
      projects.set(p, (projects.get(p) || 0) + 1);
    }
    pickerProjects.innerHTML = "";
    const allChip = document.createElement("button");
    allChip.type = "button";
    allChip.className = "chip" + (projectFilter === "" ? " active" : "");
    allChip.textContent = `All · ${allSessions.length}`;
    allChip.addEventListener("click", (e) => {
      e.stopPropagation();
      projectFilter = "";
      localStorage.setItem(PROJECT_FILTER_KEY, "");
      renderPicker();
    });
    pickerProjects.appendChild(allChip);
    // Sort projects by session count desc
    const sorted = [...projects.entries()].sort((a, b) => b[1] - a[1]);
    for (const [proj, count] of sorted) {
      const c = document.createElement("button");
      c.type = "button";
      c.className = "chip" + (projectFilter === proj ? " active" : "");
      c.textContent = `${prettyProject(proj)} · ${count}`;
      c.title = proj;
      c.addEventListener("click", (e) => {
        e.stopPropagation();
        projectFilter = proj;
        localStorage.setItem(PROJECT_FILTER_KEY, proj);
        renderPicker();
      });
      pickerProjects.appendChild(c);
    }
  }

  function renderPicker() {
    const now = Date.now();
    const q = filterText.trim().toLowerCase();
    renderProjectChips();
    const byProject = projectFilter
      ? allSessions.filter(s => s.project === projectFilter)
      : allSessions;
    const filtered = q
      ? byProject.filter(s => (s.preview || "").toLowerCase().includes(q) || s.id.includes(q))
      : byProject;

    // Pin the active session at the top so it's always one click away,
    // regardless of how recently it was updated.
    const activeIdx = currentSessionId
      ? filtered.findIndex(s => s.id === currentSessionId)
      : -1;
    const pinned = activeIdx >= 0 ? filtered[activeIdx] : null;
    const rest = pinned
      ? filtered.slice(0, activeIdx).concat(filtered.slice(activeIdx + 1))
      : filtered;

    // Group remainder by recency
    const groups = new Map();
    for (const s of rest) {
      const b = bucket(s.mtime, now);
      if (!groups.has(b)) groups.set(b, []);
      groups.get(b).push(s);
    }

    // Renders the same grouped session list into a target container.
    function paintInto(target) {
      target.innerHTML = "";
      if (filtered.length === 0) {
        target.innerHTML = `<div class="picker-empty">No sessions match "${escapeHtml(q)}"</div>`;
        return;
      }
      if (pinned) {
        const head = document.createElement("div");
        head.className = "picker-group-head pinned";
        head.textContent = "CURRENT · pinned";
        target.appendChild(head);
        target.appendChild(renderSessionCard(pinned, now));
      }
      for (const [groupName, items] of groups) {
        const head = document.createElement("div");
        head.className = "picker-group-head";
        head.textContent = `${groupName} · ${items.length}`;
        target.appendChild(head);
        for (const s of items) target.appendChild(renderSessionCard(s, now));
      }
    }
    paintInto(pickerList);
    paintInto(railSessionsList);
    if (railSessionsCount) railSessionsCount.textContent = String(allSessions.length);
    renderRailProjectChips();

    // Update the legacy (hidden) picker button label AND the visible header
    // crumb that replaced it.
    const active = allSessions.find(s => s.id === currentSessionId);
    const crumbProject = document.getElementById("crumb-project");
    const crumbTitle = document.getElementById("crumb-title");
    if (active) {
      const lbl = active.preview ? active.preview : `${active.id.slice(0, 8)}…`;
      pickerLabel.textContent = lbl.slice(0, 48);
      if (crumbProject) crumbProject.textContent = prettyProject(active.project);
      if (crumbTitle) {
        crumbTitle.textContent = lbl;
        crumbTitle.title = `${active.id}\n${active.project}`;
      }
    } else if (currentSessionId) {
      pickerLabel.textContent = `${currentSessionId.slice(0, 8)}…`;
      if (crumbTitle) crumbTitle.textContent = `${currentSessionId.slice(0, 8)}…`;
    } else {
      pickerLabel.textContent = "Pick a session";
      if (crumbTitle) crumbTitle.textContent = "No session";
    }
  }

  function renderRailSessions() { renderPicker(); }

  function renderRailProjectChips() {
    const sel = document.getElementById("rail-project-select");
    if (!sel) return;
    const projects = new Map();
    for (const s of allSessions) {
      const p = s.project || "(unknown)";
      projects.set(p, (projects.get(p) || 0) + 1);
    }
    const sorted = [...projects.entries()].sort((a, b) => b[1] - a[1]);
    const prev = sel.value;
    sel.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "";
    allOpt.textContent = `All projects · ${allSessions.length}`;
    sel.appendChild(allOpt);
    for (const [proj, count] of sorted) {
      const opt = document.createElement("option");
      opt.value = proj;
      opt.textContent = `${prettyProject(proj)} · ${count}`;
      opt.title = proj;
      sel.appendChild(opt);
    }
    sel.value = projectFilter || prev || "";
    if (!sel.dataset.wired) {
      sel.dataset.wired = "1";
      sel.addEventListener("change", () => {
        projectFilter = sel.value;
        localStorage.setItem(PROJECT_FILTER_KEY, projectFilter);
        renderPicker();

  // Mirror the rail filter into the same filterText state the dropdown uses.

    });

  // ---- Rail pending annotations -----------------------------------------
  function renderRailPending() {
    if (!railPendingList) return;
    railPendingCount.textContent = String(annotations.length);
    railSendBtn.disabled = annotations.length === 0;
    if (annotations.length === 0) {
      railPendingList.innerHTML = `<div class="rail-empty">Select text in a message and press <kbd>C</kbd> to annotate.</div>`;

        }</div>

  // ---- Rail AI batch headline regeneration -----------------------------
  const railAiBatch = document.getElementById("rail-ai-batch");
  const railAiProgress = document.getElementById("rail-ai-progress");
  if (railAiBatch) {
    railAiBatch.addEventListener("click", async () => {
      const autoCount = allSessions.filter(s => s.headlineSource === "auto").length;
      if (autoCount === 0) {
        showToast("No auto-extracted headlines to regenerate");
        return;
      }
      if (!confirm(`Generate AI titles for ${autoCount} session(s)?\nUses Claude haiku via your local CLI. Sequential, ~2s each.`)) return;
      railAiBatch.disabled = true;
      railAiProgress.hidden = false;
      railAiProgress.textContent = `Starting…`;
      try {
        const r = await fetch("/headlines/llm/batch?filter=auto", { method: "POST" });
        if (!r.body) throw new Error("no stream");
        const reader = r.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        let lastEvent = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const events = buf.split(/\n\n/);
          buf = events.pop() || "";
          for (const ev of events) {
            const lines = ev.split("\n");
            let evName = "", data = "";
            for (const l of lines) {
              if (l.startsWith("event: ")) evName = l.slice(7);
              else if (l.startsWith("data: ")) data = l.slice(6);
            }
            if (!data) continue;
            let payload; try { payload = JSON.parse(data); } catch { continue; }
            lastEvent = evName;
            if (evName === "start") {
              railAiProgress.textContent = `Generating 0 / ${payload.total}…`;
            } else if (evName === "progress") {
              if (payload.status === "done" && payload.headline) {
                railAiProgress.textContent = `${payload.done} / ${payload.total} · ${payload.headline.slice(0, 50)}`;
                await loadSessions();
              } else if (payload.status === "error") {
                railAiProgress.textContent = `${payload.done} / ${payload.total} · failed: ${payload.error?.slice(0, 60)}`;
              } else {
                railAiProgress.textContent = `${payload.done} / ${payload.total} · ${payload.status}…`;
              }
            } else if (evName === "complete") {
              railAiProgress.textContent = `Done · ${payload.succeeded} succeeded, ${payload.failed} failed`;
              await loadSessions();
              setTimeout(() => { railAiProgress.hidden = true; }, 4000);
            }
          }
        }
      } catch (err) {
        railAiProgress.textContent = `Error: ${err.message}`;
        showToast(`Batch failed: ${err.message}`, true);
      } finally {
        railAiBatch.disabled = false;
      }
    });
  }

  // ---- Rail search -------------------------------------------------------
  let railSearchTimer = null;
  if (railSearchInput) {

        }

  function renderRailSearchResults(matches, q) {
    if (!matches.length) {
      railSearchResults.innerHTML = `<div class="rail-empty">No matches for "${escapeHtml(q)}"</div>`;
      return;

    railSearchResults.innerHTML = "";

        </div></div>`;
      card.addEventListener("click", (e) => {
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
        e.preventDefault();
        setActiveSession(m.sessionId).then(() => jumpToMessage(m.msgIdx));
      });
      railSearchResults.appendChild(card);
    }
  }

  function renderSessionCard(s, now) {
    // Anchor so Cmd/Ctrl+click and right-click → "Open in new tab" work natively.
    const btn = document.createElement("a");
    btn.href = `/?session=${encodeURIComponent(s.id)}`;
    btn.className = "picker-item" + (s.id === currentSessionId ? " active" : "");
    btn.dataset.id = s.id;
    const preview = s.preview || `(no preview · ${s.id.slice(0, 8)}…)`;
    const updated = formatRelative(now - s.mtime);
    const age = s.firstMessageAt ? formatRelative(now - s.firstMessageAt) : null;
    const isLive = (now - s.mtime) < 60 * 1000;
    const projLabel = prettyProject(s.project);
    const pills = [
      `<span class="pill project" title="${escapeHtml(s.project || "")}">📁 ${escapeHtml(projLabel)}</span>`,
      `<span class="pill msgs">${s.messageCount} msgs</span>`,
      `<span class="pill ${isLive ? "live" : "updated"}" title="Last activity">${isLive ? "live" : updated}</span>`,
    ];
    if (age && age !== updated) pills.push(`<span class="pill age" title="Session age (first message)">${age.replace(" ago", " old")}</span>`);

    const cwdEsc = s.cwd ? s.cwd.replace(/"/g, '\\"') : null;
    const resumeCmd = cwdEsc
      ? `cd "${cwdEsc}" && claude --resume ${s.id}`
      : `claude --resume ${s.id}`;
    const isUserNamed = s.headlineSource === "user";
    const editIcon = isUserNamed ? "📝" : "✏️";
    const editTitle = isUserNamed
      ? "Edit headline (clear to reset to auto-extracted)"
      : "Set a custom headline for this session";
    const aiTitle = "Generate a topic title with AI (Claude haiku)";
    btn.innerHTML = `
      <div class="preview">${escapeHtml(preview)}</div>
      <div class="pills-row">
        <div class="pills">${pills.join("")}</div>
        <button class="ai-btn" type="button" title="${escapeHtml(aiTitle)}">✨</button>
        <button class="rename-btn" type="button" title="${escapeHtml(editTitle)}">${editIcon}</button>
        <button class="resume-btn" type="button" data-cmd="${escapeHtml(resumeCmd)}" title="Copy 'claude --resume' command for terminal · paste in your shell to resume this session">📋</button>
      </div>
    `;
    btn.addEventListener("click", (e) => {
      // The resume / rename / AI buttons have their own handlers — don't
      // activate the session if they click them.
      if (e.target.closest(".resume-btn") ||
          e.target.closest(".rename-btn") ||
          e.target.closest(".ai-btn")) return;
      // Let the browser handle modifier-clicks and middle-click — they should
      // open the link in a new tab/window/background tab natively.
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      e.preventDefault();
      closePicker();
      setActiveSession(s.id);
    });
    // Wire the copy-to-clipboard handler
    const resumeBtn = btn.querySelector(".resume-btn");
    resumeBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(resumeCmd);
        resumeBtn.classList.add("copied");
        resumeBtn.textContent = "✓";
        setTimeout(() => {
          resumeBtn.classList.remove("copied");
          resumeBtn.textContent = "📋";
        }, 1500);
      } catch (err) {
        resumeBtn.textContent = "✗";
        setTimeout(() => { resumeBtn.textContent = "📋"; }, 1500);
      }
    });
    // Rename: prompt with current headline pre-filled. Empty value = reset to
    // auto-extract. Non-empty value = persist as user-set headline.
    const renameBtn = btn.querySelector(".rename-btn");
    renameBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const current = s.preview || "";
      const input = window.prompt(
        "Headline for this session (clear and press OK to reset to auto-extracted):",
        current,
      );
      if (input === null) return; // cancelled
      const trimmed = input.trim();
      try {
        if (!trimmed) {
          await fetch(`/headlines?id=${encodeURIComponent(s.id)}`, { method: "DELETE" });
          showToast("Headline reset to auto");
        } else {
          await fetch("/headlines", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: s.id, headline: trimmed }),
          });
          showToast("Headline saved ✓");
        }
        await loadSessions();
        renderPicker();
      } catch (err) {
        showToast("Failed to update headline", true);
      }
    });
    // AI title: POST to /headlines/llm; small spinner during the call.
    const aiBtn = btn.querySelector(".ai-btn");
    aiBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (aiBtn.dataset.busy === "1") return;
      aiBtn.dataset.busy = "1";
      const original = aiBtn.textContent;
      aiBtn.textContent = "⏳";
      try {
        const r = await fetch("/headlines/llm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: s.id }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        if (data.skipped) {
          showToast(`Kept existing ${data.source} title (outranks AI)`);
        } else {
          showToast(`AI title: ${data.headline}`);
        }
        await loadSessions();
        renderPicker();
      } catch (err) {
        showToast(`AI rename failed: ${err.message}`, true);
      } finally {
        aiBtn.dataset.busy = "0";
        aiBtn.textContent = original;
      }
    });
    // Middle-click also opens in new tab natively — no handler needed; the
    // anchor's `href` does the work.
    // Full tooltip on hover
    const startStr = s.firstMessageAt ? new Date(s.firstMessageAt).toLocaleString() : "unknown";
    const updStr = new Date(s.mtime).toLocaleString();
    btn.title = `${s.id}\nStarted: ${startStr}\nLast activity: ${updStr}\nProject: ${s.project}`;
    return btn;
  }

  // ---- Cross-session search ---------------------------------------------
  const searchBtn = document.getElementById("search-btn");
  const searchOverlay = document.getElementById("search-overlay");
  const searchInput = document.getElementById("search-input");
  const searchResults = document.getElementById("search-results");
  let pendingJumpMsgIdx = null;
  let searchDebounce = null;

  function openSearch() {
    searchOverlay.classList.add("open");
    searchInput.value = "";
    searchResults.innerHTML = `<div class="search-status">Type at least 2 characters to search.</div>`;
    setTimeout(() => searchInput.focus(), 0);
  }
  function closeSearch() { searchOverlay.classList.remove("open"); }

  searchBtn.addEventListener("click", openSearch);
  searchOverlay.addEventListener("click", (e) => {
    if (e.target === searchOverlay) closeSearch();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && searchOverlay.classList.contains("open")) closeSearch();
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
      e.preventDefault();
      if (searchOverlay.classList.contains("open")) closeSearch(); else openSearch();
    }
  });

  function highlightHit(text, query) {
    const lower = text.toLowerCase();
    const needle = query.toLowerCase();
    const idx = lower.indexOf(needle);
    if (idx === -1) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx))
      + `<span class="hit">${escapeHtml(text.slice(idx, idx + needle.length))}</span>`
      + escapeHtml(text.slice(idx + needle.length));
  }

  let searchAbortController = null;
  async function runSearch(q) {
    if (q.length < 2) {
      searchResults.innerHTML = `<div class="search-status">Type at least 2 characters to search.</div>`;
      return;
    }
    // Abort any in-flight search so old requests can't overwrite newer results
    if (searchAbortController) { try { searchAbortController.abort(); } catch {} }
    searchAbortController = new AbortController();
    const myController = searchAbortController;
    searchResults.innerHTML = `<div class="search-status">Searching across all sessions…</div>`;
    const startedAt = performance.now();
    // 15s hard timeout in case the server gets wedged
    const timer = setTimeout(() => { try { myController.abort(); } catch {} }, 15000);
    try {
      // Cache-bust so an intermediate cache can't return stale results
      const r = await fetch(`/search?q=${encodeURIComponent(q)}&limit=100&_=${Date.now()}`, {
        signal: myController.signal,
        cache: "no-store",
      });
      clearTimeout(timer);
      if (myController !== searchAbortController) return; // a newer search started
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const matches = data.matches || [];
      const elapsedMs = Math.round(performance.now() - startedAt);
      if (matches.length === 0) {
        searchResults.innerHTML = `<div class="search-status">No matches for "${escapeHtml(q)}" (${elapsedMs}ms).</div>`;
        return;
      }
      searchResults.innerHTML = "";
      for (const m of matches) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "search-result";
        const previewText = (m.preview || m.sessionId.slice(0, 8)).slice(0, 60);
        const when = m.timestamp ? formatRelative(Date.now() - Date.parse(m.timestamp)) : formatRelative(Date.now() - m.mtime);
        item.innerHTML = `
          <div class="meta">
            <span class="role-pill ${m.role}">${m.role}</span>
            <span>${escapeHtml(prettyProject(m.project))}</span>
            <span>·</span>
            <span>${escapeHtml(previewText)}…</span>
            <span>·</span>
            <span>msg #${m.msgIdx}</span>
            <span>·</span>
            <span>${when}</span>
          </div>
          <div class="snippet">${highlightHit(m.snippet, q)}</div>
        `;
        item.addEventListener("click", () => {
          closeSearch();
          pendingJumpMsgIdx = m.msgIdx;
          if (m.sessionId !== currentSessionId) {
            setActiveSession(m.sessionId);
          } else {
            jumpToMessage(m.msgIdx);
          }
        });
        searchResults.appendChild(item);
      }
      const more = matches.length >= 100 ? ` (showing first 100)` : "";
      const head = document.createElement("div");
      head.className = "search-status";
      head.textContent = `${matches.length} match${matches.length === 1 ? "" : "es"}${more} · ${elapsedMs}ms`;
      searchResults.insertBefore(head, searchResults.firstChild);
    } catch (err) {
      clearTimeout(timer);
      if (err.name === "AbortError") {
        // Either superseded by a newer search or hit our 15s timeout
        if (myController === searchAbortController) {
          searchResults.innerHTML = `<div class="search-status">Search timed out after 15s. Try a more specific query, or check that the server is responsive.</div>`;
        }
      } else {
        searchResults.innerHTML = `<div class="search-status">Search failed: ${escapeHtml(err.message)}</div>`;
      }
    }
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    const q = searchInput.value;
    searchDebounce = setTimeout(() => runSearch(q.trim()), 180);
  });
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const first = searchResults.querySelector(".search-result");
      if (first) first.click();
    }
  });

  // Shared expansion helper — if the target message is hidden behind the
  // "Load earlier" pagination, bump displayCount and re-render before scroll.
  function ensureMessageRendered(idx) {
    const have = messagesEl.querySelector(`.msg[data-idx="${idx}"]`);
    if (have) return Promise.resolve();
    const total = lastMessages.length;
    if (idx < 0 || idx >= total) return Promise.resolve();
    displayCount = Math.max(displayCount, total - idx);
    stickyBottom = false;
    return renderMessages();
  }

  function jumpToMessage(idx, opts) {
    opts = opts || {};
    ensureMessageRendered(idx).then(() => {
      const el = messagesEl.querySelector(`.msg[data-idx="${idx}"]`);
      if (!el) return;
      // If a quote substring was supplied, scroll to its exact location inside
      // the message (and pulse it) — used by msg-link chips inside /rano output
      // that need to point to a SPECIFIC quoted span, not just the message top.
      let target = el;
      let pulseClass = "flash";
      if (opts.quote && typeof opts.quote === "string" && opts.quote.trim()) {
        const found = findTextInElement(el, opts.quote.trim());
        if (found) {
          target = found;
          pulseClass = "msg-link-pulse";
        }
      }
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      target.classList.remove(pulseClass);
      void target.offsetWidth;
      target.classList.add(pulseClass);
      setTimeout(() => target.classList.remove(pulseClass), 1800);
    });
  }

  // Locate a contiguous substring inside a message element and return a
  // transient <span> wrapping it, so we can scroll-into-view + pulse. Returns
  // null if the text doesn't appear or spans formatting boundaries the
  // Range API can't wrap.
  function findTextInElement(root, needle) {
    if (!needle) return null;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        if (n.parentElement?.closest("script, style, .msg-head, .msg-collapsed-hint")) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      },
    });
    const nodes = [];
    const offsets = [];
    let full = "";
    let n;
    while ((n = walker.nextNode())) {
      offsets.push(full.length);
      nodes.push(n);
      full += n.nodeValue;
    }
    // Try an exact match first; fall back to first 60 chars of the needle.
    let idx = full.indexOf(needle);
    if (idx === -1 && needle.length > 60) {
      idx = full.indexOf(needle.slice(0, 60));
    }
    if (idx === -1) return null;
    const len = needle.length > 60 ? 60 : needle.length;
    const endIdx = idx + len;
    let startNode = null, startOffset = 0, endNode = null, endOffset = 0;
    for (let i = 0; i < nodes.length; i++) {
      const ns = offsets[i];
      const ne = ns + nodes[i].nodeValue.length;
      if (startNode === null && idx >= ns && idx < ne) {
        startNode = nodes[i]; startOffset = idx - ns;
      }
      if (endIdx > ns && endIdx <= ne) {
        endNode = nodes[i]; endOffset = endIdx - ns; break;
      }
    }
    if (!startNode || !endNode) return null;
    const range = document.createRange();
    try {
      range.setStart(startNode, startOffset);
      range.setEnd(endNode, endOffset);
      const wrap = document.createElement("span");
      wrap.className = "msg-link-target";
      if (startNode === endNode) {
        range.surroundContents(wrap);
      } else {
        const contents = range.extractContents();
        wrap.appendChild(contents);
        range.insertNode(wrap);
      }
      // Auto-clean the wrapper after the pulse animation so we don't pile up
      // <span>s on every click.
      setTimeout(() => {
        if (wrap.parentNode) {
          const parent = wrap.parentNode;
          while (wrap.firstChild) parent.insertBefore(wrap.firstChild, wrap);
          parent.removeChild(wrap);
          parent.normalize?.();
        }
      }, 2400);
      return wrap;
    } catch { return null; }
  }

  // WhatsApp-style: clicking an annotation card scrolls the transcript to the
  // exact highlighted span and pulses it for a moment. If the message is in
  // a paginated-away region, expand pagination far enough to include it first.
  function jumpToAnnotation(a) {
    if (!a) return;
    ensureMessageRendered(a.msgIdx).then(() => {
      const key = annoKey(a);
      const mark = messagesEl.querySelector(`mark.anno[data-anno-key="${CSS.escape(key)}"]`);
      // If the mark exists, scroll to it. Otherwise fall through to the
      // quote-text search inside the message — handy when the annotation was
      // sent but never highlighted in this client (e.g. cross-machine view).
      if (mark) {
        mark.scrollIntoView({ behavior: "smooth", block: "center" });
        mark.classList.remove("anno-pulse");
        void mark.offsetWidth;
        mark.classList.add("anno-pulse");
        setTimeout(() => mark.classList.remove("anno-pulse"), 1800);
        return;
      }
      const msgEl = messagesEl.querySelector(`.msg[data-idx="${a.msgIdx}"]`);
      if (!msgEl) return;
      const inner = a.quote ? findTextInElement(msgEl, a.quote) : null;
      const target = inner || msgEl;
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      const cls = inner ? "msg-link-pulse" : "flash";
      target.classList.remove(cls);
      void target.offsetWidth;
      target.classList.add(cls);
      setTimeout(() => target.classList.remove(cls), 1800);
    });
  }

  function pickInitialSession(sessions) {
    if (urlSession && sessions.some(s => s.id === urlSession)) return urlSession;
    const last = localStorage.getItem(LAST_SESSION_KEY);
    if (last && sessions.some(s => s.id === last)) return last;
    return sessions[0]?.id || null;
  }

  async function setActiveSession(sid) {
    if (sid === currentSessionId) return;
    currentSessionId = sid;
    if (sid) {
      localStorage.setItem(LAST_SESSION_KEY, sid);
      const u = new URL(location.href);
      u.searchParams.set("session", sid);
      history.replaceState(null, "", u.toString());
    }
    annotations = loadAnnotations(sid);
    displayCount = DISPLAY_DEFAULT; // reset pagination on each session switch
    stickyBottom = true;
    refreshDock();
    renderPicker();
    syncTabTitle();
    await loadTranscript();
    startSSE();
  }

  // Keep the browser tab label in sync with the active session's headline.
  // Falls back to the generic Atlas title when no session is selected.
  function syncTabTitle() {
    const active = allSessions.find(s => s.id === currentSessionId);
    const head = (active && active.preview) ? active.preview : null;
    document.title = head ? `${head} — Atlas` : "Atlas · Claude sessions";
  }

  // ---- Transcript ------------------------------------------------------
  async function loadTranscript() {
    if (!currentSessionId) return;
    try {
      const r = await fetch(`/transcript?session=${encodeURIComponent(currentSessionId)}`);
      const data = await r.json();
      lastMessages = data.messages || [];
      lastUsage = data.usage || [];
      renderMessages();
    } catch (err) {
      messagesEl.innerHTML = `<div class="empty">Load failed: ${escapeHtml(err.message)}</div>`;
    }
  }

  let renderVersion = 0;
  const RENDER_BATCH = 25;
  async function renderMessages() {
    const myVersion = ++renderVersion;
    messagesEl.innerHTML = "";
    let rendered = 0;
    const total = lastMessages.length;

    // Pagination: only render the most recent `displayCount` messages.
    // Earlier messages are kept in memory but hidden behind a "Load earlier" button.
    const startIdx = Math.max(0, total - displayCount);
    const hiddenCount = startIdx;

    // "Load earlier" button at the top, if there are older messages off-screen.
    if (hiddenCount > 0) {
      const loadBtn = document.createElement("button");
      loadBtn.className = "load-earlier-btn";
      const loadN = Math.min(DISPLAY_INCREMENT, hiddenCount);
      loadBtn.textContent = `↑  Load ${loadN} earlier message${loadN === 1 ? "" : "s"}  (${hiddenCount} hidden of ${total} total)`;
      loadBtn.addEventListener("click", () => {
        displayCount += DISPLAY_INCREMENT;
        stickyBottom = false; // user wants context, don't auto-scroll to bottom
        renderMessages();
      });
      const loadAllBtn = document.createElement("button");
      loadAllBtn.className = "load-earlier-btn alt";
      loadAllBtn.textContent = `↑  Load all (${total})`;
      loadAllBtn.addEventListener("click", () => {
        displayCount = total;
        stickyBottom = false;
        renderMessages();
      });
      const bar = document.createElement("div");
      bar.className = "load-earlier-row";
      bar.appendChild(loadBtn);
      bar.appendChild(loadAllBtn);
      messagesEl.appendChild(bar);
    }

    // Status placeholder for long renders so the user knows it's working.
    let progressEl = null;
    const visibleCount = total - startIdx;
    if (visibleCount > RENDER_BATCH * 2) {
      progressEl = document.createElement("div");
      progressEl.className = "empty";
      progressEl.style.cssText = "margin:0 0 12px;padding:10px 14px;text-align:left;border-style:dashed;font-size:12px;";
      progressEl.textContent = `Rendering ${visibleCount} messages…`;
      messagesEl.appendChild(progressEl);
    }

    for (let i = startIdx; i < total; i += RENDER_BATCH) {
      if (myVersion !== renderVersion) return; // newer render started — bail
      const fragment = document.createDocumentFragment();
      const end = Math.min(i + RENDER_BATCH, total);
      for (let k = i; k < end; k++) {
        try {
          const el = renderMessage(lastMessages[k], k);
          if (el) { fragment.appendChild(el); rendered++; }
        } catch (err) {
          // Don't let a single bad message break the whole render.
          const errEl = document.createElement("article");
          errEl.className = "msg msg-assistant";
          errEl.dataset.idx = String(k);
          errEl.innerHTML = `<div class="msg-head" style="color:#cf222e">⚠ msg #${k} failed to render</div><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap">${escapeHtml(err.message || String(err))}</pre>`;
          fragment.appendChild(errEl);
          rendered++;
          console.error("renderMessage threw on msg", k, err);
        }
      }
      messagesEl.appendChild(fragment);
      if (progressEl) progressEl.textContent = `Rendering ${end - startIdx} / ${visibleCount}…`;
      // Yield so UI stays responsive
      if (end < total) {
        await new Promise(r => setTimeout(r, 0));
      }
    }

    if (myVersion !== renderVersion) return;
    if (progressEl) progressEl.remove();

    countEl.textContent = hiddenCount > 0 ? `${rendered}/${total}` : String(rendered);
    if (rendered === 0) {
      messagesEl.innerHTML = `<div class="empty">No visible messages in this session yet.</div>`;
    }
    // If the token popover is currently open, refresh its contents with the
    // latest usage data (matters on SSE transcript updates).
    if (tokenPopover.classList.contains("open")) refreshTokenPopover();
    addCopyButtons();
    linkifyMsgRefs();
    reapplyHighlights();
    if (pendingJumpMsgIdx !== null) {
      const idx = pendingJumpMsgIdx;
      pendingJumpMsgIdx = null;
      requestAnimationFrame(() => jumpToMessage(idx));
    } else if (stickyBottom) {
      requestAnimationFrame(() => window.scrollTo(0, document.body.scrollHeight));
    }
  }

  // Customize these if you want different labels (e.g. "Alex" instead of "You")
  const USER_NAME = "You";
  const ASSISTANT_NAME = "Claude";
  const USER_INITIAL = USER_NAME.charAt(0).toUpperCase();
  const ASSISTANT_INITIAL = ASSISTANT_NAME.charAt(0).toUpperCase();

  function formatTimestamp(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    if (Number.isNaN(d.getTime())) return "";
    const now = new Date();
    const sameYear = d.getFullYear() === now.getFullYear();
    const datePart = d.toLocaleString("en-US", {
      month: "short",
      day: "numeric",
      ...(sameYear ? {} : { year: "numeric" }),
    });
    const timePart = d.toLocaleString("en-US", {
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
    });
    return `${datePart} · ${timePart}`;
  }

  function renderMessage(m, idx) {
    const wrap = document.createElement("article");
    wrap.className = `msg msg-${m.role}`;
    wrap.dataset.idx = String(idx);
    const head = document.createElement("div");
    head.className = "msg-head";
    const isUser = m.role === "user";
    const name = isUser ? USER_NAME : ASSISTANT_NAME;
    const initial = isUser ? USER_INITIAL : ASSISTANT_INITIAL;
    const tsStr = formatTimestamp(m.timestamp);
    head.innerHTML = `<span class="avatar ${isUser ? "user" : "assistant"}">${escapeHtml(initial)}</span><span>${escapeHtml(name)}</span><span class="head-right">${tsStr ? `<span class="timestamp">${escapeHtml(tsStr)}</span>` : ""}<button class="fold-toggle" title="Fold / unfold this message">▾</button></span>`;
    head.querySelector(".fold-toggle").addEventListener("click", (e) => {
      e.stopPropagation();
      wrap.classList.toggle("collapsed");
    });
    // Whole-header click also toggles (more discoverable). Ignore clicks on the
    // chevron itself (it handles its own click above).
    head.addEventListener("click", (e) => {
      if (e.target.closest(".fold-toggle")) return;
      wrap.classList.toggle("collapsed");
    });
    head.style.cursor = "pointer";
    wrap.appendChild(head);

    // Hint shown only when collapsed
    const hint = document.createElement("div");
    hint.className = "msg-collapsed-hint";
    hint.textContent = "(folded — click header to expand)";
    wrap.appendChild(hint);

    if (foldAll) wrap.classList.add("collapsed");

    // Auto-fold artifacts of verbose slash commands. Claude Code records a
    // slash invocation as TWO consecutive messages:
    //   1. user — `<command-name>/rano</command-name>` (the invocation)
    //   2. user — the full expanded prompt template (huge wall of text)
    //   3. assistant — the actual response
    // Fold both #2 (the template) and #3 (the response) so the transcript
    // stays readable. We do this by scanning a small window before this
    // message for the original `<command-name>` invocation.
    const SLASH_VERBOSE = /<command-name>\s*\/(rano|handoff|atlas-headlines)\b/i;
    function nthBackText(n) {
      const prev = lastMessages[idx - n];
      if (!prev) return "";
      return (prev.content || [])
        .filter(p => p && p.type === "text" && typeof p.text === "string")
        .map(p => p.text)
        .join(" ");
    }
    const followsVerbose = SLASH_VERBOSE.test(nthBackText(1))
                        || SLASH_VERBOSE.test(nthBackText(2))
                        || SLASH_VERBOSE.test(nthBackText(3));
    if (followsVerbose && idx > 0) {
      // Skip the original invocation itself (short) — only fold #2 and #3.
      const selfText = (m.content || [])
        .filter(p => p && p.type === "text" && typeof p.text === "string")
        .map(p => p.text)
        .join(" ");
      if (!SLASH_VERBOSE.test(selfText)) {
        wrap.classList.add("collapsed");
      }
    }

    let hasVisible = false;
    for (const part of (m.content || [])) {
      if (part.type === "text") {
        const text = part.text || "";
        if (!text.trim()) continue;
        const div = document.createElement("div");
        div.className = "md";
        div.innerHTML = marked.parse(text);
        wrap.appendChild(div);
        hasVisible = true;
      } else if (part.type === "thinking") {
        if (!showThinking) continue;
        const body = part.thinking || part.text || "";
        // Hide empty/redacted thinking blocks (signature-only stubs)
        if (!body.trim()) continue;
        const details = document.createElement("details");
        details.className = "thinking";
        details.open = true; // Expanded by default — fold individually if desired
        const summary = document.createElement("summary");
        summary.textContent = "💭 thinking";
        details.appendChild(summary);
        const bodyEl = document.createElement("div");
        bodyEl.className = "md thinking-body";
        bodyEl.innerHTML = marked.parse(body);
        details.appendChild(bodyEl);
        wrap.appendChild(details);
        hasVisible = true;
      } else if (part.type === "tool_use") {
        if (!showTools) continue;
        const diffEl = renderToolDiff(part);
        if (diffEl) {
          wrap.appendChild(diffEl);
        } else {
          wrap.appendChild(renderToolCollapsible(part));
        }
        hasVisible = true;
      }
    }
    return hasVisible ? wrap : null;
  }

  function fmtTokens(n) {
    if (n == null) return "—";
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 1_000) return (n / 1_000).toFixed(n >= 10_000 ? 0 : 1) + "k";
    return String(n);
  }

  // Approximate Anthropic Opus 4.x pricing per million tokens (USD).
  // Pricing changes; treat the cost number as a rough estimate, not a bill.
  const PRICE_PER_M = { input: 15, cacheCreation: 18.75, cacheRead: 1.50, output: 75 };

  function estimateCost(usage) {
    let usd = 0;
    for (const u of usage) {
      usd += (u.input * PRICE_PER_M.input) / 1_000_000;
      usd += (u.cacheCreation * PRICE_PER_M.cacheCreation) / 1_000_000;
      usd += (u.cacheRead * PRICE_PER_M.cacheRead) / 1_000_000;
      usd += (u.output * PRICE_PER_M.output) / 1_000_000;
    }
    return usd;
  }

  function fmtUsd(n) {
    if (n < 0.01) return "<$0.01";
    if (n < 1) return "$" + n.toFixed(2);
    if (n < 100) return "$" + n.toFixed(2);
    return "$" + n.toFixed(0);
  }

  function fmtDuration(ms) {
    if (!ms || ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m`;
    return `${s}s`;
  }

  function inferContextWindow(usage) {
    // Opus 4.7 has a 200k default; `opus[1m]` variant gets 1M.
    // Heuristic: if we've ever seen >250k in this session's prompts, must be 1M.
    const peak = Math.max(0, ...usage.map(u => u.contextSize));
    return peak > 250_000 ? 1_000_000 : 200_000;
  }

  function renderUsageCard() {
    if (!lastUsage || lastUsage.length === 0) return null;
    const last = lastUsage[lastUsage.length - 1];
    const totalOut = lastUsage.reduce((s, u) => s + u.output, 0);
    const totalIn = lastUsage.reduce((s, u) => s + u.input, 0);
    const totalCacheRead = lastUsage.reduce((s, u) => s + u.cacheRead, 0);
    const totalCacheCreation = lastUsage.reduce((s, u) => s + u.cacheCreation, 0);
    const totalCache = totalCacheRead + totalCacheCreation;
    const cacheHitRate = totalCache > 0 ? Math.round((totalCacheRead / totalCache) * 100) : 0;

    // Context window math
    const ctxWindow = inferContextWindow(lastUsage);
    const ctxUsed = last.contextSize;
    const ctxRemaining = Math.max(0, ctxWindow - ctxUsed);
    const ctxPct = ctxWindow > 0 ? Math.min(100, Math.round((ctxUsed / ctxWindow) * 100)) : 0;
    const ctxFillClass = ctxPct >= 80 ? "alert" : ctxPct >= 60 ? "warn" : "";

    // Cost estimate
    const usd = estimateCost(lastUsage);
    const costPerTurn = lastUsage.length > 0 ? usd / lastUsage.length : 0;

    // Session stats
    const firstTs = lastUsage[0]?.timestamp ? Date.parse(lastUsage[0].timestamp) : null;
    const lastTs = lastUsage[lastUsage.length - 1]?.timestamp ? Date.parse(lastUsage[lastUsage.length - 1].timestamp) : null;
    const durationMs = (firstTs && lastTs) ? lastTs - firstTs : null;
    const avgContext = lastUsage.reduce((s, u) => s + u.contextSize, 0) / lastUsage.length;
    const avgOutput = totalOut / lastUsage.length;

    // Sparkline
    const w = 460, h = 50, pad = 4;
    const contexts = lastUsage.map(u => u.contextSize);
    const max = Math.max(...contexts, 1);
    const n = contexts.length;
    const stepX = n > 1 ? (w - pad * 2) / (n - 1) : 0;
    const points = contexts.map((c, i) => {
      const x = pad + i * stepX;
      const y = h - pad - (c / max) * (h - pad * 2);
      return [x, y];
    });
    const linePath = points.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
    const areaPath = linePath + ` L${(pad + (n - 1) * stepX).toFixed(1)},${h - pad} L${pad},${h - pad} Z`;

    const card = document.createElement("div");
    card.className = "usage-card";
    card.innerHTML = `
      <div class="usage-title">Token usage</div>

      <div class="usage-window">
        <div class="row1">
          <span class="left"><strong>${ctxPct}%</strong> of context window used</span>
          <span class="right">${fmtTokens(ctxUsed)} / ${fmtTokens(ctxWindow)}</span>
        </div>
        <div class="bar"><div class="fill ${ctxFillClass}" style="width:${ctxPct}%"></div></div>
        <div class="meta">
          <span>${fmtTokens(ctxRemaining)} remaining</span>
          <span>${ctxPct >= 80 ? "⚠ near limit — compaction may kick in" : ctxPct >= 60 ? "watch — context filling" : "plenty of room"}</span>
        </div>
      </div>

      <div class="usage-cost-row">
        <div>
          <div class="cost-num">${fmtUsd(usd)}</div>
          <div class="cost-sub">estimated cost so far (Opus pricing, approximate)</div>
        </div>
        <div style="text-align:right">
          <div class="cost-num" style="font-size:14px">${fmtUsd(costPerTurn)}</div>
          <div class="cost-sub">avg per turn</div>
        </div>
      </div>

      <div class="usage-stats">
        <span class="icon">🔁</span>
        <span class="label">Assistant turns</span>
        <span class="value">${n}</span>

        <span class="icon">⏱️</span>
        <span class="label">Session duration</span>
        <span class="value">${fmtDuration(durationMs)}</span>

        <span class="icon">📏</span>
        <span class="label">Avg context per turn</span>
        <span class="value">${fmtTokens(Math.round(avgContext))}</span>

        <span class="icon">✍️</span>
        <span class="label">Avg output per turn</span>
        <span class="value">${fmtTokens(Math.round(avgOutput))}</span>

        <span class="icon">📈</span>
        <span class="label">Cache hit rate</span>
        <span class="value">${cacheHitRate}%</span>
      </div>

      <div class="latest">
        <span class="num">${fmtTokens(last.contextSize)}</span>
        in prompt this turn
        <div class="sub">= ${fmtTokens(last.input)} fresh + ${fmtTokens(last.cacheCreation)} cache-write + ${fmtTokens(last.cacheRead)} cache-read</div>
      </div>

      <div class="totals">
        <span class="icon">📝</span>
        <span class="label">Fresh input <span class="hint">— new user/system text</span></span>
        <span class="value">${fmtTokens(totalIn)}</span>

        <span class="icon">💾</span>
        <span class="label">Cache writes <span class="hint">— one-time prompt-cache fills</span></span>
        <span class="value">${fmtTokens(totalCacheCreation)}</span>

        <span class="icon">⚡</span>
        <span class="label">Cache reads <span class="hint">— cheap replays (≈10% cost)</span></span>
        <span class="value">${fmtTokens(totalCacheRead)}</span>

        <span class="icon">💬</span>
        <span class="label">Output <span class="hint">— Claude's generated tokens</span></span>
        <span class="value">${fmtTokens(totalOut)}</span>
      </div>

      <div class="spark-row" title="Prompt size per assistant turn; peak ${fmtTokens(max)}">
        <div class="spark-caption">Prompt size<br>per turn →</div>
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="flex:1">
          <path class="area" d="${areaPath}" />
          <path class="line" d="${linePath}" />
          <text class="axis-label" x="${pad}" y="${h - 1}" text-anchor="start">turn 1</text>
          <text class="axis-label" x="${w - pad}" y="${h - 1}" text-anchor="end">turn ${n} · peak ${fmtTokens(max)}</text>
        </svg>
      </div>
    `;
    return card;
  }

  function renderToolCollapsible(part) {
    const name = part.name || "tool";
    const input = part.input || {};

    // Build a sensible one-line preview for the summary
    let preview = "";
    if (name === "Bash" && typeof input.command === "string") {
      preview = input.command.replace(/\s+/g, " ").trim();
    } else if (input.file_path) {
      preview = String(input.file_path);
    } else if (input.path) {
      preview = String(input.path);
    } else if (input.url) {
      preview = String(input.url);
    } else if (typeof input.pattern === "string") {
      preview = input.pattern;
    } else if (typeof input.query === "string") {
      preview = input.query;
    } else {
      preview = JSON.stringify(input);
    }

    const details = document.createElement("details");
    details.className = "tool";
    const summary = document.createElement("summary");
    summary.innerHTML = `🔧 <span class="tool-name">${escapeHtml(name)}</span><span class="tool-args-preview">${escapeHtml(preview)}</span>`;
    details.appendChild(summary);

    // Body — full content, formatted per tool type
    const body = document.createElement("div");
    body.className = "tool-body";

    if (name === "Bash" && typeof input.command === "string") {
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.className = "language-bash";
      code.textContent = input.command;
      if (window.hljs) {
        try { code.innerHTML = hljs.highlight(input.command, { language: "bash", ignoreIllegals: true }).value; } catch {}
      }
      pre.appendChild(code);
      body.appendChild(pre);
      const meta = [];
      if (input.description) meta.push(`<strong>description:</strong> ${escapeHtml(input.description)}`);
      if (input.timeout) meta.push(`<strong>timeout:</strong> ${escapeHtml(String(input.timeout))}ms`);
      if (input.run_in_background) meta.push(`<strong>background:</strong> yes`);
      if (meta.length) {
        const m = document.createElement("div");
        m.className = "tool-meta";
        m.innerHTML = meta.join(" · ");
        body.appendChild(m);
      }
    } else {
      // Pretty-print full input as JSON
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.className = "language-json";
      const formatted = JSON.stringify(input, null, 2);
      code.textContent = formatted;
      if (window.hljs) {
        try { code.innerHTML = hljs.highlight(formatted, { language: "json", ignoreIllegals: true }).value; } catch {}
      }
      pre.appendChild(code);
      body.appendChild(pre);
    }

    details.appendChild(body);
    return details;
  }

  function renderToolDiff(part) {
    const name = part.name || "";
    const input = part.input || {};
    if (!window.Diff) return null;
    if (name === "Edit" && typeof input.old_string === "string" && typeof input.new_string === "string") {
      return buildDiffElement({
        label: input.replace_all ? "Edit (replace_all)" : "Edit",
        file: input.file_path || "",
        old: input.old_string,
        new: input.new_string,
      });
    }
    if (name === "MultiEdit" && Array.isArray(input.edits) && input.file_path) {
      const wrap = document.createElement("div");
      input.edits.forEach((e, i) => {
        const piece = buildDiffElement({
          label: `MultiEdit · edit ${i + 1}/${input.edits.length}`,
          file: input.file_path,
          old: e.old_string || "",
          new: e.new_string || "",
        });
        wrap.appendChild(piece);
      });
      return wrap;
    }
    if (name === "Write" && typeof input.content === "string") {
      return buildDiffElement({
        label: "Write",
        file: input.file_path || "",
        old: "",
        new: input.content,
      });
    }
    if (name === "NotebookEdit" && typeof input.new_source === "string") {
      return buildDiffElement({
        label: "NotebookEdit",
        file: input.notebook_path || "",
        old: input.old_source || "",
        new: input.new_source,
      });
    }
    return null;
  }

  function buildDiffElement({ label, file, old, new: ne }) {
    const wrap = document.createElement("div");
    wrap.className = "tool-diff";
    const head = document.createElement("div");
    head.className = "tool-diff-head";
    head.innerHTML = `🔧 <span class="name">${escapeHtml(label)}</span><span class="file">${escapeHtml(file)}</span>`;
    wrap.appendChild(head);

    const body = document.createElement("div");
    body.className = "tool-diff-body";

    if (old === "" && ne) {
      // Write or full content: show as all-add lines
      const lines = ne.split("\n");
      lines.forEach(l => {
        const ln = document.createElement("div");
        ln.className = "tool-diff-line add";
        ln.textContent = l;
        body.appendChild(ln);
      });
    } else if (!ne && old) {
      // pure deletion
      const lines = old.split("\n");
      lines.forEach(l => {
        const ln = document.createElement("div");
        ln.className = "tool-diff-line del";
        ln.textContent = l;
        body.appendChild(ln);
      });
    } else {
      const parts = window.Diff.diffLines(old, ne);
      // Render with limited context — collapse runs of equal lines longer than 6
      let hasAny = false;
      for (const p of parts) {
        const lines = p.value.split("\n");
        // diffLines often leaves a trailing empty entry; drop it
        if (lines.length > 0 && lines[lines.length - 1] === "") lines.pop();
        const cls = p.added ? "add" : p.removed ? "del" : "ctx";
        if (cls === "ctx" && lines.length > 6) {
          // Keep first 3 and last 3
          [...lines.slice(0, 3), null, ...lines.slice(-3)].forEach((l) => {
            const ln = document.createElement("div");
            if (l === null) {
              ln.className = "tool-diff-line ctx";
              ln.textContent = `…  (${lines.length - 6} unchanged lines)`;
              ln.style.fontStyle = "italic";
            } else {
              ln.className = `tool-diff-line ${cls}`;
              ln.textContent = l;
            }
            body.appendChild(ln);
          });
          hasAny = true;
        } else {
          for (const l of lines) {
            const ln = document.createElement("div");
            ln.className = `tool-diff-line ${cls}`;
            ln.textContent = l;
            body.appendChild(ln);
            hasAny = true;
          }
        }
      }
      if (!hasAny) {
        const ln = document.createElement("div");
        ln.className = "tool-diff-empty";
        ln.textContent = "(no changes)";
        body.appendChild(ln);
      }
    }

    wrap.appendChild(body);
    return wrap;
  }

  // Convert any "msg #<digits>" text inside rendered markdown into a clickable
  // chip that jumps to that message. When the chip appears inside a /rano
  // annotation block (e.g. `> Quote (msg #248, assistant): "..."`), we also
  // capture the quoted text so the click jumps to the EXACT span, not just
  // the message top.
  function linkifyMsgRefs() {
    if (lastMessages.length === 0) return;
    const max = lastMessages.length - 1;
    // Find every text node containing "msg #N" — but BEFORE rewriting, scan
    // the parent block for an accompanying Quote: "..." snippet so each chip
    // can carry its own quote payload.
    const walker = document.createTreeWalker(messagesEl, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        if (!node.nodeValue) return NodeFilter.FILTER_REJECT;
        if (node.parentElement?.closest("a, button, .msg-link")) return NodeFilter.FILTER_REJECT;
        if (node.parentElement?.closest("pre, code")) return NodeFilter.FILTER_REJECT;
        if (node.parentElement?.closest("mark.anno")) return NodeFilter.FILTER_REJECT;
        return /\bmsg\s*#(\d+)/i.test(node.nodeValue)
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_REJECT;
      },
    });
    const matches = [];
    let n;
    while ((n = walker.nextNode())) matches.push(n);
    for (const textNode of matches) {
      // Look at the nearest block-ish ancestor's full text to find the quote
      // associated with this msg #N (if any). Pattern emitted by /rano:
      //   **Quote** (msg #248, assistant): "...the quoted text..."
      const block = textNode.parentElement?.closest("blockquote, p, li, div, section") || textNode.parentElement;
      const blockText = block ? (block.innerText || block.textContent || "") : "";
      // Capture pattern: msg #248, role): "..."  → group 1 = msg id, group 2 = quote
      const quoteByMsg = new Map();
      const qre = /msg\s*#(\d+)[^"]{0,80}"([^"]{1,400})"/gi;
      let qm;
      while ((qm = qre.exec(blockText))) {
        quoteByMsg.set(qm[1], qm[2]);
      }
      const text = textNode.nodeValue;
      const re = /\bmsg\s*#(\d+)/gi;
      let last = 0;
      const frag = document.createDocumentFragment();
      let m;
      while ((m = re.exec(text))) {
        const idx = Number(m[1]);
        if (idx < 0 || idx > max) continue;
        if (m.index > last) {
          frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        const a = document.createElement("button");
        a.type = "button";
        a.className = "msg-link";
        a.textContent = m[0];
        a.title = quoteByMsg.has(m[1])
          ? `Jump to the quoted span in message #${idx}`
          : `Jump to message #${idx}`;
        a.dataset.msgIdx = String(idx);
        const q = quoteByMsg.get(m[1]);
        if (q) a.dataset.quote = q;
        frag.appendChild(a);
        last = m.index + m[0].length;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      if (frag.childNodes.length > 0) textNode.parentNode.replaceChild(frag, textNode);
    }
    if (!linkifyMsgRefs._wired) {
      linkifyMsgRefs._wired = true;
      messagesEl.addEventListener("click", (e) => {
        const link = e.target.closest(".msg-link");
        if (!link) return;
        e.preventDefault();
        const idx = Number(link.dataset.msgIdx);
        if (!Number.isFinite(idx)) return;
        const quote = link.dataset.quote || null;
        jumpToMessage(idx, quote ? { quote } : undefined);
      });
    }
  }

  function addCopyButtons() {
    // Block code: copy button (visible on hover)
    // Wrap the <pre> in a non-scrolling .code-block so the label/button
    // can be absolute-positioned against the wrapper and stay glued to the
    // visible right edge — independent of how far the <pre> is scrolled.
    document.querySelectorAll(".md pre").forEach(pre => {
      const alreadyWrapped = pre.parentElement && pre.parentElement.classList.contains("code-block");
      const host = alreadyWrapped ? pre.parentElement : null;
      if (host && host.querySelector(":scope > .copy-btn")) return;
      const code = pre.querySelector("code");
      if (!code) return;
      let wrapper = host;
      if (!wrapper) {
        wrapper = document.createElement("div");
        wrapper.className = "code-block";
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
      }
      const lang = (code.className.match(/language-([\w-]+)/) || [])[1];
      if (lang && !wrapper.querySelector(":scope > .lang-label")) {
        const label = document.createElement("span");
        label.className = "lang-label";
        label.textContent = lang;
        wrapper.appendChild(label);
      }
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.classList.add("copied");
          btn.textContent = "Copied ✓";
          setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "Copy"; }, 1500);
        }).catch(() => { btn.textContent = "✗"; setTimeout(() => { btn.textContent = "Copy"; }, 1500); });
      });
      wrapper.appendChild(btn);
    });

    // Inline code: click-to-copy
    document.querySelectorAll(".md code").forEach(code => {
      if (code.parentElement && code.parentElement.tagName === "PRE") return; // block code already handled
      if (code.dataset.copyWired) return;
      code.dataset.copyWired = "1";
      code.title = "Click to copy";
      code.addEventListener("click", (e) => {
        e.preventDefault();
        const text = code.textContent;
        navigator.clipboard.writeText(text).then(() => {
          const original = code.textContent;
          code.classList.add("copied");
          code.textContent = "✓ copied";
          setTimeout(() => {
            code.classList.remove("copied");
            code.textContent = original;
          }, 900);
        }).catch(() => {
          showToast("Copy failed", true);
        });
      });
    });
  }

  // ---- Annotation: selection + popup -----------------------------------
  function getMessageWrapper(node) {
    let n = node;
    while (n && n !== document.body) {
      if (n.nodeType === 1 && n.classList && n.classList.contains("msg")) return n;
      n = n.parentNode;
    }
    return null;
  }

  // 240 chars on each side captures a sentence or two — enough to remember
  // why you annotated. The display layer truncates further if needed.
  function getContextWindow(text, idx, len, win = 240) {
    const start = Math.max(0, idx - win);
    const end = Math.min(text.length, idx + len + win);
    return { prefix: text.slice(start, idx), suffix: text.slice(idx + len, end) };
  }

  // For annotations stored before the wider window existed, re-derive prefix
  // and suffix from the rendered message DOM whenever it's available. This
  // upgrades old localStorage entries in-place so users see real context.
  function enrichAnnotationContext(a) {
    if (!a || !a.quote) return a;
    if ((a.prefix || "").length >= 80 && (a.suffix || "").length >= 80) return a;
    try {
      const msgEl = messagesEl.querySelector(`.msg[data-idx="${a.msgIdx}"]`);
      if (!msgEl) return a;
      const fullText = msgEl.innerText;
      const idx = fullText.indexOf(a.quote);
      if (idx === -1) return a;
      const c = getContextWindow(fullText, idx, a.quote.length);
      return { ...a, prefix: c.prefix, suffix: c.suffix };
    } catch { return a; }
  }

  function buildAnnotationFromSelection(selection) {
    const range = selection.getRangeAt(0);
    const quote = selection.toString();
    if (!quote.trim()) return null;
    const msgEl = getMessageWrapper(range.startContainer);
    if (!msgEl) return null;
    const msgIdx = Number(msgEl.dataset.idx);
    const role = msgEl.classList.contains("msg-user") ? "user" : "assistant";
    const fullText = msgEl.innerText;
    const idx = fullText.indexOf(quote);
    let prefix = "", suffix = "";
    if (idx !== -1) {
      const c = getContextWindow(fullText, idx, quote.length);
      prefix = c.prefix; suffix = c.suffix;
    }
    const rect = range.getBoundingClientRect();
    return { quote, prefix, suffix, msgIdx, role, rect };
  }

  function showPopup(anno) {
    closePopup();
    popup = document.createElement("div");
    popup.className = "popup";
    const top = window.scrollY + anno.rect.bottom + 8;
    const left = Math.max(8, window.scrollX + anno.rect.left);
    popup.style.top = `${top}px`;
    popup.style.left = `${left}px`;
    const presetHtml = PRESETS.map(p =>
      `<button data-preset="${escapeHtml(p.label)}">${escapeHtml(p.label)}<span class="shortcut">⌘${p.key}</span></button>`
    ).join("");
    popup.innerHTML = `
      <div class="quote">${escapeHtml(anno.quote.slice(0, 240))}</div>
      <div class="preset-row">${presetHtml}</div>
      <textarea placeholder="…or type a custom comment (Enter to add · Shift+Enter for newline)" autofocus></textarea>
      <div class="row">
        <button data-act="cancel">Cancel</button>
        <button class="primary" data-act="add">Add</button>
      </div>`;
    document.body.appendChild(popup);
    const ta = popup.querySelector("textarea");
    ta.focus();

    const commit = (comment) => {
      if (!comment || !comment.trim()) return;
      annotations.push({
        quote: anno.quote,
        prefix: anno.prefix,
        suffix: anno.suffix,
        msgIdx: anno.msgIdx,
        role: anno.role,
        comment: comment.trim(),
        savedAt: Date.now(),
      });
      saveAnnotations(currentSessionId, annotations);
      refreshDock();
      reapplyHighlights();
      window.getSelection().removeAllRanges();
      closePopup();
    };

    popup.querySelectorAll("[data-preset]").forEach(btn => {
      btn.addEventListener("click", () => commit(btn.dataset.preset));
    });
    popup.querySelector("[data-act='cancel']").addEventListener("click", closePopup);
    popup.querySelector("[data-act='add']").addEventListener("click", () => commit(ta.value));

    let committed = false;
    const onKey = (e) => {
      // Guard against double-fire: keydown bubbles from <textarea> up to the
      // popup container, and we used to attach the listener to both, so each
      // Enter press inserted the annotation twice. Single attach + a
      // committed flag is enough; e.stopPropagation kills lingering bubbles.
      if (committed) return;
      if (e.key === "Enter" && !e.shiftKey && !e.altKey) {
        // Plain Enter or ⌘/Ctrl+Enter → submit. Shift+Enter falls through to
        // the textarea's default behavior (insert newline).
        e.preventDefault();
        e.stopPropagation();
        committed = true;
        commit(ta.value);
      } else if ((e.metaKey || e.ctrlKey) && /^[1-4]$/.test(e.key)) {
        const preset = PRESETS.find(p => p.key === e.key);
        if (preset) {
          e.preventDefault();
          e.stopPropagation();
          committed = true;
          commit(preset.label);
        }
      } else if (e.key === "Escape") {
        closePopup();
      }
    };
    // Attach once on the popup root — keydown bubbles up from the textarea
    // naturally; binding to both was the source of the double-add bug.
    popup.addEventListener("keydown", onKey);
  }

  function closePopup() {
    if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
    popup = null;
  }

  // Annotation popup is now gated on pressing C after selecting — selecting
  // text alone never interrupts reading. Mouseup just caches whether a valid
  // selection exists; the C key actually opens the popup.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closePopup(); return; }
    if (popup) return; // a popup is already open; ignore further C presses
    if (e.key !== "c" && e.key !== "C") return;
    if (e.metaKey || e.ctrlKey || e.altKey) return; // let ⌘C / ctrl+C work
    // Don't hijack the key while the user is typing in an input/textarea.
    const t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

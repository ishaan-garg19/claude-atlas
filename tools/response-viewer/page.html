    const anno = buildAnnotationFromSelection(sel);
    if (!anno) return;
    e.preventDefault();
    showPopup(anno);
  });

  // ---- Annotation highlights -------------------------------------------
  // Stable identity key per annotation. Used to (a) deduplicate, (b) link the
  // dock card → the <mark.anno> span in the transcript for jump-to-annotation.
  function annoKey(a) {
    return `${a.msgIdx}|${(a.quote || "").slice(0, 200)}|${a.comment || ""}`;
  }
  function reapplyHighlights() {
    for (const a of annotations) {
      highlightOne(a);
    }
    // Margin notes depend on the highlights existing, so we recompute them
    // right after every reapply pass. Position is geometry-based.
    requestAnimationFrame(renderMarginNotes);
  }

  // ---- Inline annotation popover (in-message) --------------------------
  // Double-clicking a yellow highlighted span pops a small floating card
  // showing the user's comment, Delete + Jump-here buttons. No need to
  // navigate to the rail's Pending panel just to remember what you wrote.
  let inlineAnnoPopover = null;
  function closeInlineAnnoPopover() {
    if (inlineAnnoPopover && inlineAnnoPopover.parentNode) {
      inlineAnnoPopover.parentNode.removeChild(inlineAnnoPopover);
    }
    inlineAnnoPopover = null;
    // Drop the active glow from whichever mark had it pinned.
    messagesEl.querySelectorAll("mark.anno.anno-active.pinned")
      .forEach(m => m.classList.remove("anno-active", "pinned"));
  }
  function showInlineAnnoPopover(markEl) {
    closeInlineAnnoPopover();
    const key = markEl.dataset.annoKey;
    if (!key) return;
    const a = annotations.find(x => annoKey(x) === key);
    if (!a) return;
    // Pin the active glow until the popover closes.
    markEl.classList.add("anno-active", "pinned");
    const r = markEl.getBoundingClientRect();
    const pop = document.createElement("div");
    pop.className = "inline-anno-popover";
    pop.innerHTML = `
      <div class="iap-comment">${escapeHtml(a.comment || "(no comment)")}</div>
      <div class="iap-meta">msg #${a.msgIdx} · ${a.role || "?"}</div>
      <div class="iap-actions">
        <button data-act="copy">Copy comment</button>
        <button data-act="del">Delete</button>
        <button data-act="close">Close</button>
      </div>`;
    document.body.appendChild(pop);
    // Position below the highlight, clamped to viewport.
    const top = window.scrollY + r.bottom + 6;
    const left = Math.min(
      window.scrollX + r.left,
      window.scrollX + window.innerWidth - pop.offsetWidth - 12,
    );
    pop.style.top = top + "px";
    pop.style.left = Math.max(8, left) + "px";
    inlineAnnoPopover = pop;
    pop.querySelector("[data-act='close']").addEventListener("click", closeInlineAnnoPopover);
    pop.querySelector("[data-act='copy']").addEventListener("click", () => {
      navigator.clipboard.writeText(a.comment || "").then(() => showToast("Comment copied"));
    });
    pop.querySelector("[data-act='del']").addEventListener("click", () => {
      const i = annotations.findIndex(x => annoKey(x) === key);
      if (i >= 0) {
        annotations.splice(i, 1);
        saveAnnotations(currentSessionId, annotations);
        refreshDock();
        renderMessages();
      }
      closeInlineAnnoPopover();
    });
  }

  // Delegated dblclick on the mark + single click on the 💬 chip. Survives
  // every re-render of the transcript (no need to re-bind after pagination).
  function wireInlineAnnoDblClick() {
    if (wireInlineAnnoDblClick._wired) return;
    wireInlineAnnoDblClick._wired = true;
    // When a 💬 marker is hovered, light up its matching mark so the user
    // visually links comment ↔ highlight without searching the message.
    messagesEl.addEventListener("mouseover", (e) => {
      const note = e.target.closest(".anno-note");
      if (!note) return;
      const key = note.dataset.annoKey;
      const mark = messagesEl.querySelector(`mark.anno[data-anno-key="${CSS.escape(key)}"]`);
      if (mark) mark.classList.add("anno-active");
    });
    messagesEl.addEventListener("mouseout", (e) => {
      const note = e.target.closest(".anno-note");
      if (!note) return;
      const key = note.dataset.annoKey;
      const mark = messagesEl.querySelector(`mark.anno[data-anno-key="${CSS.escape(key)}"]`);
      if (mark) mark.classList.remove("anno-active");
    });
    messagesEl.addEventListener("dblclick", (e) => {
      const mark = e.target.closest("mark.anno");
      if (!mark) return;
      e.preventDefault();
      showInlineAnnoPopover(mark);
    });
    messagesEl.addEventListener("click", (e) => {
      const target = e.target.closest(".anno-bubble, .anno-note");
      if (!target) return;
      e.preventDefault();
      e.stopPropagation();
      const key = target.dataset.annoKey;
      const mark = messagesEl.querySelector(`mark.anno[data-anno-key="${CSS.escape(key)}"]`);
      if (mark) showInlineAnnoPopover(mark);
    });
    document.addEventListener("click", (e) => {
      if (!inlineAnnoPopover) return;
      if (inlineAnnoPopover.contains(e.target)) return;
      if (e.target.closest("mark.anno")) return;
      if (e.target.closest(".anno-bubble")) return;
      if (e.target.closest(".anno-note")) return;
      closeInlineAnnoPopover();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeInlineAnnoPopover();
    });
  }
  wireInlineAnnoDblClick();
  function highlightOne(a) {
    const msgEls = messagesEl.querySelectorAll(`.msg[data-idx="${a.msgIdx}"]`);
    if (!msgEls.length) return;
    const root = msgEls[0];

    // Collect all NON-already-highlighted text nodes and build a flat string
    // with offsets. This lets us find quotes that span across inline elements
    // like <code>, <strong>, etc. — markdown rendering splits text nodes at
    // every formatting boundary, so a single quote often crosses many nodes.
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        if (n.parentElement?.classList?.contains("anno")) return NodeFilter.FILTER_REJECT;
        // Skip script/style content (unlikely here but defensive)
        const tag = n.parentElement?.tagName;
        if (tag === "SCRIPT" || tag === "STYLE") return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      },
    });
    const nodes = [];
    const offsets = [];
    let full = "";
    let n;
    while ((n = walker.nextNode())) {
      offsets.push(full.length);
      nodes.push(n);
      full += n.nodeValue;
    }

    const idx = full.indexOf(a.quote);
    if (idx === -1) return;
    const endIdx = idx + a.quote.length;

    // Locate the start and end node + offset
    let startNode = null, startOffset = 0, endNode = null, endOffset = 0;
    for (let i = 0; i < nodes.length; i++) {
      const ns = offsets[i];
      const ne = ns + nodes[i].nodeValue.length;
      if (startNode === null && idx >= ns && idx < ne) {
        startNode = nodes[i]; startOffset = idx - ns;
      }
      if (endIdx > ns && endIdx <= ne) {
        endNode = nodes[i]; endOffset = endIdx - ns; break;
      }
    }
    if (!startNode || !endNode) return;

    const range = document.createRange();
    try {
      range.setStart(startNode, startOffset);
      range.setEnd(endNode, endOffset);
    } catch { return; }

    const mark = document.createElement("mark");
    mark.className = "anno";
    mark.title = a.comment;
    // Stamp identity onto the DOM so the dock cards can scroll directly to it.
    mark.dataset.annoKey = annoKey(a);
    try {
      if (startNode === endNode) {
        // Single text node — simple wrap
        range.surroundContents(mark);
      } else {
        // Multi-node quote: surroundContents would throw "Range partially
        // selects a non-Text node"; extract + reinsert handles it cleanly.
        const contents = range.extractContents();
        mark.appendChild(contents);
        range.insertNode(mark);
      }
    } catch (err) {
      // If wrapping fails (e.g. quote crosses a block-level boundary),
      // silently skip — better no highlight than broken DOM.
      console.warn("highlight failed for quote:", a.quote.slice(0, 60), err);
      return;
    }
    // Multi-node quotes that cross blank lines / empty <li> items leave
    // <mark.anno> wrappers around children whose visible text is just
    // whitespace — they render as ugly stripes on empty bullets.
    const innerMarks = mark.querySelectorAll("mark.anno, mark");
    innerMarks.forEach(m => {
      if (!m.textContent || !m.textContent.trim()) {
        const parent = m.parentNode;
        while (m.firstChild) parent.insertBefore(m.firstChild, m);
        parent.removeChild(m);
      }
    });
    // Definitive fix: any block-level descendant of the mark that has no real
    // text gets hidden. This removes the empty <li>/<p>/<br> rectangles that
    // would otherwise leak the mark's background.
    mark.querySelectorAll("li, p, blockquote, div").forEach(el => {
      if (!el.textContent.trim()) {
        el.style.display = "none";
      }
    });
    mark.querySelectorAll("br").forEach(br => {
      // BR inside the mark — kill any vertical-only stripe by removing it.
      // The natural newline between content lines is preserved by the
      // surrounding block elements that still exist.
      br.remove();
    });
    if (mark.children.length && Array.from(mark.children).every(c =>
      (c.tagName === "LI" || c.tagName === "P" || c.tagName === "BR")
      && !(c.textContent || "").trim()
    )) {
      const parent = mark.parentNode;
      while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
      parent.removeChild(mark);
    }
  }

  // Margin notes: floating comment markers in the gutter next to each
  // message, vertically aligned with their highlight. Two annotations on
  // the same line get horizontal-offset stacking so they don't overlap.
  function renderMarginNotes() {
    messagesEl.querySelectorAll(".anno-note").forEach(n => n.remove());
    // First pass: build (msgEl, note, top) tuples per message.
    const byMsg = new Map(); // msgEl -> [{ note, top }]
    for (const a of annotations) {
      const msgEl = messagesEl.querySelector(`.msg[data-idx="${a.msgIdx}"]`);
      if (!msgEl) continue;
      const mark = msgEl.querySelector(`mark.anno[data-anno-key="${CSS.escape(annoKey(a))}"]`);
      if (!mark) continue;
      if (getComputedStyle(msgEl).position === "static") msgEl.style.position = "relative";
      const note = document.createElement("button");
      note.type = "button";
      note.className = "anno-note";
      note.dataset.annoKey = annoKey(a);
      const preview = (a.comment || "").trim();
      note.innerHTML = `<span class="anno-note-icon" aria-label="annotation">💬</span><span class="anno-note-tip">${escapeHtml(preview)}</span>`;
      // Intentionally NOT setting `title` — the .anno-note-tip is our styled
      // tooltip; the native one would duplicate it.
      const mr = mark.getBoundingClientRect();
      const pr = msgEl.getBoundingClientRect();
      const top = mr.top - pr.top;
      note.style.top = top + "px";
      msgEl.appendChild(note);
      if (!byMsg.has(msgEl)) byMsg.set(msgEl, []);
      byMsg.get(msgEl).push({ note, top });
    }
    // Second pass: per message, bucket notes by line (~24px). Within a bucket,
    // shift each successive note horizontally so they sit side-by-side instead
    // of stacking on top of each other.
    const LINE_BUCKET = 24;
    const STEP = 32;
    const isUserMsg = (el) => el.classList.contains("msg-user");
    for (const [msgEl, list] of byMsg) {
      list.sort((a, b) => a.top - b.top);
      const buckets = new Map();
      for (const item of list) {
        const k = Math.round(item.top / LINE_BUCKET);
        if (!buckets.has(k)) buckets.set(k, []);
        buckets.get(k).push(item);
      }
      const offsetProp = isUserMsg(msgEl) ? "marginRight" : "marginLeft";
      for (const group of buckets.values()) {
        group.forEach((item, i) => {
          if (i === 0) return;
          item.note.style[offsetProp] = (i * STEP) + "px";
        });
      }
    }
  }

  // Recompute margin-note positions on resize, fold/unfold, etc. — debounced.
  let marginNoteRepositionTimer = null;
  function scheduleMarginNoteReposition() {
    clearTimeout(marginNoteRepositionTimer);
    marginNoteRepositionTimer = setTimeout(renderMarginNotes, 80);
  }
  window.addEventListener("resize", scheduleMarginNoteReposition);

  // ---- Dock (pending annotations panel) --------------------------------
  function refreshDock() {
    const n = annotations.length;
    dockCount.textContent = String(n);
    annoCount.textContent = String(n);
    sendBtn.disabled = n === 0;
    dock.style.display = n === 0 ? "none" : "flex";
    annoList.innerHTML = "";
    annotations.forEach((a, i) => {
      a = enrichAnnotationContext(a);
      const card = document.createElement("div");
      card.className = "anno-card";
      card.dataset.annoKey = annoKey(a);
      // Show the highlighted quote with surrounding context (prefix/suffix)
      // dimmed and in italic so you can spot the broader sentence at a glance.
      const beforeTxt = (a.prefix || "").slice(-220);
      const afterTxt = (a.suffix || "").slice(0, 220);
      const quoteFull = a.quote || "";
      const quoteTxt = quoteFull.length > 240
        ? quoteFull.slice(0, 240) + "…"
        : quoteFull;
      card.innerHTML = `
        <div class="quote-block">${
          beforeTxt ? `<span class="ctx before">…${escapeHtml(beforeTxt)}</span>` : ""
        }<span class="quote-mark">${escapeHtml(quoteTxt)}</span>${
          afterTxt ? `<span class="ctx after">${escapeHtml(afterTxt)}…</span>` : ""
        }</div>
        <div class="comment">${escapeHtml(a.comment)}</div>
        <div class="jump-hint">Click to jump to message #${a.msgIdx} ↗</div>
        <div class="actions"><button data-i="${i}" data-act="del">Delete</button></div>`;
      card.addEventListener("click", (e) => {
        if (e.target.closest("[data-act='del']")) return;
        jumpToAnnotation(a);
      });
      annoList.appendChild(card);
    });
    annoList.querySelectorAll("[data-act='del']").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const i = Number(btn.dataset.i);
        annotations.splice(i, 1);
        saveAnnotations(currentSessionId, annotations);
        refreshDock();
        renderMessages();
      });
    });
    renderRailPending();
  }
  dockToggle.addEventListener("click", () => {
    dockPanel.classList.toggle("open");
    if (dockPanel.classList.contains("open") && currentDockTab === "sent") loadSentAnnotations();
  });
  dockClose.addEventListener("click", () => dockPanel.classList.remove("open"));

  // ---- Dock tabs (Pending / Sent) --------------------------------------
  let currentDockTab = "pending";
  function setDockTab(tab) {
    currentDockTab = tab;
    dockTabPending.classList.toggle("active", tab === "pending");
    dockTabSent.classList.toggle("active", tab === "sent");
    annoList.classList.toggle("hidden", tab !== "pending");
    sentList.classList.toggle("hidden", tab !== "sent");
    dockFoot.style.display = tab === "pending" ? "" : "none";
    if (tab === "sent") loadSentAnnotations();
  }
  dockTabPending.addEventListener("click", () => setDockTab("pending"));
  dockTabSent.addEventListener("click", () => setDockTab("sent"));

  async function loadSentAnnotations() {
    if (!currentSessionId) return;
    sentList.innerHTML = `<div class="sent-empty">Loading sent annotations…</div>`;
    try {
      const r = await fetch(`/annotations-for-session?session=${encodeURIComponent(currentSessionId)}&_=${Date.now()}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      renderSentAnnotations(data.annotations || []);
    } catch (err) {
      sentList.innerHTML = `<div class="sent-empty" style="color:#cf222e">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
  }

  // One-time delegated click handler for collapse/expand on sent-reply.
  function wireSentReplyToggle(container) {
    if (!container || container.dataset.toggleWired) return;
    container.dataset.toggleWired = "1";
    container.addEventListener("click", (e) => {
      const btn = e.target.closest(".reply-toggle");
      if (!btn) return;
      e.stopPropagation();
      const row = btn.closest(".sent-reply.collapsible");
      if (!row) return;
      const collapsed = row.dataset.collapsed === "1";
      const preview = row.querySelector(".sent-reply-text.preview");
      const full = row.querySelector(".sent-reply-text.full");
      if (collapsed) {
        if (preview) preview.hidden = true;
        if (full) full.hidden = false;
        row.dataset.collapsed = "0";
        btn.textContent = "Show less ↑";
      } else {
        if (preview) preview.hidden = false;
        if (full) full.hidden = true;
        row.dataset.collapsed = "1";
        btn.textContent = "Show more ↓";
      }
    });
  }

  function renderSentAnnotations(list) {
    sentCount.textContent = String(list.length);
    if (railSentCount) railSentCount.textContent = String(list.length);
    wireSentReplyToggle(sentList);
    wireSentReplyToggle(railSentList);
    if (list.length === 0) {
      const emptyHtml = `<div class="sent-empty">No annotations sent yet for this session. Add some on the right, click "Send to Claude", then run <code>/rano</code> in the CLI to see replies appear here.</div>`;
      sentList.innerHTML = emptyHtml;
      if (railSentList) railSentList.innerHTML = `<div class="rail-empty">No sent annotations yet. Send some via the Pending tab.</div>`;
      return;
    }
    sentList.innerHTML = "";
    if (railSentList) railSentList.innerHTML = "";
    // ---- Group by Send batch ----
    // Every "Send to Claude" creates one agentation session containing N
    // annotations. Bucket by that session id so each group reads as one
    // batch with its own header. Fall back to a synthetic time-bucket if
    // the id is missing.
    const groups = new Map();
    for (const a of list) {
      const key = a.agentationSessionId || `time:${a.createdAt || ""}`;
      if (!groups.has(key)) {
        groups.set(key, { key, items: [], latestTs: 0 });
      }
      const g = groups.get(key);
      g.items.push(a);
      const ts = a.createdAt ? new Date(a.createdAt).getTime() : 0;
      if (ts > g.latestTs) g.latestTs = ts;
    }
    const orderedGroups = [...groups.values()].sort((a, b) => b.latestTs - a.latestTs);
    // Per-session memory of which groups are open/closed so the user's choice
    // persists across reloads. Default: latest open, the rest collapsed.
    const GROUP_STATE_KEY = `viewer:sentGroupState:${currentSessionId || ""}`;
    const UNDERSTOOD_KEY = `viewer:annoUnderstood:${currentSessionId || ""}`;
    let groupState = {};
    let understoodState = {};
    try { groupState = JSON.parse(localStorage.getItem(GROUP_STATE_KEY) || "{}"); }
    catch { groupState = {}; }
    try { understoodState = JSON.parse(localStorage.getItem(UNDERSTOOD_KEY) || "{}"); }
    catch { understoodState = {}; }
    function isOpen(key, isLatest) {
      if (key in groupState) return groupState[key] === "open";
      return isLatest; // default
    }

    function buildGroupContainer(group, isLatest) {
      const wrap = document.createElement("div");
      wrap.className = "sent-group" + (isLatest ? " latest" : "");
      wrap.dataset.groupKey = group.key;
      if (!isOpen(group.key, isLatest)) wrap.classList.add("collapsed");
      const head = document.createElement("button");
      head.type = "button";
      head.className = "sent-group-head" + (isLatest ? " latest" : "");
      const when = group.latestTs ? formatRelative(Date.now() - group.latestTs) : "unknown time";
      const label = isLatest ? "LATEST · " : "";
      head.innerHTML = `<span class="sent-group-chev">▾</span><span class="sent-group-label">${label}${when} · ${group.items.length} annotation${group.items.length === 1 ? "" : "s"}</span>`;
      head.addEventListener("click", () => {
        const nowCollapsed = !wrap.classList.contains("collapsed");
        wrap.classList.toggle("collapsed", nowCollapsed);
        groupState[group.key] = nowCollapsed ? "closed" : "open";
        try { localStorage.setItem(GROUP_STATE_KEY, JSON.stringify(groupState)); } catch {}
        // Mirror state into the rail-side container if it exists.
        if (railSentList) {
          const peer = railSentList.querySelector(`.sent-group[data-group-key="${CSS.escape(group.key)}"]`);
          if (peer) peer.classList.toggle("collapsed", nowCollapsed);
        }
      });
      const body = document.createElement("div");
      body.className = "sent-group-body";
      wrap.appendChild(head);
      wrap.appendChild(body);
      return { wrap, body };
    }

    // Build group containers up front for BOTH targets, then we'll append
    // each annotation card into its group's body as we iterate.
    const groupContainers = new Map(); // key → { sentBody, railBody }
    let gIdx = -1;
    for (const g of orderedGroups) {
      gIdx++;
      const isLatest = gIdx === 0;
      const sent = buildGroupContainer(g, isLatest);
      sentList.appendChild(sent.wrap);
      let rail = null;
      if (railSentList) {
        rail = buildGroupContainer(g, isLatest);
        railSentList.appendChild(rail.wrap);
      }
      groupContainers.set(g.key, {
        sentBody: sent.body,
        railBody: rail ? rail.body : null,
      });
    }
    const flatList = orderedGroups.flatMap(g =>
      g.items.map(it => ({ a: it, groupKey: g.key }))
    );
    flatList.forEach(({ a, groupKey }, i) => {
      const card = document.createElement("div");
      card.className = "sent-card anno-card";
      // Parse the elementPath we POSTed (e.g. "msg:5:assistant") to get msgIdx
      // so the Sent card can also jump to the original message location.
      const pathMatch = String(a.elementPath || "").match(/^msg:(\d+)/);
      const msgIdx = pathMatch ? Number(pathMatch[1]) : null;
      const quote = a.element || a.selectedText || "(no quote)";
      const comment = a.comment || "";
      // The `thread` field may come back as a JSON string or already-parsed array
      let thread = a.thread;
      if (typeof thread === "string") {
        try { thread = JSON.parse(thread); } catch { thread = []; }
      }
      if (!Array.isArray(thread)) thread = [];
      // Reply messages from agentation: each has { id, role, content, timestamp }
      const replies = thread.filter(t => t && (t.content || t.message || t.text));

      const statusPills = [];
      const status = a.status || "pending";
      if (status === "resolved") {
        statusPills.push(`<span class="status-pill resolved">✓ resolved</span>`);
      } else if (status === "acknowledged") {
        statusPills.push(`<span class="status-pill acked">✓ acknowledged</span>`);
      } else {
        statusPills.push(`<span class="status-pill">${escapeHtml(status)}</span>`);
      }
      if (a.createdAt) {
        const when = formatRelative(Date.now() - new Date(a.createdAt).getTime());
        statusPills.push(`<span class="status-pill">${when}</span>`);
      }

      let repliesHtml = "";
      if (replies.length === 0) {
        repliesHtml = `<div class="sent-reply"><span class="who">Claude:</span><span class="sent-reply-text" style="color:var(--muted);font-style:italic">No reply yet — run <code>/rano</code> in the CLI.</span></div>`;
      } else {
        // Long replies (like /rano replays) are collapsed by default — show
        // first ~200 chars + a toggle to expand. Threshold tuned to avoid
        // collapsing short acks like "👍".
        const COLLAPSE_THRESHOLD = 260;
        const PREVIEW_LEN = 200;
        repliesHtml = replies.map(r => {
          const role = r.role || "agent";
          const who = role === "agent" ? "Claude" : role === "user" ? "You" : role;
          const text = r.content || r.message || r.text || "";
          if (text.length <= COLLAPSE_THRESHOLD) {
            return `<div class="sent-reply"><span class="who">${escapeHtml(who)}:</span><span class="sent-reply-text">${escapeHtml(text)}</span></div>`;
          }
          // Slice on a word boundary near PREVIEW_LEN, then leave the full
          // text in a hidden sibling so the toggle button can swap visibility.
          let cut = text.lastIndexOf(" ", PREVIEW_LEN);
          if (cut < PREVIEW_LEN - 60) cut = PREVIEW_LEN;
          const preview = text.slice(0, cut).trimEnd();
          return `<div class="sent-reply collapsible" data-collapsed="1">
              <span class="who">${escapeHtml(who)}:</span>
              <span class="sent-reply-text preview">${escapeHtml(preview)}<span class="ellipsis">…</span></span>
              <span class="sent-reply-text full" hidden>${escapeHtml(text)}</span>
              <button class="reply-toggle" type="button">Show more ↓</button>
            </div>`;
        }).join("");
      }

      // Re-split the nearbyText we sent (prefix…suffix) so we can render the
      // surrounding context dimmed around the highlighted quote, matching the
      // pending-dock card layout.
      const nearby = String(a.nearbyText || "");
      let beforeTxt = "", afterTxt = "";
      const sepIdx = nearby.indexOf("…");
      if (sepIdx >= 0) {
        beforeTxt = nearby.slice(0, sepIdx).trim().slice(-100);
        afterTxt = nearby.slice(sepIdx + 1).trim().slice(0, 100);
      }
      const quoteShort = String(quote).slice(0, 400);
      const jumpHint = msgIdx !== null
        ? `<div class="jump-hint">Click the highlighted quote to jump to message #${msgIdx} ↗</div>` : "";
      // Stable per-annotation index for the short "Annotation N" summary
      const annoNum = i + 1;
      const annoId = a.id || `${groupKey}:${annoNum}`;
      const isUnderstood = !!understoodState[annoId];
      card.dataset.annoId = annoId;
      if (isUnderstood) card.classList.add("understood");
      card.innerHTML = `
        <div class="sent-card-summary">Annotation ${annoNum} · ✓ understood <span class="anno-expand">(expand)</span></div>
        <button class="anno-understood-btn" type="button" title="Mark as read / understood (collapses to one line)">✓</button>
        <div class="sent-card-body">
          <div class="sent-quote">${
            beforeTxt ? `<span class="ctx before" style="opacity:.55;font-style:italic">…${escapeHtml(beforeTxt)}</span>` : ""
          }<span class="quote-mark" style="background:var(--selection-bg);color:var(--selection-fg);padding:0 2px;border-radius:2px;cursor:${msgIdx !== null ? "pointer" : "default"}">${escapeHtml(quoteShort)}</span>${
            afterTxt ? `<span class="ctx after" style="opacity:.55;font-style:italic">${escapeHtml(afterTxt)}…</span>` : ""
          }</div>
          <div class="sent-comment"><span class="who">You:</span><span>${escapeHtml(comment)}</span></div>
          ${repliesHtml}
          <div class="status-row">${statusPills.join("")}</div>
          ${jumpHint}
        </div>
      `;
      // Click handler: jump ONLY when the user clicks the citation area
      // (the highlighted quote + its dimmed before/after context). Clicking
      // the comment, replies, pills, or buttons should not redirect.
      if (msgIdx !== null) {
        const synth = {
          msgIdx,
          quote: a.element || a.selectedText || "",
          comment,
          prefix: beforeTxt,
          suffix: afterTxt,
        };
        const citation = card.querySelector(".sent-quote");
        if (citation) {
          citation.style.cursor = "pointer";
          citation.title = `Jump to message #${msgIdx}`;
          citation.addEventListener("click", (e) => {
            e.stopPropagation();
            jumpToAnnotation(synth);
          });
        }
      }
      // Understood toggle: collapses to one-line summary, persists per-session.
      const understoodBtn = card.querySelector(".anno-understood-btn");
      if (understoodBtn) {
        understoodBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const nowUnderstood = !card.classList.contains("understood");
          card.classList.toggle("understood", nowUnderstood);
          understoodState[annoId] = nowUnderstood;
          try { localStorage.setItem(UNDERSTOOD_KEY, JSON.stringify(understoodState)); } catch {}
          // Mirror state to the rail-side clone of this card.
          if (railSentList) {
            const peer = railSentList.querySelector(`.sent-card[data-anno-id="${CSS.escape(annoId)}"]`);
            if (peer) peer.classList.toggle("understood", nowUnderstood);
          }
        });
      }
      // Expand-from-summary: clicking the one-line summary expands again.
      const summary = card.querySelector(".sent-card-summary");
      if (summary) {
        summary.addEventListener("click", (e) => {
          e.stopPropagation();
          card.classList.remove("understood");
          understoodState[annoId] = false;
          try { localStorage.setItem(UNDERSTOOD_KEY, JSON.stringify(understoodState)); } catch {}
          if (railSentList) {
            const peer = railSentList.querySelector(`.sent-card[data-anno-id="${CSS.escape(annoId)}"]`);
            if (peer) peer.classList.remove("understood");
          }
        });
      }
      const targets = groupContainers.get(groupKey);
      const sentTarget = targets ? targets.sentBody : sentList;
      const railTarget = targets ? targets.railBody : railSentList;
      sentTarget.appendChild(card);
      if (railTarget) {
        const railCard = card.cloneNode(true);
        railCard.dataset.annoId = annoId;
        // Re-bind on the clone — cloneNode doesn't copy listeners.
        if (msgIdx !== null) {
          const synth = {
            msgIdx,
            quote: a.element || a.selectedText || "",
            comment,
            prefix: beforeTxt,
            suffix: afterTxt,
          };
          const railCit = railCard.querySelector(".sent-quote");
          if (railCit) {
            railCit.style.cursor = "pointer";
            railCit.title = `Jump to message #${msgIdx}`;
            railCit.addEventListener("click", (e) => {
              e.stopPropagation();
              jumpToAnnotation(synth);
            });
          }
        }
        const railUnderstoodBtn = railCard.querySelector(".anno-understood-btn");
        if (railUnderstoodBtn) {
          railUnderstoodBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const nowUnderstood = !railCard.classList.contains("understood");
            railCard.classList.toggle("understood", nowUnderstood);
            understoodState[annoId] = nowUnderstood;
            try { localStorage.setItem(UNDERSTOOD_KEY, JSON.stringify(understoodState)); } catch {}
            const peer = sentList.querySelector(`.sent-card[data-anno-id="${CSS.escape(annoId)}"]`);
            if (peer) peer.classList.toggle("understood", nowUnderstood);
          });
        }
        const railSummary = railCard.querySelector(".sent-card-summary");
        if (railSummary) {
          railSummary.addEventListener("click", (e) => {
            e.stopPropagation();
            railCard.classList.remove("understood");
            understoodState[annoId] = false;
            try { localStorage.setItem(UNDERSTOOD_KEY, JSON.stringify(understoodState)); } catch {}
            const peer = sentList.querySelector(`.sent-card[data-anno-id="${CSS.escape(annoId)}"]`);
            if (peer) peer.classList.remove("understood");
          });
        }
        railTarget.appendChild(railCard);
      }
    });
  }

  // ---- Send to agentation ----------------------------------------------
  async function sendToAgentation() {
    if (annotations.length === 0) return;
    sendBtn.disabled = true;
    sendBtn.textContent = "Sending…";
    try {
      const sessUrl = `http://localhost:4850/?cc_session=${encodeURIComponent(currentSessionId)}`;
      // 1. Create agentation session tagged with cc_session
      const cr = await fetch("http://localhost:4747/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: sessUrl }),
      });
      if (!cr.ok) throw new Error(`create session: HTTP ${cr.status}`);
      const session = await cr.json();
      // 2. POST each annotation. agentation requires x/y (visual schema);
      // use 0/0 since we're annotating text not pixels. Stash text context in
      // selected_text + nearby_text for the slash-command to pick up.
      let posted = 0;
      for (const a of annotations) {
        const body = {
          x: 0,
          y: 0,
          timestamp: Date.now(),
          comment: a.comment,
          element: a.quote,
          elementPath: `msg:${a.msgIdx}:${a.role}`,
          selectedText: a.quote,
          nearbyText: `${a.prefix}…${a.suffix}`.trim(),
          url: `http://localhost:4850/?cc_session=${encodeURIComponent(currentSessionId)}&msg=${a.msgIdx}`,
        };
        const ar = await fetch(`http://localhost:4747/sessions/${session.id}/annotations`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (ar.ok) posted++;
      }
      // 3. Request action to fire the notification + webhook
      await fetch(`http://localhost:4747/sessions/${session.id}/action`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          output: `Review requested: ${posted} annotation(s) for cc_session ${currentSessionId}. Run /rano in that session.`,
        }),
      });
      showToast(`Sent ${posted} annotation${posted === 1 ? "" : "s"} ✓  Run /rano in your CLI`);
      annotations = [];
      clearAnnotationsStorage(currentSessionId);
      refreshDock();
      renderMessages();
      // Auto-switch to the Sent tab so the user immediately sees what they sent
      setDockTab("sent");
    } catch (err) {
      showToast("Send failed: " + err.message, true);
      sendBtn.disabled = false;
    } finally {
      sendBtn.textContent = "Send to Claude";
    }
  }
  sendBtn.addEventListener("click", sendToAgentation);
  clearBtn.addEventListener("click", () => {
    if (annotations.length === 0) return;
    if (!confirm(`Clear ${annotations.length} annotation(s)?`)) return;
    annotations = [];
    clearAnnotationsStorage(currentSessionId);
    refreshDock();
    renderMessages();
  });

  // ---- SSE -------------------------------------------------------------
  let reloadDebounce = null;
  function scheduleReload() {
    clearTimeout(reloadDebounce);
    reloadDebounce = setTimeout(loadTranscript, 500);
  }
  function startSSE() {
    if (es) { try { es.close(); } catch {} es = null; }
    if (!currentSessionId) return;
    es = new EventSource(`/events?session=${encodeURIComponent(currentSessionId)}`);
    es.addEventListener("update", scheduleReload);
    es.addEventListener("hello", () => {});
    // Session-list changes are now multiplexed onto the per-session stream so
    // each tab uses ONE SSE connection instead of two (Chrome only allows
    // 6 per origin — two streams × multiple tabs hit the cap fast).
    es.addEventListener("session-list-change", () => loadSessions());
    es.onopen = () => setLive(true);
    es.onerror = () => setLive(false);
  }

  // ---- Background themes ------------------------------------------------
  // Swappable canvas animations. Each theme implements init(state, w, h) and
  // tick(ctx, state, mouse, w, h). State is reset on theme switch.
  (function bgThemes() {
    const canvas = document.getElementById("bg-canvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let w = 0, h = 0;
    const mouse = { x: -9999, y: -9999, active: false };

    function isDark() {
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    let palette = {};
    function refreshColors() {
      const dark = isDark();
      palette = {
        dark,
        strokeBase: dark ? "120, 170, 255" : "60, 110, 200",
        dot: dark ? "rgba(200, 220, 255, 0.85)" : "rgba(40, 80, 160, 0.8)",
        starBright: dark ? "rgba(255, 250, 230, 0.95)" : "rgba(255, 200, 100, 0.95)",
        starDim: dark ? "rgba(200, 220, 255, 0.55)" : "rgba(60, 110, 200, 0.55)",
        electron: dark ? "rgba(120, 200, 255, 0.95)" : "rgba(20, 100, 200, 0.95)",
        nucleus: dark ? "rgba(255, 130, 130, 0.9)" : "rgba(200, 60, 60, 0.85)",
        orbit: dark ? "rgba(120, 180, 255, 0.18)" : "rgba(60, 110, 200, 0.20)",
        rain: dark ? "rgba(120, 255, 180, 0.95)" : "rgba(20, 140, 70, 0.9)",
      };
    }
    refreshColors();
    if (window.matchMedia) {
      try {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
          refreshColors();
        });
      } catch {}
    }

    // ----- Constellation theme -----
    const constellation = {
      init(state) {
        state.particles = [];
        const DENSITY = 0.00022;
        const target = Math.max(80, Math.min(320, Math.floor(w * h * DENSITY)));
        for (let i = 0; i < target; i++) {
          state.particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * 1.2,
            vy: (Math.random() - 0.5) * 1.2,
          });
        }
      },
      tick(ctx, state) {
        const LINK_DIST = 160, GRAVITY_RADIUS = 200;
        const GRAVITY_STRENGTH = 0.06, GRAVITY_TANGENT = 0.05;
        const MIN_SPEED = 0.4, MAX_SPEED = 1.8, GRAVITY_MAX_SPEED = 2.0;
        const r2 = GRAVITY_RADIUS * GRAVITY_RADIUS;
        for (const p of state.particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < -10) p.x = w + 10;
          if (p.x > w + 10) p.x = -10;
          if (p.y < -10) p.y = h + 10;
          if (p.y > h + 10) p.y = -10;
          let inField = false;
          if (mouse.active) {
            const dx = mouse.x - p.x, dy = mouse.y - p.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < r2) {
              inField = true;
              const d = Math.sqrt(d2) || 1;
              const falloff = (1 - d / GRAVITY_RADIUS);
              const pull = falloff * falloff * GRAVITY_STRENGTH;
              const nx = dx / d, ny = dy / d;
              p.vx += nx * pull + (-ny) * pull * GRAVITY_TANGENT;
              p.vy += ny * pull + ( nx) * pull * GRAVITY_TANGENT;
            }
          }
          p.vx += (Math.random() - 0.5) * 0.06;
          p.vy += (Math.random() - 0.5) * 0.06;
          const sp = Math.hypot(p.vx, p.vy);
          const cap = inField ? GRAVITY_MAX_SPEED : MAX_SPEED;
          if (sp < MIN_SPEED) { const k = MIN_SPEED / (sp || 0.001); p.vx *= k; p.vy *= k; }
          else if (sp > cap) { const k = cap / sp; p.vx *= k; p.vy *= k; }
        }
        ctx.lineWidth = 0.8;
        for (let i = 0; i < state.particles.length; i++) {
          const a = state.particles[i];
          for (let j = i + 1; j < state.particles.length; j++) {
            const b = state.particles[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < LINK_DIST * LINK_DIST) {
              let alpha = (1 - Math.sqrt(d2) / LINK_DIST) * 0.45;
              if (mouse.active) {
                const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
                const ddx = mx - mouse.x, ddy = my - mouse.y;
                const md2 = ddx * ddx + ddy * ddy;
                if (md2 < r2) {
                  const k = 1 - md2 / r2;
                  alpha = Math.min(1, alpha + k * 0.45);
                }
              }
              ctx.strokeStyle = `rgba(${palette.strokeBase}, ${alpha.toFixed(3)})`;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }
        ctx.fillStyle = palette.dot;
        for (const p of state.particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
        if (mouse.active) {
          const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
          g.addColorStop(0, `rgba(${palette.strokeBase}, 0.15)`);
          g.addColorStop(1, `rgba(${palette.strokeBase}, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 120, 0, Math.PI * 2); ctx.fill();
        }
      },
    };

    // ----- Galaxy (Milky Way) theme -----
    // Logarithmic spiral arms; stars rotate with angular velocity inversely
    // proportional to sqrt(radius) so inner stars sweep faster (Keplerian-ish).
    const galaxy = {
      init(state) {
        state.stars = [];
        const ARMS = 4;
        const STAR_COUNT = 1100;       // denser field
        const cx = w / 2, cy = h / 2;
        const maxR = Math.max(w, h) * 0.75;
        for (let i = 0; i < STAR_COUNT; i++) {
          const t = Math.pow(Math.random(), 0.55);
          const r = 40 + t * maxR;
          const arm = Math.floor(Math.random() * ARMS);
          const tightness = 1.6;
          const armAngle = (arm / ARMS) * Math.PI * 2;
          // Tighter arm clustering — pull jitter range down so the arms
          // read as distinct streams instead of a uniform smear.
          const angle = armAngle + Math.log(r) * tightness + (Math.random() - 0.5) * 0.30;
          state.stars.push({
            r, angle,
            speed: 0.0007 + 1.4 / Math.sqrt(r + 30) * 0.018,
            size: 0.6 + Math.random() * 1.6,
            bright: Math.random() < 0.22,
            // A small fraction get a warm reddish tint (red giants/clusters).
            warm: Math.random() < 0.06,
            tw: Math.random() * Math.PI * 2,
          });
        }
        // Sparse foreground stars — fixed positions, just twinkle. Sells depth.
        state.foreground = [];
        const FG_COUNT = 70;
        for (let i = 0; i < FG_COUNT; i++) {
          state.foreground.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: 0.8 + Math.random() * 1.2,
            tw: Math.random() * Math.PI * 2,
          });
        }
        state.cx = cx; state.cy = cy;
        state.bulgeR = 110;
      },
      tick(ctx, state) {
        const cx = state.cx, cy = state.cy;
        // Dust band — faint dark ellipse across the disk plane sells the spiral
        // arm structure (you see this in real photos of the Milky Way).
        const dust = ctx.createRadialGradient(cx, cy, state.bulgeR * 0.4, cx, cy, state.bulgeR * 3.0);
        dust.addColorStop(0, "rgba(0,0,0,0)");
        dust.addColorStop(0.5, palette.dark ? "rgba(0,0,0,0.18)" : "rgba(0,0,0,0.06)");
        dust.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = dust;
        ctx.beginPath(); ctx.ellipse(cx, cy, state.bulgeR * 3.0, state.bulgeR * 1.8, 0, 0, Math.PI * 2); ctx.fill();
        // Galactic core — multi-layer glow + a small bright nucleus
        const outerBulge = ctx.createRadialGradient(cx, cy, 0, cx, cy, state.bulgeR * 2.6);
        outerBulge.addColorStop(0, palette.dark ? "rgba(255, 220, 160, 0.18)" : "rgba(255, 200, 120, 0.18)");
        outerBulge.addColorStop(1, "rgba(255, 200, 120, 0)");
        ctx.fillStyle = outerBulge;
        ctx.beginPath(); ctx.arc(cx, cy, state.bulgeR * 2.6, 0, Math.PI * 2); ctx.fill();
        const innerBulge = ctx.createRadialGradient(cx, cy, 0, cx, cy, state.bulgeR * 1.0);
        innerBulge.addColorStop(0, palette.dark ? "rgba(255, 245, 220, 0.85)" : "rgba(255, 230, 180, 0.85)");
        innerBulge.addColorStop(0.6, palette.dark ? "rgba(255, 200, 140, 0.45)" : "rgba(255, 170, 100, 0.45)");
        innerBulge.addColorStop(1, "rgba(255, 200, 120, 0)");
        ctx.fillStyle = innerBulge;
        ctx.beginPath(); ctx.arc(cx, cy, state.bulgeR * 1.0, 0, Math.PI * 2); ctx.fill();
        // Nucleus
        ctx.fillStyle = "rgba(255, 250, 230, 0.95)";
        ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2); ctx.fill();
        // Snap softly back to viewport center if window resized.
        state.cx += (w / 2 - state.cx) * 0.05;
        state.cy += (h / 2 - state.cy) * 0.05;
        // Disk stars
        for (const s of state.stars) {
          s.angle += s.speed;
          s.tw += 0.07;
          const x = state.cx + Math.cos(s.angle) * s.r;
          const y = state.cy + Math.sin(s.angle) * s.r * 0.6;
          const tw = (Math.sin(s.tw) + 1) / 2;
          const a = s.bright ? 0.75 + tw * 0.25 : 0.35 + tw * 0.35;
          if (s.warm) {
            ctx.fillStyle = `rgba(255, 180, 130, ${(a * 0.9).toFixed(2)})`;
          } else {
            ctx.fillStyle = s.bright
              ? palette.starBright.replace("0.95", a.toFixed(2))
              : palette.starDim.replace("0.55", (a * 0.7).toFixed(2));
          }
          ctx.beginPath(); ctx.arc(x, y, s.size, 0, Math.PI * 2); ctx.fill();
        }
        // Foreground stars — fixed in place, just twinkle. Adds depth.
        for (const f of state.foreground) {
          f.tw += 0.04;
          const tw = (Math.sin(f.tw) + 1) / 2;
          ctx.fillStyle = palette.dark
            ? `rgba(255, 255, 255, ${(0.45 + tw * 0.45).toFixed(2)})`
            : `rgba(40, 80, 160, ${(0.45 + tw * 0.45).toFixed(2)})`;
          ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
          // Tiny diffraction cross for the brightest foreground stars
          if (f.size > 1.6) {
            ctx.strokeStyle = palette.dark
              ? `rgba(255, 255, 255, ${(0.18 * tw).toFixed(2)})`
              : `rgba(40, 80, 160, ${(0.18 * tw).toFixed(2)})`;
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(f.x - 4, f.y); ctx.lineTo(f.x + 4, f.y);
            ctx.moveTo(f.x, f.y - 4); ctx.lineTo(f.x, f.y + 4);
            ctx.stroke();
          }
        }
      },
    };

    // ----- Aurora theme -----
    // Flowing curved color bands across the entire viewport. Each band is a
    // smooth sine-noise curve; bands drift and breathe their amplitudes.
    // Always fills the screen, never gets covered by centered bubbles.
    const aurora = {
      init(state) {
        const COUNT = 6;
        state.bands = [];
        // Pure aurora-borealis palette — cool greens, mints, cyan, violet.
        // No pinks or warm tones, so additive blending stays in the
        // cool-spectrum and never produces the orangey/henna wash.
        const palettes = palette.dark
          ? [
              { from: "rgba(80, 230, 180, 0.32)",  to: "rgba(80, 230, 180, 0)" },     // emerald
              { from: "rgba(120, 255, 200, 0.28)", to: "rgba(120, 255, 200, 0)" },    // mint
              { from: "rgba(100, 200, 255, 0.28)", to: "rgba(100, 200, 255, 0)" },    // sky
              { from: "rgba(140, 100, 240, 0.24)", to: "rgba(140, 100, 240, 0)" },    // violet
              { from: "rgba(60, 180, 220, 0.24)",  to: "rgba(60, 180, 220, 0)" },     // teal
              { from: "rgba(170, 255, 150, 0.22)", to: "rgba(170, 255, 150, 0)" },    // pale green
            ]
          : [
              { from: "rgba(30, 160, 110, 0.22)",  to: "rgba(30, 160, 110, 0)" },
              { from: "rgba(70, 180, 150, 0.20)",  to: "rgba(70, 180, 150, 0)" },
              { from: "rgba(40, 130, 200, 0.20)",  to: "rgba(40, 130, 200, 0)" },
              { from: "rgba(90, 60, 200, 0.18)",   to: "rgba(90, 60, 200, 0)" },
              { from: "rgba(60, 160, 180, 0.18)",  to: "rgba(60, 160, 180, 0)" },
              { from: "rgba(120, 170, 90, 0.16)",  to: "rgba(120, 170, 90, 0)" },
            ];
        for (let i = 0; i < COUNT; i++) {
          state.bands.push({
            y0: (h / (COUNT + 1)) * (i + 1),
            amp: 70 + Math.random() * 90,
            freq: 0.0035 + Math.random() * 0.003,
            speed: 0.004 + Math.random() * 0.006,
            phase: Math.random() * Math.PI * 2,
            thickness: 60 + Math.random() * 90,
            colors: palettes[i % palettes.length],
            breathePhase: Math.random() * Math.PI * 2,
          });
        }
      },
      tick(ctx, state) {
        // Midnight-sky backdrop with a faint horizon gradient so the aurora
        // reads as light against night, not just stacked color washes.
        const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
        if (palette.dark) {
          skyGrad.addColorStop(0, "rgba(6, 10, 28, 0.85)");      // deep night top
          skyGrad.addColorStop(1, "rgba(8, 18, 44, 0.85)");      // slightly bluer near horizon
        } else {
          skyGrad.addColorStop(0, "rgba(232, 240, 250, 0.55)");
          skyGrad.addColorStop(1, "rgba(214, 226, 244, 0.55)");
        }
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const b of state.bands) {
          b.phase += b.speed;
          b.breathePhase += 0.012;
          const breathe = 0.7 + 0.3 * Math.sin(b.breathePhase);
          const amp = b.amp * breathe;
          const thickness = b.thickness * (0.8 + 0.4 * Math.sin(b.breathePhase * 0.7));
          ctx.beginPath();
          for (let x = -20; x <= w + 20; x += 12) {
            const y = b.y0 + Math.sin(x * b.freq + b.phase) * amp + Math.sin(x * b.freq * 2.3 + b.phase * 1.3) * amp * 0.35;
            if (x === -20) ctx.moveTo(x, y - thickness / 2);
            else ctx.lineTo(x, y - thickness / 2);
          }
          for (let x = w + 20; x >= -20; x -= 12) {
            const y = b.y0 + Math.sin(x * b.freq + b.phase) * amp + Math.sin(x * b.freq * 2.3 + b.phase * 1.3) * amp * 0.35;
            ctx.lineTo(x, y + thickness / 2);
          }
          ctx.closePath();
          const grad = ctx.createLinearGradient(0, b.y0 - thickness, 0, b.y0 + thickness);
          grad.addColorStop(0, b.colors.to);
          grad.addColorStop(0.5, b.colors.from);
          grad.addColorStop(1, b.colors.to);
          ctx.fillStyle = grad;
          ctx.fill();
        }
        ctx.restore();
      },
    };

    // ----- Atom theme (deprecated — replaced by aurora) -----
    const atom = {
      init(state) {
        state.t = 0;
        const COUNT = Math.max(3, Math.min(6, Math.round(Math.min(w, h) / 220)));
        const baseR = Math.min(w, h) * 0.10;
        state.atoms = [];
        for (let i = 0; i < COUNT; i++) {
          state.atoms.push({
            x: 80 + Math.random() * (w - 160),
            y: 80 + Math.random() * (h - 160),
            vx: (Math.random() - 0.5) * 1.4,
            vy: (Math.random() - 0.5) * 1.4,
            r: baseR * (0.9 + Math.random() * 0.5),
            phase: Math.random() * Math.PI * 2,
            shells: [
              { rxK: 1.0, ryK: 0.42, tilt:  Math.random() * Math.PI, speed: 0.022, electrons: 1, phase: Math.random() * Math.PI * 2 },
              { rxK: 1.7, ryK: 0.55, tilt: -Math.random() * Math.PI, speed: 0.013, electrons: 2, phase: Math.random() * Math.PI * 2 },
              { rxK: 2.4, ryK: 0.70, tilt:  Math.random() * Math.PI, speed: 0.0075, electrons: 3, phase: Math.random() * Math.PI * 2 },
            ],
          });
        }
      },
      tick(ctx, state) {
        state.t += 1;
        const MAX_SPEED = 1.8;
        // Integrate + wall bounce
        for (const a of state.atoms) {
          a.x += a.vx; a.y += a.vy;
          const pad = a.r * 2.6;
          if (a.x < pad) { a.x = pad; a.vx = Math.abs(a.vx); }
          else if (a.x > w - pad) { a.x = w - pad; a.vx = -Math.abs(a.vx); }
          if (a.y < pad) { a.y = pad; a.vy = Math.abs(a.vy); }
          else if (a.y > h - pad) { a.y = h - pad; a.vy = -Math.abs(a.vy); }
          // Tiny brownian noise
          a.vx += (Math.random() - 0.5) * 0.02;
          a.vy += (Math.random() - 0.5) * 0.02;
          const sp = Math.hypot(a.vx, a.vy);
          if (sp > MAX_SPEED) { const k = MAX_SPEED / sp; a.vx *= k; a.vy *= k; }
        }
        // Atom-atom collision (elastic-ish): swap velocities along the collision axis
        for (let i = 0; i < state.atoms.length; i++) {
          for (let j = i + 1; j < state.atoms.length; j++) {
            const a = state.atoms[i], b = state.atoms[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const d = Math.hypot(dx, dy);
            const minD = (a.r + b.r) * 2.4;
            if (d > 0 && d < minD) {
              const overlap = (minD - d) / 2;
              const nx = dx / d, ny = dy / d;
              a.x -= nx * overlap; a.y -= ny * overlap;
              b.x += nx * overlap; b.y += ny * overlap;
              // Reflect velocities along the normal
              const va = a.vx * nx + a.vy * ny;
              const vb = b.vx * nx + b.vy * ny;
              const swap = vb - va;
              a.vx += swap * nx; a.vy += swap * ny;
              b.vx -= swap * nx; b.vy -= swap * ny;
              // Tiny burst flash visualized as a halo
              a._hit = b._hit = 1.0;
            }
          }
        }
        // Mouse nudges all atoms gently away (no capture-attraction)
        if (mouse.active) {
          for (const a of state.atoms) {
            const dx = a.x - mouse.x, dy = a.y - mouse.y;
            const d2 = dx * dx + dy * dy;
            const R = 180;
            if (d2 < R * R) {
              const d = Math.sqrt(d2) || 1;
              const k = (1 - d / R) * 0.6;
              a.vx += (dx / d) * k;
              a.vy += (dy / d) * k;
            }
          }
        }
        // Draw each atom
        for (const a of state.atoms) {
          const cx = a.x, cy = a.y, baseR = a.r;
          // Hit halo (fades quickly)
          if (a._hit && a._hit > 0) {
            const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 3.5);
            hg.addColorStop(0, `rgba(255, 200, 100, ${(a._hit * 0.35).toFixed(2)})`);
            hg.addColorStop(1, "rgba(255, 200, 100, 0)");
            ctx.fillStyle = hg;
            ctx.beginPath(); ctx.arc(cx, cy, baseR * 3.5, 0, Math.PI * 2); ctx.fill();
            a._hit *= 0.85;
            if (a._hit < 0.02) a._hit = 0;
          }
          // Orbit ellipses
          for (const s of a.shells) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(s.tilt);
            ctx.strokeStyle = palette.orbit;
            ctx.lineWidth = 1.0;
            ctx.beginPath();
            ctx.ellipse(0, 0, baseR * s.rxK, baseR * s.ryK, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
          // Nucleus glow + a few nucleon dots
          const ng = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 0.45);
          ng.addColorStop(0, "rgba(255, 130, 130, 0.55)");
          ng.addColorStop(1, "rgba(255, 130, 130, 0)");
          ctx.fillStyle = ng;
          ctx.beginPath(); ctx.arc(cx, cy, baseR * 0.45, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = palette.nucleus;
          ctx.beginPath(); ctx.arc(cx, cy, baseR * 0.18, 0, Math.PI * 2); ctx.fill();
          // Electrons
          for (const s of a.shells) {
            const rx = baseR * s.rxK, ry = baseR * s.ryK;
            for (let e = 0; e < s.electrons; e++) {
              const phase = s.phase + state.t * s.speed + (e * Math.PI * 2 / s.electrons);
              const lx = Math.cos(phase) * rx;
              const ly = Math.sin(phase) * ry;
              const ex = cx + lx * Math.cos(s.tilt) - ly * Math.sin(s.tilt);
              const ey = cy + lx * Math.sin(s.tilt) + ly * Math.cos(s.tilt);
              const tg = ctx.createRadialGradient(ex, ey, 0, ex, ey, baseR * 0.13);
              tg.addColorStop(0, palette.electron.replace("0.95", "0.55"));
              tg.addColorStop(1, palette.electron.replace("0.95", "0"));
              ctx.fillStyle = tg;
              ctx.beginPath(); ctx.arc(ex, ey, baseR * 0.13, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = palette.electron;
              ctx.beginPath(); ctx.arc(ex, ey, 3.2, 0, Math.PI * 2); ctx.fill();
            }
          }
        }
      },
    };

    // ----- Solar System theme -----
    // Sun anchored top-left, planets sweep across the viewport. Saturn gets
    // a real ring, asteroid belt between Mars and Jupiter adds richness.
    const solarSystem = {
      init(state) {
        state.t = 0;
        state.cx = w * 0.18;
        state.cy = h * 0.30;
        const colors = ["#a3a3a3", "#e6c98d", "#5bb1ff", "#cf5d3a", "#d6b18e", "#e2c180", "#9bd0e8", "#5c7fd6"];
        const names = ["Mercury", "Venus", "Earth", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune"];
        state.planets = [];
        const sizes = [5, 7, 7.5, 6.5, 16, 13, 10, 9.5];   // larger
        const farR = Math.hypot(w, h) * 0.85;
        for (let i = 0; i < 8; i++) {
          state.planets.push({
            orbit: 100 + (farR - 100) * (i / 7),
            size: sizes[i],
            color: colors[i],
            name: names[i],
            speed: 0.0048 / Math.sqrt(1 + i * 0.4),       // ~40% of prior speed
            // Start spread along the visible top→bottom arc on the right side
            // (-π/2 to π/2 — right semicircle).
            phase: -Math.PI / 2 + Math.PI * (i / 8) + Math.random() * 0.1,
            trail: [],
            hasRing: i === 5, // Saturn
          });
        }
        // Asteroid belt between Mars and Jupiter (indices 3 → 4)
        state.belt = [];
        const innerBelt = state.planets[3].orbit + 28;
        const outerBelt = state.planets[4].orbit - 28;
        for (let i = 0; i < 90; i++) {
          state.belt.push({
            orbit: innerBelt + Math.random() * (outerBelt - innerBelt),
            size: 0.6 + Math.random() * 1.0,
            speed: 0.0045 + Math.random() * 0.0035,
            phase: Math.random() * Math.PI * 2,
          });
        }
      },
      tick(ctx, state) {
        state.t += 1;
        const cx = state.cx, cy = state.cy;
        const sunR = 32;
        // Layered corona — three gradients with shifted radii for depth
        const corona1 = ctx.createRadialGradient(cx, cy, sunR * 0.4, cx, cy, sunR * 5);
        corona1.addColorStop(0, "rgba(255, 220, 120, 0.55)");
        corona1.addColorStop(0.3, "rgba(255, 170, 80, 0.25)");
        corona1.addColorStop(1, "rgba(255, 100, 60, 0)");
        ctx.fillStyle = corona1;
        ctx.beginPath(); ctx.arc(cx, cy, sunR * 5, 0, Math.PI * 2); ctx.fill();
        // Animated solar flare flicker — a second gradient that wobbles
        const flicker = 0.85 + 0.15 * Math.sin(state.t * 0.18);
        const corona2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, sunR * 2.4);
        corona2.addColorStop(0, `rgba(255, 240, 180, ${(0.85 * flicker).toFixed(2)})`);
        corona2.addColorStop(0.5, `rgba(255, 180, 80, ${(0.35 * flicker).toFixed(2)})`);
        corona2.addColorStop(1, "rgba(255, 170, 80, 0)");
        ctx.fillStyle = corona2;
        ctx.beginPath(); ctx.arc(cx, cy, sunR * 2.4, 0, Math.PI * 2); ctx.fill();
        // Sun disk
        ctx.fillStyle = "#ffd86b";
        ctx.beginPath(); ctx.arc(cx, cy, sunR, 0, Math.PI * 2); ctx.fill();
        // Asteroid belt
        for (const a of state.belt) {
          a.phase += a.speed;
          const ax = cx + Math.cos(a.phase) * a.orbit;
          const ay = cy + Math.sin(a.phase) * a.orbit;
          ctx.fillStyle = "rgba(170, 150, 130, 0.65)";
          ctx.beginPath(); ctx.arc(ax, ay, a.size, 0, Math.PI * 2); ctx.fill();
        }
        for (const p of state.planets) {
          p.phase += p.speed;
          // Right-semicircle only: planet sweeps from top (-π/2) down to
          // bottom (+π/2) on the visible RIGHT side of the sun. When it
          // would go behind (left side), wrap back to the top so it
          // "re-enters from above".
          if (p.phase > Math.PI / 2) {
            p.phase = -Math.PI / 2;
            p.trail.length = 0;  // clear the trail so it doesn't streak across
          }
          // Visible orbit arc (right semicircle).
          ctx.strokeStyle = palette.orbit;
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.arc(cx, cy, p.orbit, -Math.PI / 2, Math.PI / 2);
          ctx.stroke();
          const px = cx + Math.cos(p.phase) * p.orbit;
          const py = cy + Math.sin(p.phase) * p.orbit;
          p.trail.push([px, py]);
          if (p.trail.length > 28) p.trail.shift();
          for (let i = 0; i < p.trail.length; i++) {
            const a = i / p.trail.length;
            ctx.fillStyle = p.color + Math.floor(a * 70 + 20).toString(16).padStart(2, "0");
            ctx.beginPath(); ctx.arc(p.trail[i][0], p.trail[i][1], p.size * a * 0.55, 0, Math.PI * 2); ctx.fill();
          }
          // Saturn's ring — tilted ellipse around the planet
          if (p.hasRing) {
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(-0.4);
            ctx.strokeStyle = "rgba(214, 177, 142, 0.55)";
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size * 2.0, p.size * 0.55, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = "rgba(214, 177, 142, 0.30)";
            ctx.lineWidth = 1.0;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size * 2.4, p.size * 0.70, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
          // Planet
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2); ctx.fill();
        }
      },
    };

    // ----- DNA helix theme -----
    // Many small DNA molecules floating around the canvas like cells in a
    // petri dish. Each one drifts in its own direction, rotates around its
    // long axis, and has its own helix phase. Bounces off walls.
    const dna = {
      init(state) {
        state.t = 0;
        // Fewer, slightly larger, well-spaced strands so each reads clearly.
        // Calm petri-dish vibe rather than noisy confetti.
        const COUNT = Math.max(14, Math.min(28, Math.floor(w * h * 0.000016)));
        state.cells = [];
        for (let i = 0; i < COUNT; i++) {
          const len = 70 + Math.random() * 50;
          const amp = 9 + Math.random() * 5;
          state.cells.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.45,
            vy: (Math.random() - 0.5) * 0.45,
            angle: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.0015,
            helixPhase: Math.random() * Math.PI * 2,
            helixSpeed: 0.018 + Math.random() * 0.012,
            len, amp,
          });
        }
      },
      tick(ctx, state) {
        state.t += 1;
        // Petri-dish backdrop — deep teal so the green/purple strands pop
        // against a distinct lab-bench color, not the bare canvas.
        ctx.fillStyle = palette.dark
          ? "rgba(8, 36, 32, 0.55)"
          : "rgba(216, 240, 232, 0.55)";
        ctx.fillRect(0, 0, w, h);
        for (const c of state.cells) {
          c.x += c.vx; c.y += c.vy;
          c.angle += c.spin;
          c.helixPhase += c.helixSpeed;
          // Bounce off walls with the molecule's bounding radius
          const pad = c.len * 0.55;
          if (c.x < pad)    { c.x = pad;    c.vx = Math.abs(c.vx); }
          else if (c.x > w - pad) { c.x = w - pad; c.vx = -Math.abs(c.vx); }
          if (c.y < pad)    { c.y = pad;    c.vy = Math.abs(c.vy); }
          else if (c.y > h - pad) { c.y = h - pad; c.vy = -Math.abs(c.vy); }
          // Tiny brownian wobble so they don't move in perfectly straight lines
          c.vx += (Math.random() - 0.5) * 0.01;
          c.vy += (Math.random() - 0.5) * 0.01;
          const sp = Math.hypot(c.vx, c.vy);
          if (sp > 1.0) { const k = 1.0 / sp; c.vx *= k; c.vy *= k; }
          // Draw the molecule: local coordinates from -len/2 → +len/2 along
          // the x axis, rotated by c.angle and translated to (c.x, c.y).
          ctx.save();
          ctx.translate(c.x, c.y);
          ctx.rotate(c.angle);
          // Soft neon glow on each strand — looks like fluorescent stained DNA.
          ctx.shadowBlur = palette.dark ? 8 : 4;
          const step = 6;
          let rungIdx = 0;
          for (let t = -c.len / 2; t <= c.len / 2; t += step) {
            const ang = c.helixPhase + t * 0.09;
            const y1 = Math.sin(ang) * c.amp;
            const y2 = Math.sin(ang + Math.PI) * c.amp;
            const depth1 = (Math.cos(ang) + 1) / 2;
            const depth2 = (Math.cos(ang + Math.PI) + 1) / 2;
            if (rungIdx % 2 === 0) {
              const grad = ctx.createLinearGradient(t, y1, t, y2);
              grad.addColorStop(0, palette.dark ? "rgba(140, 240, 200, 0.70)" : "rgba(40, 140, 90, 0.65)");
              grad.addColorStop(1, palette.dark ? "rgba(200, 150, 240, 0.70)" : "rgba(120, 60, 160, 0.65)");
              ctx.strokeStyle = grad;
              ctx.lineWidth = 1.4;
              ctx.shadowColor = "transparent";
              ctx.beginPath(); ctx.moveTo(t, y1); ctx.lineTo(t, y2); ctx.stroke();
            }
            rungIdx++;
            // Green strand bead with glow
            ctx.shadowColor = palette.dark ? "rgba(140, 240, 200, 0.55)" : "transparent";
            ctx.fillStyle = palette.dark
              ? `rgba(140, 240, 200, ${(0.55 + depth1 * 0.4).toFixed(2)})`
              : `rgba(40, 140, 90, ${(0.45 + depth1 * 0.45).toFixed(2)})`;
            ctx.beginPath(); ctx.arc(t, y1, 1.3 + depth1 * 1.8, 0, Math.PI * 2); ctx.fill();
            // Purple strand bead with glow
            ctx.shadowColor = palette.dark ? "rgba(200, 150, 240, 0.55)" : "transparent";
            ctx.fillStyle = palette.dark
              ? `rgba(200, 150, 240, ${(0.55 + depth2 * 0.4).toFixed(2)})`
              : `rgba(120, 60, 160, ${(0.45 + depth2 * 0.45).toFixed(2)})`;
            ctx.beginPath(); ctx.arc(t, y2, 1.3 + depth2 * 1.8, 0, Math.PI * 2); ctx.fill();
          }
          ctx.shadowBlur = 0;
          ctx.shadowColor = "transparent";
          ctx.restore();
        }
      },
    };

    // ----- Wave interference theme -----
    // Quiet interference field — only the CRESTS render, at low alpha, with
    // larger cells. Reads as gentle ripples instead of a saturated heatmap.
    const ripples = {
      init(state) {
        state.t = 0;
        state.cell = 9;   // smaller cells → denser, more textured field
        state.sources = [
          { x: w * 0.30, y: h * 0.42, freq: 0.026 },
          { x: w * 0.70, y: h * 0.58, freq: 0.026 },
        ];
      },
      tick(ctx, state) {
        state.t += 1;
        // Dark violet → magenta sweep so the field doesn't read as "blue
        // water" anymore. Crests are warm magenta/orange; troughs render as
        // deep purple, on a violet backdrop.
        ctx.fillStyle = palette.dark
          ? "rgba(28, 8, 48, 0.55)"
          : "rgba(245, 230, 248, 0.55)";
        ctx.fillRect(0, 0, w, h);
        const phase = state.t * 0.04;
        const cell = state.cell;
        const sources = state.sources;
        for (let y = 0; y < h; y += cell) {
          for (let x = 0; x < w; x += cell) {
            let sum = 0;
            for (let i = 0; i < sources.length; i++) {
              const s = sources[i];
              const dx = x - s.x, dy = y - s.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              const amp = 1 / (1 + d * 0.005);
              sum += Math.sin(d * s.freq - phase) * amp;
            }
            if (mouse.active) {
              const dx = x - mouse.x, dy = y - mouse.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              const amp = 1 / (1 + d * 0.005);
              sum += Math.sin(d * 0.030 - phase * 1.3) * amp * 0.6;
            }
            const v = Math.max(-1, Math.min(1, sum / 1.4));
            const intensity = Math.abs(v);
            if (intensity < 0.22) continue;
            const a = (intensity - 0.22) * 0.78;
            if (v > 0) {
              // Constructive: hot magenta/orange
              ctx.fillStyle = palette.dark
                ? `rgba(255, 140, 90, ${a.toFixed(3)})`
                : `rgba(220, 60, 90, ${a.toFixed(3)})`;
            } else {
              // Destructive: deep violet (sinks back into the backdrop)
              ctx.fillStyle = palette.dark
                ? `rgba(120, 60, 180, ${(a * 0.7).toFixed(3)})`
                : `rgba(140, 90, 200, ${(a * 0.7).toFixed(3)})`;
            }
            ctx.fillRect(x, y, cell, cell);
          }
        }
        for (const s of sources) {
          ctx.fillStyle = palette.dark ? "rgba(255, 220, 180, 0.95)" : "rgba(120, 40, 80, 0.95)";
          ctx.beginPath(); ctx.arc(s.x, s.y, 5, 0, Math.PI * 2); ctx.fill();
        }
      },
    };

    // ----- Audio-reactive theme -----
    // System-audio-driven spectrum + pulse. Uses getDisplayMedia so it can
    // capture the audio from a SHARED CHROME TAB (Mac/PC), not the mic.
    // Falls back to the microphone if the user cancels the share dialog.
    //
    // Mac how-to: when the share dialog appears, pick a Chrome tab that's
    // playing audio AND tick "Share tab audio" before clicking Share. macOS
    // can't capture system-wide audio from the browser without a virtual
    // device like BlackHole — there's no browser-side workaround for that.
    const audio = {
      async init(state) {
        state.ready = false;
        state.error = null;
        state.source = null;
        state.pulse = 0;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx || !navigator.mediaDevices) {
          state.error = "Web Audio not available in this browser";
          return;
        }
        const wireStream = async (stream, sourceLabel) => {
          const audioCtx = new Ctx();
          const src = audioCtx.createMediaStreamSource(stream);
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.8;
          src.connect(analyser);
          state.stream = stream;
          state.audioCtx = audioCtx;
          state.analyser = analyser;
          state.freq = new Uint8Array(analyser.frequencyBinCount);
          state.source = sourceLabel;
          state.ready = true;
        };
        // 1) Try system / tab audio via getDisplayMedia. User must tick
        //    "Share tab audio" in the picker. We don't care about the video
        //    track, but Chrome requires asking for it; we stop it right away.
        try {
          if (!navigator.mediaDevices.getDisplayMedia) throw new Error("display capture not supported");
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: 1, height: 1 },
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
          });
          // Stop the video track — we only want the audio
          stream.getVideoTracks().forEach(t => t.stop());
          if (stream.getAudioTracks().length === 0) {
            stream.getTracks().forEach(t => t.stop());
            throw new Error("no audio in share — pick a tab and tick 'Share tab audio'");
          }
          await wireStream(stream, "tab");
          return;
        } catch (err) {
          // User cancelled or no audio shared — fall through to mic.
          state.fallbackReason = err.message || String(err);
        }
        // 2) Fallback to microphone so the theme isn't useless if tab share
        //    was denied.
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
          });
          await wireStream(stream, "mic");
        } catch (err) {
          state.error = err.message || String(err);
        }
      },
      dispose(state) {
        try { state.stream?.getTracks?.().forEach(t => t.stop()); } catch {}
        try { state.audioCtx?.close?.(); } catch {}
      },
      tick(ctx, state) {
        // Status message while waiting for mic / on error
        if (!state.ready) {
          ctx.fillStyle = palette.dark ? "rgba(200, 220, 255, 0.85)" : "rgba(30, 60, 120, 0.85)";
          ctx.font = "13px ui-monospace, monospace";
          ctx.textAlign = "center";
          const lines = state.error
            ? [`🎵 audio theme failed: ${state.error}`]
            : [
                "🎵 audio reactive — sharing a tab's audio…",
                "Pick a Chrome tab playing audio and tick 'Share tab audio'.",
                "(If you cancel, we'll fall back to your microphone.)",
              ];
          let y = h / 2 - (lines.length - 1) * 10;
          for (const line of lines) {
            ctx.fillText(line, w / 2, y);
            y += 20;
          }
          ctx.textAlign = "start";
          return;
        }
        state.analyser.getByteFrequencyData(state.freq);
        // Bass = first ~10 bins; midrange / treble fill the rest.
        let bass = 0;
        for (let i = 0; i < 10; i++) bass += state.freq[i];
        bass /= 10 * 255;
        state.pulse = state.pulse * 0.85 + bass * 0.45;
        // Pulse rings from center, scaled by bass
        const cx = w / 2, cy = h / 2;
        const maxR = Math.hypot(w, h) / 2;
        for (let i = 0; i < 6; i++) {
          const r = (i + 1) * (maxR / 6) * (0.4 + state.pulse * 0.9);
          const alpha = (1 - i / 6) * 0.35 * state.pulse;
          if (alpha <= 0.01) continue;
          ctx.strokeStyle = palette.dark
            ? `rgba(120, 220, 255, ${alpha.toFixed(3)})`
            : `rgba(30, 110, 200, ${alpha.toFixed(3)})`;
          ctx.lineWidth = 1.4;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        }
        // Frequency bars — mirrored at left and right edges so the visualizer
        // is visible in the gutters even with chat bubbles in the middle.
        const bins = Math.min(state.freq.length, 96);
        const barW = w / (bins * 2);
        const baseY = h;
        const maxH = h * 0.55;
        for (let i = 0; i < bins; i++) {
          const v = state.freq[i] / 255;
          const barH = v * maxH;
          const hue = palette.dark ? (180 + i * 1.8) : (200 + i * 1.0);
          const sat = palette.dark ? 80 : 55;
          const light = palette.dark ? 65 : 45;
          ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${(0.55 + v * 0.35).toFixed(2)})`;
          ctx.fillRect(i * barW, baseY - barH, barW - 1, barH);
          ctx.fillRect(w - (i + 1) * barW, baseY - barH, barW - 1, barH);
        }
        // Tiny source label so the user knows whether they got tab audio or
        // the mic fallback.
        ctx.fillStyle = palette.dark ? "rgba(180, 200, 230, 0.55)" : "rgba(60, 80, 140, 0.55)";
        ctx.font = "11px ui-monospace, monospace";
        ctx.fillText(`🎵 ${state.source === "tab" ? "tab audio" : "mic (tab share denied)"}`, 12, h - 6);
      },
    };

    // ----- Flock / boids theme -----
    // Lots of small triangles flying together with alignment + cohesion +
    // separation; cursor scares the flock so they veer away.
    const flock = {
      init(state) {
        const COUNT = Math.max(60, Math.min(160, Math.floor(w * h * 0.00010)));
        state.boids = [];
        for (let i = 0; i < COUNT; i++) {
          const a = Math.random() * Math.PI * 2;
          state.boids.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: Math.cos(a) * 1.4, vy: Math.sin(a) * 1.4,
          });
        }
      },
      tick(ctx, state) {
        // Warm dusk-sky tint so the flock reads differently from the cool
        // constellation/aurora themes.
        ctx.fillStyle = palette.dark
          ? "rgba(48, 28, 38, 0.55)"
          : "rgba(255, 232, 210, 0.55)";
        ctx.fillRect(0, 0, w, h);
        const VIEW = 60, SEP = 22, MAX = 2.2;
        for (let i = 0; i < state.boids.length; i++) {
          const b = state.boids[i];
          let avgVX = 0, avgVY = 0, ctrX = 0, ctrY = 0, sepX = 0, sepY = 0;
          let cnt = 0;
          for (let j = 0; j < state.boids.length; j++) {
            if (i === j) continue;
            const o = state.boids[j];
            const dx = o.x - b.x, dy = o.y - b.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < VIEW * VIEW) {
              avgVX += o.vx; avgVY += o.vy;
              ctrX += o.x; ctrY += o.y;
              cnt++;
              if (d2 < SEP * SEP) {
                const d = Math.sqrt(d2) || 1;
                sepX -= dx / d; sepY -= dy / d;
              }
            }
          }
          if (cnt > 0) {
            avgVX /= cnt; avgVY /= cnt;
            ctrX = ctrX / cnt - b.x; ctrY = ctrY / cnt - b.y;
            b.vx += (avgVX - b.vx) * 0.03 + ctrX * 0.0008 + sepX * 0.05;
            b.vy += (avgVY - b.vy) * 0.03 + ctrY * 0.0008 + sepY * 0.05;
          }
          if (mouse.active) {
            const dx = b.x - mouse.x, dy = b.y - mouse.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < 110 * 110) {
              const d = Math.sqrt(d2) || 1;
              const k = (1 - d / 110) * 0.45;
              b.vx += (dx / d) * k;
              b.vy += (dy / d) * k;
            }
          }
          const sp = Math.hypot(b.vx, b.vy);
          if (sp > MAX) { const k = MAX / sp; b.vx *= k; b.vy *= k; }
          b.x += b.vx; b.y += b.vy;
          if (b.x < 0) b.x = w; if (b.x > w) b.x = 0;
          if (b.y < 0) b.y = h; if (b.y > h) b.y = 0;
        }
        // Little V-shaped bird silhouettes against the warm dusk sky.
        // Light cream in dark mode (silhouetted by daylight), dark in light
        // mode (silhouetted by sky).
        ctx.strokeStyle = palette.dark
          ? "rgba(255, 235, 210, 0.92)"
          : "rgba(60, 30, 30, 0.82)";
        ctx.lineWidth = 1.6;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const b of state.boids) {
          const a = Math.atan2(b.vy, b.vx);
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(a);
          // Each "bird" is two strokes meeting at the body — like a wide V.
          ctx.beginPath();
          ctx.moveTo(-6, -4);
          ctx.quadraticCurveTo(-2, 0, 0, -1);
          ctx.quadraticCurveTo(-2, 0, -6, 4);
          ctx.stroke();
          ctx.restore();
        }
      },
    };

    // ----- Matrix rain theme -----
    // Slower fall + flat-black backdrop (no glass bleed-through). The fade
    // rectangle uses solid black so previous frames cleanly disappear.
    const rain = {
      init(state) {
        state.cols = [];
        const COL_W = 10;
        const cols = Math.ceil(w / COL_W);
        state.colW = COL_W;
        for (let i = 0; i < cols; i++) {
          state.cols.push({
            y: Math.random() * h,
            speed: 0.3 + Math.random() * 0.7,
            len: 12 + Math.floor(Math.random() * 22),
            buf: [],
          });
        }
        state.glyphs = "01アイウエオカキクケコサシスセソタチツテト10100110".split("");
      },
      tick(ctx, state) {
        // Lay a fully opaque black base every frame so we never get a
        // residue grid from the constellation/glass behind. The trail effect
        // is created with a translucent black overlay instead of partial clear.
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);
        // After the base, soft trailing fade (very light) so newer glyphs leave
        // a ghost. Pure black keeps grid artifacts from re-appearing.
